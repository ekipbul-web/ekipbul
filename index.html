<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkipBul - RP Grand Mobile</title>
    <meta name="description" content="EkipBul - RP Grand Mobile için profesyonel ekip bulma platformu">
    <link rel="manifest" href="data:application/json,{}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg: #030712;
            --card: #0f1729;
            --card2: #1a1f35;
            --border: #1e2640;
            --red: #f43f5e;
            --red2: #fb7185;
            --blue: #3b82f6;
            --blue2: #60a5fa;
            --yellow: #f59e0b;
            --gold: #fbbf24;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --green: #10b981;
            --purple: #a855f7;
            --radius: 24px;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --font: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --glass: rgba(15, 23, 41, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 0% 0%, #1e1b4b20 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, #4c051920 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, #0f1729 0%, #030712 70%);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--red), var(--red2));
            border-radius: 10px;
        }

        /* Navbar */
        .navbar {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(244, 63, 94, 0.15);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -1px;
            transition: transform 0.3s;
        }
        .logo:hover {
            transform: scale(1.02);
        }
        .logo span {
            background: linear-gradient(135deg, var(--red), var(--red2), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4);
            }
            50% {
                box-shadow: 0 4px 30px rgba(244, 63, 94, 0.7);
            }
        }

        .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 11px 22px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-decoration: none;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: var(--font);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(148, 163, 184, 0.3);
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover {
            border-color: var(--red);
            background: rgba(244, 63, 94, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.15);
        }

        .btn-red {
            background: linear-gradient(135deg, var(--red), #e11d48);
            color: #fff;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
        }
        .btn-red:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.5);
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--blue), #2563eb);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-blue:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--yellow), var(--gold));
            color: #1e1b4b;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            font-weight: 800;
        }
        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        .btn-green {
            background: linear-gradient(135deg, var(--green), #059669);
            color: #fff;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-green:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2, #4752c4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
        }

        .btn-github {
            background: linear-gradient(135deg, #333, #555);
            color: #fff;
            box-shadow: 0 4px 15px rgba(51, 51, 51, 0.3);
        }
        .btn-github:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(51, 51, 51, 0.5);
        }

        .btn-guest {
            background: linear-gradient(135deg, var(--purple), #7c3aed);
            color: #fff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .btn-guest:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        .btn-sm {
            padding: 8px 18px;
            font-size: 12px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .user-badge:hover {
            border-color: var(--red);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.2);
            transform: translateY(-2px);
        }

        .role-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* Hero */
        .hero {
            background: linear-gradient(180deg, rgba(244, 63, 94, 0.08) 0%, transparent 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .hero h1 {
            font-size: 40px;
            margin-bottom: 12px;
            font-weight: 900;
            letter-spacing: -2px;
        }
        .hero h1 span {
            background: linear-gradient(135deg, var(--red), var(--red2), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text2);
            font-size: 16px;
            opacity: 0.7;
            font-weight: 400;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            background: var(--card);
            padding: 8px;
            border-radius: 35px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: transparent;
            border-radius: 28px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: var(--text2);
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
            text-align: center;
            font-family: var(--font);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
        }

        /* Listings */
        .listings {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .listing-card {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .listing-card:hover {
            border-color: var(--red);
            transform: translateY(-6px);
            box-shadow: var(--shadow);
        }
        .listing-card.premium {
            border-color: rgba(245, 158, 11, 0.4);
            background: linear-gradient(145deg, #1a1a08, #0f1729);
        }
        .listing-card.pinned {
            border-color: rgba(59, 130, 246, 0.4);
            background: linear-gradient(145deg, #001a2e, #0f1729);
        }

        .listing-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .listing-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            background: linear-gradient(135deg, #3d0000, #5d0000);
            color: var(--red);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
        }
        .listing-title {
            font-weight: 700;
            font-size: 18px;
            flex: 1;
            min-width: 150px;
            letter-spacing: -0.5px;
        }
        .listing-meta {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .listing-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
            backdrop-filter: blur(10px);
        }
        .tag-lfm {
            background: rgba(245, 158, 11, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .tag-lfg {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .tag-server {
            background: rgba(59, 130, 246, 0.15);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .tag-premium {
            background: rgba(244, 63, 94, 0.15);
            color: var(--red2);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }
        .tag-pinned {
            background: rgba(59, 130, 246, 0.15);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .listing-action {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .listing-views {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
        }

        .favorite-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: none;
            font-size: 22px;
            cursor: pointer;
            z-index: 10;
            color: #555;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .favorite-btn.active {
            color: var(--red);
            background: rgba(244, 63, 94, 0.2);
        }

        /* Form Container */
        .form-container {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 40px;
            max-width: 520px;
            margin: 40px auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: #0a0e1a;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
            transition: all 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 110px;
        }
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.3);
            transition: all 0.3s;
            font-family: var(--font);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(244, 63, 94, 0.5);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(20px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 620px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
            box-shadow: var(--shadow);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 22px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .modal-close:hover {
            background: var(--red);
        }
        .modal-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 28px;
            margin-bottom: 16px;
            background-size: cover;
            background-position: center;
            background: linear-gradient(135deg, #3d0000, #5d0000);
            color: var(--red);
            box-shadow: 0 6px 20px rgba(244, 63, 94, 0.4);
        }
        .modal h3 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 800;
        }
        .modal .modal-server {
            color: var(--text2);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal .modal-desc {
            background: #0a0e1a;
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text2);
            margin-bottom: 18px;
            border: 1px solid var(--border);
        }
        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .modal-row span:first-child {
            color: var(--text3);
            font-weight: 500;
        }
        .btn-modal-contact {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green), #059669);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            font-size: 15px;
            font-family: var(--font);
            transition: 0.3s;
        }
        .btn-modal-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        /* Admin Panel */
        .admin-panel {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 32px;
            border: 1px solid rgba(244, 63, 94, 0.2);
            box-shadow: var(--shadow);
        }
        .admin-panel h2 {
            font-size: 26px;
            margin-bottom: 28px;
            color: var(--red);
            font-weight: 900;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .admin-card {
            background: #0a0e1a;
            border-radius: 18px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .admin-card:hover {
            border-color: var(--red);
        }
        .admin-card h4 {
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--yellow);
            font-weight: 700;
        }
        .admin-card .stat-big {
            font-size: 40px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--red), var(--red2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text3);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            color: #fff;
            padding: 16px 32px;
            border-radius: 35px;
            font-size: 14px;
            font-weight: 700;
            z-index: 9999;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .star-rating {
            display: flex;
            gap: 6px;
        }
        .star-rating .star {
            color: #333;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-rating .star.active {
            color: var(--gold);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        .badge-icon {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            margin: 3px;
        }

        .profile-banner {
            width: 100%;
            height: 180px;
            border-radius: var(--radius);
            background: var(--card2);
            background-size: cover;
            background-position: center;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            transition: 0.3s;
            border-radius: 12px;
        }
        .leaderboard-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .leaderboard-rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
        }
        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #e0e0e0);
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.4);
        }
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #e8a850);
            color: #fff;
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.4);
        }

        .chat-container {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            height: 450px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-msg {
            background: #0a0e1a;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 13px;
            max-width: 80%;
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--border);
        }
        .chat-msg.own {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--red), #e11d48);
            border: none;
            color: #fff;
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        .chat-input-row input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: #0a0e1a;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
        }

        .ban-message {
            background: rgba(244, 63, 94, 0.08);
            border: 2px solid var(--red);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            margin: 40px auto;
            max-width: 520px;
        }
        .ban-message h3 {
            color: var(--red);
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 800;
        }

        .team-card {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 22px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s;
        }
        .team-card:hover {
            border-color: var(--blue);
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }
        .event-card {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 14px;
        }

        .role-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .rb-curator {
            background: rgba(244, 63, 94, 0.2);
            color: #ff4466;
            border: 1px solid #ff4466;
        }
        .rb-deputy {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }
        .rb-chief {
            background: rgba(245, 158, 11, 0.2);
            color: #f1c40f;
        }
        .rb-senior {
            background: rgba(59, 130, 246, 0.2);
            color: #3498db;
        }
        .rb-admin {
            background: rgba(244, 63, 94, 0.15);
            color: #e74c3c;
        }
        .rb-technical {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }
        .rb-moderator {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .rb-writer {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }
        .rb-player {
            background: rgba(170, 170, 170, 0.1);
            color: #aaa;
        }

        .announcement {
            background: rgba(245, 158, 11, 0.05);
            border-left: 4px solid var(--yellow);
            padding: 18px;
            border-radius: 0 16px 16px 0;
            margin-bottom: 28px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 28px;
        }
        .page-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
            font-family: var(--font);
        }
        .page-btn.active {
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            border-color: var(--red);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
        }

        .footer {
            text-align: center;
            padding: 32px;
            color: var(--text3);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            font-weight: 500;
        }

        .server-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .server-box {
            background: linear-gradient(145deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .server-box:hover {
            border-color: var(--blue);
            transform: translateY(-3px);
        }
        .server-box h4 {
            color: var(--blue);
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
        }
        .server-box .server-count {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--red), var(--red2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .divider {
            text-align: center;
            color: var(--text3);
            margin: 20px 0;
            font-size: 12px;
            position: relative;
            font-weight: 500;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }

        .comment {
            background: #0a0e1a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 13px;
            border: 1px solid var(--border);
        }

        .online-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .online-dot.active {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        .online-dot.offline {
            background: #555;
        }

        /* Admin message popup */
        .admin-message-popup {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: linear-gradient(145deg, var(--card), var(--card2));
            border: 2px solid var(--red);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 400px;
            z-index: 9998;
            box-shadow: var(--shadow);
            animation: slideInRight 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }
        .admin-message-popup.active {
            display: block;
        }
        .admin-message-popup h4 {
            color: var(--red);
            margin-bottom: 8px;
            font-weight: 800;
        }
        .admin-message-popup p {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 12px;
        }
        .admin-message-popup .popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 16px;
            }
            .logo {
                font-size: 20px;
            }
            .btn {
                padding: 8px 16px;
                font-size: 11px;
            }
            .hero h1 {
                font-size: 28px;
            }
            .tab-btn {
                padding: 8px 16px;
                font-size: 11px;
            }
            .listing-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .admin-grid {
                grid-template-columns: 1fr;
            }
            .profile-banner {
                height: 120px;
            }
            .container {
                padding: 20px 12px;
            }
            .admin-message-popup {
                max-width: 90%;
                right: 16px;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="logo" onclick="navigateTo('home')">
            <div class="logo-icon">🎮</div>
            Ekip<span>Bul</span>
        </a>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <h1>Ekip<span>Bul</span></h1>
        <p>RP Grand Mobile için profesyonel ekip bulma platformu</p>
    </div>

    <!-- ANA İÇERİK -->
    <div class="container" id="dynamicContent"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- ADMIN MESAJ POPUP -->
    <div class="admin-message-popup" id="adminPopup">
        <button class="popup-close" onclick="closeAdminPopup()">✕</button>
        <h4>👑 Admin Mesajı</h4>
        <p id="adminPopupText"></p>
    </div>

    <!-- FOOTER -->
    <div class="footer">© 2026 EkipBul · ekipbul.onrender.com</div>

    <script>
        // ==================== SUPABASE BAĞLANTISI ====================
        const SUPABASE_URL = 'https://dyapvhoefuimnzorevoz.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5YXB2aG9lZnVpbW56b3Jldm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTY4NDcsImV4cCI6MjA5NzI5Mjg0N30.5mmSd9kYBWuj5J6ldiRXQbb1Fa4Wnf_biThQO9zqWZw';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true,
                storage: window.localStorage
            }
        });

        // ==================== SABİTLER ====================
        const ADMIN_ROLES = [
            'Curator of the Project',
            'Deputy Curator of the Project',
            'Chief Admin',
            'Senior Admin',
            'Admin',
            'Technical Admin',
            'Moderator'
        ];

        const ROLE_HIERARCHY = [
            'Curator of the Project',
            'Deputy Curator of the Project',
            'Chief Admin',
            'Senior Admin',
            'Admin',
            'Technical Admin',
            'Moderator',
            'Yazıcı',
            'Player'
        ];

        const ROLE_COLORS = {
            'Curator of the Project': { color: '#ff4466', class: 'rb-curator', dot: '#ff4466', icon: '👑' },
            'Deputy Curator of the Project': { color: '#ffa500', class: 'rb-deputy', dot: '#ffa500', icon: '🏅' },
            'Chief Admin': { color: '#f1c40f', class: 'rb-chief', dot: '#f1c40f', icon: '⭐' },
            'Senior Admin': { color: '#3498db', class: 'rb-senior', dot: '#3498db', icon: '💎' },
            'Admin': { color: '#e74c3c', class: 'rb-admin', dot: '#e74c3c', icon: '🔴' },
            'Technical Admin': { color: '#06b6d4', class: 'rb-technical', dot: '#06b6d4', icon: '🔧' },
            'Moderator': { color: '#10b981', class: 'rb-moderator', dot: '#10b981', icon: '🛡️' },
            'Yazıcı': { color: '#a855f7', class: 'rb-writer', dot: '#a855f7', icon: '✍️' },
            'Player': { color: '#aaa', class: 'rb-player', dot: '#aaa', icon: '🎮' }
        };

        const BADGES = {
            'founder': { name: 'Kurucu', icon: '👑', color: '#ffd700' },
            'premium': { name: 'Premium', icon: '⭐', color: '#f1c40f' },
            'verified': { name: 'Onaylı', icon: '✓', color: '#3498db' },
            'veteran': { name: 'Veteran', icon: '🎖️', color: '#e74c3c' },
            'inviter5': { name: '5 Davet', icon: '📨', color: '#10b981' },
            'inviter10': { name: '10 Davet', icon: '📬', color: '#a855f7' },
            'inviter25': { name: '25 Davet', icon: '📦', color: '#ffa500' },
            'toprated': { name: 'En İyi', icon: '💎', color: '#06b6d4' },
            'first_listing': { name: 'İlk İlan', icon: '📝', color: '#f59e0b' },
            'ten_listings': { name: '10 İlan', icon: '📋', color: '#3b82f6' },
            'hundred_views': { name: '100 Görüntülenme', icon: '👁', color: '#10b981' }
        };

        // ==================== DEĞİŞKENLER ====================
        let currentUser = null;
        let favorites = JSON.parse(localStorage.getItem('ekipbul_favorites')) || [];
        let adminPopupTimeout = null;

        // ==================== YARDIMCI FONKSİYONLAR ====================
        function isAdmin() {
            return currentUser && ADMIN_ROLES.includes(currentUser.role);
        }

        function getRoleLevel(role) {
            return ROLE_HIERARCHY.indexOf(role);
        }

        function canModifyRole(targetRole) {
            return currentUser && getRoleLevel(currentUser.role) < getRoleLevel(targetRole);
        }

        function getBadgeHTML(badgeKey) {
            const badge = BADGES[badgeKey];
            if (!badge) return '';
            return `<span class="badge-icon" style="background:${badge.color}20;color:${badge.color};border:1px solid ${badge.color};">${badge.icon} ${badge.name}</span>`;
        }

        function checkAchievementBadges(user, listings) {
            const badges = [...(user.badges || [])];
            if ((listings || []).length >= 1 && !badges.includes('first_listing')) badges.push('first_listing');
            if ((listings || []).length >= 10 && !badges.includes('ten_listings')) badges.push('ten_listings');
            if ((listings || []).some(l => (l.views || 0) >= 100) && !badges.includes('hundred_views')) badges
                .push('hundred_views');
            return badges;
        }

        function timeAgo(dateStr) {
            const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' saat önce';
            return Math.floor(diff / 86400) + ' gün önce';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(function() { toast.style.display = 'none'; }, 3000);
        }

        // Admin popup (10 saniye)
        function showAdminPopup(msg) {
            const popup = document.getElementById('adminPopup');
            const text = document.getElementById('adminPopupText');
            if (!popup || !text) return;
            text.textContent = msg;
            popup.classList.add('active');
            clearTimeout(adminPopupTimeout);
            adminPopupTimeout = setTimeout(function() { popup.classList.remove('active'); }, 10000);
        }

        function closeAdminPopup() {
            const popup = document.getElementById('adminPopup');
            if (popup) popup.classList.remove('active');
            clearTimeout(adminPopupTimeout);
        }

        // ==================== OTURUM YÖNETİMİ ====================
        async function loadUserProfile(userId) {
            const { data: profiles, error: profileError } = await sb.from('profiles').select('*').eq('id', userId);
            if (profileError) { console.error('Profil yükleme hatası:', profileError); return; }
            const profile = profiles && profiles[0];
            if (profile) {
                const { data: listings, error: listError } = await sb.from('listings').select('views').eq('author_id',
                    userId).eq('deleted', false);
                if (listError) console.error('Liste yükleme hatası:', listError);
                const updatedBadges = checkAchievementBadges(profile, listings || []);
                if (JSON.stringify(updatedBadges) !== JSON.stringify(profile.badges || [])) {
                    const { error: badgeError } = await sb.from('profiles').update({ badges: updatedBadges }).eq('id',
                        userId);
                    if (badgeError) console.error('Badge güncelleme hatası:', badgeError);
                    profile.badges = updatedBadges;
                }
                const { data: user, error: userError } = await sb.auth.getUser();
                if (userError) console.error('Auth user hatası:', userError);
                currentUser = {
                    id: profile.id,
                    email: user?.user?.email || '',
                    username: profile.username,
                    role: profile.role,
                    is_premium: profile.is_premium,
                    is_verified: profile.is_verified,
                    discord: profile.discord || '',
                    avatar_url: profile.avatar_url,
                    banner_url: profile.banner_url,
                    game_hours: profile.game_hours,
                    bio: profile.bio,
                    badges: profile.badges || [],
                    rating: profile.rating,
                    rating_count: profile.rating_count,
                    invite_code: profile.invite_code,
                    invite_count: profile.invite_count || 0,
                    last_username_change: profile.last_username_change
                };
                await sb.from('profiles').update({ last_login: new Date().toISOString() }).eq('id', userId);
            }
        }

        // ==================== NAVBAR ====================
        function updateNavbar() {
            const nav = document.getElementById('navActions');
            if (currentUser) {
                const rc = ROLE_COLORS[currentUser.role] || ROLE_COLORS['Player'];
                nav.innerHTML = `
                    <button class="btn btn-outline btn-sm" onclick="navigateTo('notifications')">🔔</button>
                    <button class="btn btn-outline btn-sm" onclick="navigateTo('messages')">💬</button>
                    <span class="user-badge" onclick="navigateTo('profile','${currentUser.id}')">
                        <span class="role-dot" style="background:${rc.dot}"></span>
                        <span style="color:${rc.color}">${currentUser.username}</span>
                        ${currentUser.is_verified ? '<span style="color:var(--blue);">✓</span>' : ''}
                        <span class="role-badge ${rc.class}">${rc.icon} ${currentUser.role}</span>
                    </span>
                    ${isAdmin() ? '<button class="btn btn-gold btn-sm" onclick="navigateTo(\'admin\')">👑 Panel</button>' : ''}
                    <button class="btn btn-red btn-sm" onclick="navigateTo('create-listing')">📝 İlan Ver</button>
                    <button class="btn btn-blue btn-sm" onclick="navigateTo('teams')">👥 Ekipler</button>
                    <button class="btn btn-outline btn-sm" onclick="logout()">Çıkış</button>
                `;
            } else {
                nav.innerHTML = `<button class="btn btn-outline btn-sm" onclick="navigateTo('login')">Giriş</button>`;
            }
        }

        // ==================== NAVİGASYON ====================
        async function navigateTo(page, data) {
            const content = document.getElementById('dynamicContent');
            updateNavbar();
            switch (page) {
                case 'home':
                    await renderHome(content);
                    break;
                case 'login':
                    renderLogin(content);
                    break;
                case 'create-listing':
                    if (!currentUser) { showToast('⚠️ Giriş yap!');
                        renderLogin(content); return; }
                    renderCreateListing(content);
                    break;
                case 'admin':
                    if (!isAdmin()) { showToast('⚠️ Yetkisiz!'); await renderHome(content); return; }
                    await renderAdminPanel(content);
                    break;
                case 'profile':
                    await renderProfile(content, data);
                    break;
                case 'leaderboard':
                    await renderLeaderboard(content);
                    break;
                case 'chat':
                    await renderChat(content);
                    break;
                case 'events':
                    await renderEvents(content);
                    break;
                case 'notifications':
                    await renderNotifications(content);
                    break;
                case 'teams':
                    await renderTeams(content);
                    break;
                case 'messages':
                    await renderMessages(content, data);
                    break;
                case 'server-map':
                    await renderServerMap(content);
                    break;
                default:
                    await renderHome(content);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== LOGIN ====================
        function renderLogin(content) {
            content.innerHTML = `
                <div class="form-container">
                    <h2>🔐 EkipBul'a Giriş Yap</h2>
                    <p style="text-align:center;color:var(--text2);margin-bottom:24px;font-size:14px;">Tek tıkla hızlı giriş</p>
                    <button class="btn btn-discord" style="width:100%;margin-bottom:14px;padding:18px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:16px;" onclick="loginWithDiscord()">🟣 Discord ile Giriş Yap</button>
                    <button class="btn btn-github" style="width:100%;margin-bottom:14px;padding:18px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:16px;" onclick="loginWithGitHub()">🐙 GitHub ile Giriş Yap</button>
                    <button class="btn btn-guest" style="width:100%;padding:18px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:16px;" onclick="loginAsGuest()">👻 Misafir Girişi</button>
                </div>
            `;
        }

        async function loginWithDiscord() {
            await sb.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: 'https://ekipbul.onrender.com' } });
        }

        async function loginWithGitHub() {
            await sb.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: 'https://ekipbul.onrender.com' } });
        }

        async function loginAsGuest() {
            try {
                const { data, error } = await sb.auth.signInAnonymously();
                if (error) { showToast('❌ Misafir girişi başarısız!'); return; }
                if (data.user) {
                    const guestName = 'Misafir_' + Math.floor(Math.random() * 9000 + 1000);
                    const { error: upsertError } = await sb.from('profiles').upsert([{
                        id: data.user.id,
                        username: guestName,
                        role: 'Player',
                        is_premium: false,
                        is_banned: false,
                        is_verified: false,
                        game_hours: '0',
                        rating: 0,
                        rating_count: 0,
                        invite_count: 0,
                        created_at: new Date().toISOString()
                    }], { onConflict: 'id' });
                    if (upsertError) console.error('Profil oluşturma hatası:', upsertError);
                    currentUser = {
                        id: data.user.id,
                        email: '',
                        username: guestName,
                        role: 'Player',
                        is_premium: false,
                        is_verified: false,
                        discord: '',
                        avatar_url: '',
                        banner_url: '',
                        game_hours: '0',
                        bio: '',
                        badges: [],
                        rating: 0,
                        rating_count: 0,
                        invite_code: '',
                        invite_count: 0
                    };
                    updateNavbar();
                    showToast('✅ Hoş geldin, ' + guestName + '!');
                    navigateTo('home');
                }
            } catch (err) { showToast('❌ Bir hata oluştu!'); }
        }

        async function logout() {
            await sb.auth.signOut();

                    <button class="tab-btn" onclick="filterHomeTab('lfm', this)">Aranan</button>
                    <button class="tab-btn" onclick="filterHomeTab('lfg', this)">Arıyor</button>
                    <button class="tab-btn" onclick="filterHomeTab('premium', this)">⭐ Premium</button>
                    <button class="tab-btn" onclick="filterHomeTab('pinned', this)">📌 Sabit</button>
                    <button class="tab-btn" onclick="filterHomeTab('favorites', this)">❤️ Favoriler</button>
                </div>

                       style="width:100%;padding:16px 20px;border-radius:30px;background:var(--card);border:2px solid var(--border);color:#fff;margin-bottom:20px;font-size:14px;outline:none;font-family:var(--font);"

                <div class="listings" id="homeListings"></div>
                <div class="pagination" id="pagination"></div>
            `;
            window._homeListings = allListings;
            window._homeFilter = 'all';
            window._homePage = 1;
            window._homeSearch = '';
            renderHomeListings();
        }

        function renderHomeListings() {
            const container = document.getElementById('homeListings');
            if (!container) return;
            let data = window._homeListings || [];
            if (window._homeFilter === 'lfm') data = data.filter(l => l.type === 'lfm');
            if (window._homeFilter === 'lfg') data = data.filter(l => l.type === 'lfg');
            if (window._homeFilter === 'premium') data = data.filter(l => l.is_premium);
            if (window._homeFilter === 'pinned') data = data.filter(l => l.is_pinned);
            if (window._homeFilter === 'favorites') data = data.filter(l => favorites.includes(l.id));
            if (window._homeSearch) {
                const s = window._homeSearch.toLowerCase();
                data = data.filter(l => l.title.toLowerCase().includes(s) || l.description.toLowerCase().includes(s) || l
                    .server.toLowerCase().includes(s));
            }
            const perPage = 8;
            const page = window._homePage || 1;
            const totalPages = Math.ceil(data.length / perPage);
            const slice = data.slice((page - 1) * perPage, page * perPage);
            container.innerHTML = slice.map(l => {
                const avLetter = (l.author_id || '?').charAt(0).toUpperCase();
                const isFav = favorites.includes(l.id);
                return `
                    <div class="listing-card ${l.is_premium ? 'premium' : ''} ${l.is_pinned ? 'pinned' : ''}" onclick="viewListing('${l.id}')">
                        <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${l.id}')">${isFav ? '❤️' : '🤍'}</button>
                        ${l.is_pinned ? '<div style="position:absolute;top:10px;left:20px;font-size:20px;">📌</div>' : ''}
                        ${l.is_premium && !l.is_pinned ? '<div style="position:absolute;top:10px;left:20px;font-size:20px;">⭐</div>' : ''}
                        <div class="listing-header">
                            <div class="listing-avatar">${avLetter}</div>
                            <div class="listing-title">${l.title}</div>
                        </div>
                        <div class="listing-meta"><span>🌐 ${l.server}</span><span>🕐 ${timeAgo(l.created_at)}</span><span>👁 ${l.views || 0}</span></div>
                        <div class="listing-tags">
                            <span class="tag ${l.type === 'lfm' ? 'tag-lfm' : 'tag-lfg'}">${l.type === 'lfm' ? 'Aranan' : 'Arıyor'}</span>
                            <span class="tag tag-server">${l.server}</span>
                            ${l.is_premium ? '<span class="tag tag-premium">Premium</span>' : ''}
                            ${l.is_pinned ? '<span class="tag tag-pinned">Sabit</span>' : ''}
                        </div>
                        <div class="listing-action">
                            <button class="btn btn-blue btn-sm" onclick="event.stopPropagation();copyDiscord('${l.discord}')">📩 İletişim</button>
                        </div>
                    </div>
                `;
            }).join('');
            const pagDiv = document.getElementById('pagination');
            if (pagDiv && totalPages > 1) {
                pagDiv.innerHTML = Array.from({ length: totalPages }, function(_, i) {
                    const pageNum = i + 1;
                    return `<button class="page-btn ${pageNum === page ? 'active' : ''}" onclick="window._homePage=${pageNum};renderHomeListings();">${pageNum}</button>`;
                }).join('');
            }
        }

        function filterHomeTab(tab, btn) {
            window._homeFilter = tab;
            window._homePage = 1;
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            renderHomeListings();
        }

        function searchListings() {
            window._homeSearch = document.getElementById('searchInput')?.value || '';
            window._homePage = 1;
            renderHomeListings();
        }

        function toggleFavorite(id) {
            if (favorites.includes(id)) favorites = favorites.filter(function(f) { return f !== id; });
            else favorites.push(id);
            localStorage.setItem('ekipbul_favorites', JSON.stringify(favorites));
            renderHomeListings();
        }

        async function viewListing(id) {
            const { data: listing, error: listError } = await sb.from('listings').select('*').eq('id', id).single();
            if (listError || !listing) { showToast('❌ İlan bulunamadı!'); return; }
            const { error: viewError } = await sb.from('listings').update({ views: (listing.views || 0) + 1 }).eq('id', id);
            if (viewError) console.error('Görüntüleme hatası:', viewError);
            const { data: comments, error: commError } = await sb.from('comments').select('*').eq('listing_id', id).order(
                'created_at', { ascending: true });
            if (commError) console.error('Yorum yükleme hatası:', commError);
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    <h3>${listing.title}</h3>
                    <p class="modal-server">🌐 ${listing.server} · 🕐 ${timeAgo(listing.created_at)}</p>
                    <div class="modal-desc">${listing.description}</div>
                    <div class="modal-row"><span>İlan Türü</span><span>${listing.type === 'lfm' ? 'Aranan' : 'Arıyor'}</span></div>
                    <div class="modal-row"><span>Discord</span><span>${listing.discord}</span></div>
                    <button class="btn-modal-contact" onclick="copyDiscord('${listing.discord}')">💬 Discord'u Kopyala</button>
                    ${isAdmin() ? `<button class="btn btn-blue btn-sm" style="width:100%;margin-top:8px;" onclick="togglePin('${listing.id}', ${listing.is_pinned || false});this.closest('.modal-overlay').remove();">${listing.is_pinned ? '📌 Sabitlemeyi Kaldır' : '📌 Sabitle'}</button>` : ''}
                    ${isAdmin() ? `<button class="btn btn-red btn-sm" style="width:100%;margin-top:8px;" onclick="deleteListing('${listing.id}');this.closest('.modal-overlay').remove();">🗑️ Sil</button>` : ''}
                    <div style="margin-top:20px;">
                        <h4>💬 Yorumlar (${(comments || []).length})</h4>
                        <div id="modalCommentsList">
                            ${(comments || []).map(function(c) { return `<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`; }).join('')}
                        </div>
                        ${currentUser ? `
                            <textarea id="commentText" placeholder="Yorum yaz..." style="width:100%;margin-top:10px;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);font-family:var(--font);" rows="2"></textarea>
                            <button class="btn btn-green btn-sm" style="margin-top:8px;" onclick="addComment('${listing.id}')">Gönder</button>
                        ` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        }

        async function togglePin(id, current) {
            const { error } = await sb.from('listings').update({ is_pinned: !current }).eq('id', id);
            if (error) { showToast('❌ Sabitleme hatası!'); return; }
            showToast(current ? '📌 Sabitleme kaldırıldı' : '📌 Sabitlendi!');
            navigateTo('home');
        }

        async function addComment(listingId) {
            const text = document.getElementById('commentText')?.value.trim();
            if (!text) return;
            const { error } = await sb.from('comments').insert([{
                listing_id: listingId,
                user_id: currentUser.id,
                username: currentUser.username,
                text: text,
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ Yorum eklenemedi! ' + error.message); return; }
            showToast('💬 Yorum eklendi!');
            document.getElementById('commentText').value = '';
            const { data: comments, error: commError } = await sb.from('comments').select('*').eq('listing_id', listingId).order(
                'created_at', { ascending: true });
            if (commError) console.error('Yorum yenileme hatası:', commError);
            const cList = document.getElementById('modalCommentsList');
            if (cList && comments) {
                cList.innerHTML = comments.map(function(c) { return `<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`; })
                    .join('');
            }
        }

        async function deleteListing(id) {
            const { error } = await sb.from('listings').update({ deleted: true }).eq('id', id);
            if (error) { showToast('❌ Silme hatası!'); return; }
            showToast('🗑️ İlan silindi!');
            navigateTo('home');
        }

            const bannerStyle = user.banner_url ? `background-image:url(${user.banner_url});` : '';
            const isOwn = currentUser && currentUser.id === user.id;
            const isOnline = (user.last_login && (new Date() - new Date(user.last_login)) < 300000);
            content.innerHTML = `
                <div class="admin-panel">
                    <div class="profile-banner" style="${bannerStyle}"></div>
                    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
                        <div class="modal-avatar" style="${avStyle}">${avStyle ? '' : user.username.charAt(0).toUpperCase()} ${user.is_verified ? '<span class="verified-badge">✓</span>' : ''}</div>
                        <div>
                            <h2 style="color:${rc.color};margin:0">${rc.icon} ${user.username}</h2>
                            <span class="role-badge ${rc.class}">${user.role}</span>
                            ${user.is_premium ? '⭐' : ''} ${user.is_verified ? '✓ Onaylı' : ''}
                            <span class="online-dot ${isOnline ? 'active' : 'offline'}"></span> ${isOnline ? 'Çevrimiçi' : 'Çevrimdışı'}
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">${(user.badges || []).map(function(b) { return getBadgeHTML(b); }).join('')}</div>
                    <div class="modal-row"><span>Discord</span><span>${user.discord || '-'}</span></div>
                    <div class="modal-row"><span>Oyun Süresi</span><span>${user.game_hours || '0'}</span></div>
                    <div class="modal-row"><span>Puan</span><span>${'⭐'.repeat(Math.round(user.rating || 0))} (${user.rating_count || 0} oy)</span></div>
                    <div class="modal-row"><span>Davet</span><span>${user.invite_code || '-'} (${user.invite_count || 0} davet)</span></div>
                    <p style="margin-top:14px;color:var(--text2);font-size:14px;">${user.bio || 'Henüz biyografi eklenmemiş.'}</p>
                    ${!isOwn ? `
                        <div style="margin-top:16px;">
                            <p style="font-size:12px;color:var(--text3);margin-bottom:8px;">Puanla:</p>
                            <div class="star-rating" id="starRating">${[1,2,3,4,5].map(function(i) { return `<span class="star" onclick="rateUser('${user.id}', ${i})">★</span>`; }).join('')}</div>
                        </div>
                    ` : `
                        <div style="margin-top:20px;">
                            <h4 style="margin-bottom:12px;">✏️ Profili Düzenle</h4>
                            <div class="form-group"><label>Avatar URL (GIF)</label><input type="text" id="editAvatar" value="${user.avatar_url || ''}"></div>
                            <div class="form-group"><label>Banner URL (GIF)</label><input type="text" id="editBanner" value="${user.banner_url || ''}"></div>
                            <div class="form-group"><label>Kullanıcı Adı ${user.last_username_change ? '(Son değişim: ' + new Date(user.last_username_change).toLocaleDateString('tr-TR') + ')' : ''}</label><input type="text" id="editUsername" value="${user.username}" ${user.last_username_change && (new Date() - new Date(user.last_username_change)) < 172800000 ? 'disabled' : ''}></div>
                            <div class="form-group"><label>Oyun Süresi</label><input type="text" id="editHours" value="${user.game_hours || '0'}"></div>
                            <div class="form-group"><label>Biyografi</label><textarea id="editBio">${user.bio || ''}</textarea></div>
                            <button class="btn btn-red" style="width:100%;" onclick="saveProfile('${user.id}')">💾 Kaydet</button>
                        </div>
                    `}
                    <button class="btn btn-outline" style="width:100%;margin-top:16px;" onclick="navigateTo('home')">← Ana Sayfa</button>
                </div>
            `;
        }

        async function rateUser(uid, rating) {
            if (!currentUser || currentUser.id === uid) return;
            const { data: user, error: userError } = await sb.from('profiles').select('*').eq('id', uid).single();
            if (userError || !user) return;
            const newRating = ((user.rating || 0) * (user.rating_count || 0) + rating) / ((user.rating_count || 0) + 1);
            const badges = [...(user.badges || [])];
            if (newRating >= 4.5 && !badges.includes('toprated')) badges.push('toprated');
            const { error } = await sb.from('profiles').update({ rating: newRating, rating_count: (user.rating_count || 0) +
                    1, badges: badges }).eq('id', uid);
            if (error) { showToast('❌ Puanlama hatası!'); return; }
            showToast('⭐ ' + rating + ' yıldız verdiniz!');
            document.querySelectorAll('#starRating .star').forEach(function(s, i) { s.classList.toggle('active', i <
                    rating); });
        }

        async function saveProfile(uid) {
            const avatar_url = document.getElementById('editAvatar')?.value.trim() || '';
            const banner_url = document.getElementById('editBanner')?.value.trim() || '';
            const newUsername = document.getElementById('editUsername')?.value.trim();
            const game_hours = document.getElementById('editHours')?.value.trim() || '0';
            const bio = document.getElementById('editBio')?.value.trim() || '';
            const updates = { avatar_url, banner_url, game_hours, bio };
            if (newUsername && newUsername !== currentUser.username) {
                const { data: existing } = await sb.from('profiles').select('id').eq('username', newUsername).neq('id', uid)
                    .single();
                if (existing) { showToast('⚠️ Bu kullanıcı adı alınmış!'); return; }
                const { data: user } = await sb.from('profiles').select('last_username_change').eq('id', uid).single();
                if (user?.last_username_change && (new Date() - new Date(user.last_username_change)) < 172800000) {
                    showToast('⚠️ 2 gün dolmadan tekrar değiştiremezsin!');
                    return;
                }
                updates.username = newUsername;
                updates.last_username_change = new Date().toISOString();
            }
            const { error } = await sb.from('profiles').update(updates).eq('id', uid);
            if (error) { showToast('❌ Profil güncellenemedi!'); return; }
            if (currentUser && currentUser.id === uid) Object.assign(currentUser, updates);
            showToast('✅ Profil güncellendi!');
            navigateTo('profile', uid);
        }

        async function renderChat(content) {

                'created_at', { ascending: false }).limit(30);

        async function sendChat() {
            if (!currentUser) return;
            const input = document.getElementById('chatInput');
            const text = input?.value.trim();
            if (!text) return;
            const { error } = await sb.from('messages').insert([{
                sender_id: currentUser.id,
                receiver_id: 'all',
                text: text,
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ Mesaj gönderilemedi!'); return; }
            if (input) input.value = '';
            await renderChat(document.getElementById('dynamicContent'));

            const { error: banError } = await sb.from('bans').insert([{ user_id: userId, username: user?.username,
                reason: reason, banned_by: currentUser.username, unban_date: unbanDate ? new Date(unbanDate)
                .toISOString() : null, is_active: true }]);
            if (banError) { showToast('❌ Ban kaydı oluşturulamadı!'); return; }
            showToast('🚫 Kullanıcı yasaklandı!');
            showAdminSection('ban');
        }

        async function verifyUser() {
            const userId = document.getElementById('verifyUser')?.value;
            if (!userId) { showToast('⚠️ Kullanıcı seçin!'); return; }
            const { error } = await sb.from('profiles').update({ is_verified: true }).eq('id', userId);
            if (error) { showToast('❌ Onaylama başarısız!'); return; }
            showToast('✓ Kullanıcı onaylandı!');
            showAdminSection('verify');
        }

        async function sendAdminMessage() {
            const userId = document.getElementById('adminMsgUser')?.value;
            const text = document.getElementById('adminMsgText')?.value.trim();
            if (!userId || !text) { showToast('⚠️ Kullanıcı ve mesaj zorunlu!'); return; }
            // Bildirim olarak kaydet
            const { error: notifError } = await sb.from('notifications').insert([{ user_id: userId, text: '👑 Admin: ' +
                    text, created_at: new Date().toISOString() }]);
            if (notifError) { showToast('❌ Bildirim gönderilemedi!'); return; }
            // Popup göster
            showAdminPopup('👑 Admin Mesajı: ' + text);
            // Mesaj olarak da kaydet
            await sb.from('messages').insert([{ sender_id: currentUser.id, receiver_id: userId, text: '👑 Admin: ' +
                text, created_at: new Date().toISOString() }]);
            showToast('✅ Mesaj gönderildi! (Popup + Bildirim)');
            showAdminSection('adminMessage');
        }

        async function exportLogs() {
            const { data: logs } = await sb.from('logs').select('*').order('created_at', { ascending: false }).limit(500);
            let text = 'EKİPBUL LOG KAYITLARI\n' + '='.repeat(60) + '\n';
            (logs || []).forEach(function(l) { text +=
                    `[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail || ''}\n`; });
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ekipbul_log_' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click();
            showToast('📥 log.txt indirildi!');
        }

        // ==================== BAŞLANGIÇ ====================
        async function initApp() {
            updateNavbar();
            try {
                const { data: { session }, error: sessionError } = await sb.auth.getSession();
                if (sessionError) console.error('Session hatası:', sessionError);
                if (session) {
                    await loadUserProfile(session.user.id);
                    updateNavbar();
                }
            } catch (e) { console.error('Session yükleme hatası:', e); }
            navigateTo('home');
            console.log('🎮 EkipBul hazır!');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
