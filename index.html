        function timeAgo(dateStr) {
            const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' saat önce';
            return Math.floor(diff / 86400) + ' gün önce';
        }

        function showToast(msg) {

        // ==================== XP & SEVİYE ====================
        function xpForLevel(lvl) { return Math.floor(100 * Math.pow(lvl, 1.5)); }

        async function addXP(amount) {
            if (!currentUser) return;
            try {
                var result = await sb.from('profiles').select('xp,level,badges').eq('id', currentUser.id).single();
                var profile = result.data;
                if (!profile) return;
                var xp = (profile.xp || 0) + amount;
                var level = profile.level || 1;
                var leveledUp = false;
                while (xp >= xpForLevel(level)) {
                    xp -= xpForLevel(level);
                    level++;
                    leveledUp = true;
                }
                var badges = (profile.badges || []).slice();
                if (level >= 10 && badges.indexOf('level10') === -1) badges.push('level10');
                if (level >= 25 && badges.indexOf('level25') === -1) badges.push('level25');
                if (level >= 50 && badges.indexOf('level50') === -1) badges.push('level50');
                await sb.from('profiles').update({ xp: xp, level: level, badges: badges }).eq('id', currentUser.id);
                currentUser.xp = xp;
                currentUser.level = level;
                currentUser.badges = badges;
                if (leveledUp) showToast('🎉 Seviye atladın! Yeni seviye: ' + level);
                else showToast('⚡ +' + amount + ' XP kazandın!');
                updateXPDisplay();
            } catch (e) {}
        }

        function updateXPDisplay() {
            var el = document.getElementById('xpDisplay');
            if (!el || !currentUser) return;
            var lvl = currentUser.level || 1;
            var xp = currentUser.xp || 0;
            var needed = xpForLevel(lvl);
            var pct = Math.min(100, Math.round((xp / needed) * 100));
            el.innerHTML = '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);"><span>Seviye ' + lvl + '</span><span>' + xp + '/' + needed + ' XP</span></div><div class="level-bar"><div class="level-fill" style="width:' + pct + '%;"></div></div>';
        }

        async function claimDailyBonus() {
            if (!currentUser) return;
            var lastBonusTime = localStorage.getItem('ekipbul_last_bonus_' + currentUser.id);
            var now = new Date().getTime();
            if (lastBonusTime) {
                var timeDiff = now - parseInt(lastBonusTime);
                var hoursDiff = timeDiff / (1000 * 60 * 60);
                if (hoursDiff < 3) {
                    var remainingMinutes = Math.ceil((3 * 60) - (hoursDiff * 60));
                    var remainingHours = Math.floor(remainingMinutes / 60);
                    var remainingMins = remainingMinutes % 60;
                    var timeMsg = remainingHours > 0 ? remainingHours + ' saat ' + remainingMins + ' dakika' : remainingMins + ' dakika';
                    showToast('⚠️ Bonus için ' + timeMsg + ' beklemelisin!');
                    return;
                }
            }
            await addXP(50);
            var profileResult = await sb.from('profiles').select('coins').eq('id', currentUser.id).single();
            var newCoins = (profileResult.data?.coins || 0) + 50;
            await sb.from('profiles').update({ coins: newCoins }).eq('id', currentUser.id);
            currentUser.coins = newCoins;
            localStorage.setItem('ekipbul_last_bonus_' + currentUser.id, now.toString());
            var today = new Date().toISOString().split('T')[0];
            var existingResult = await sb.from('daily_tasks').select('*').eq('user_id', currentUser.id).eq('task_date', today).single();
            if (!existingResult.data) {
                await sb.from('daily_tasks').insert([{ user_id: currentUser.id, task_date: today, login: true }]);
            } else {
                await sb.from('daily_tasks').update({ login: true }).eq('id', existingResult.data.id);
            }
            showToast('🎁 Bonus alındı! +50 XP +50 Coin');
            startBonusTimer();
            updateXPDisplay();
            renderHome();
        }

        function startBonusTimer() {
            if (bonusTimerInterval) clearInterval(bonusTimerInterval);
            updateBonusDisplay();
            bonusTimerInterval = setInterval(updateBonusDisplay, 1000);
        }

        function updateBonusDisplay() {
            var timerEl = document.getElementById('bonusTimer');
            var bonusBtn = document.getElementById('bonusBtn');
            if (!timerEl || !bonusBtn || !currentUser) return;
            var lastBonusTime = localStorage.getItem('ekipbul_last_bonus_' + currentUser.id);
            var now = new Date().getTime();
            if (!lastBonusTime) {
                timerEl.textContent = '🎁 Bonus Hazır!';
                timerEl.style.color = 'var(--green)';
                bonusBtn.disabled = false;
                bonusBtn.style.opacity = '1';
                bonusBtn.textContent = '🎁 Bonusu Al';
                return;
            }
            var timeDiff = now - parseInt(lastBonusTime);
            var totalSeconds = Math.floor(timeDiff / 1000);
            var maxSeconds = 3 * 60 * 60;
            var remainingSeconds = maxSeconds - totalSeconds;
            if (remainingSeconds <= 0) {
                timerEl.textContent = '🎁 Bonus Hazır!';
                timerEl.style.color = 'var(--green)';
                bonusBtn.disabled = false;
                bonusBtn.style.opacity = '1';
                bonusBtn.textContent = '🎁 Bonusu Al';
                return;
            }
            var hours = Math.floor(remainingSeconds / 3600);
            var minutes = Math.floor((remainingSeconds % 3600) / 60);
            var seconds = remainingSeconds % 60;
            var timeText = '';
            if (hours > 0) timeText += hours + 's ';
            timeText += minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
            timerEl.textContent = '⏳ ' + timeText;
            timerEl.style.color = 'var(--yellow)';
            bonusBtn.disabled = true;
            bonusBtn.style.opacity = '0.5';
            bonusBtn.textContent = '🔒 Kilitli';
        }

        async function processReferral(userId) {

                // Kullanıcı zaten bir davet kodu kullanmış mı kontrol et

                if (currentProfile?.referred_by) {
                    showToast('⚠️ Zaten Bir Davet Kodu Kullandın!');
                    localStorage.removeItem('ekipbul_referred_by');
                    return;
                }
                var inviterResult = await sb.from('profiles').select('id,username,invite_count,coins,badges').eq('referral_code', refCode).single();
                var inviter = inviterResult.data;
                if (!inviter || inviter.id === userId) { localStorage.removeItem('ekipbul_referred_by'); return; }
                var newInviteCount = (inviter.invite_count || 0) + 1;
                var newCoins = (inviter.coins || 0) + 100;
                var badges = (inviter.badges || []).slice();
                if (newInviteCount >= 5 && badges.indexOf('inviter5') === -1) badges.push('inviter5');
                if (newInviteCount >= 10 && badges.indexOf('inviter10') === -1) badges.push('inviter10');
                if (newInviteCount >= 25 && badges.indexOf('inviter25') === -1) badges.push('inviter25');
                await sb.from('profiles').update({ invite_count: newInviteCount, coins: newCoins, badges: badges }).eq('id', inviter.id);
                await sb.from('profiles').update({ referred_by: inviter.id }).eq('id', userId);
                try {
                    await sb.from('notifications').insert([{
                        user_id: inviter.id,
                        text: '🎉 Yeni davet! Linkinle kayıt oldu!\n📨 Toplam: ' + newInviteCount + '\n🪙 +100 Coin!',
                        is_read: false, created_at: new Date().toISOString()
                    }]);
                } catch (e) {}
                if (currentUser && currentUser.id === userId) {
                    currentUser.coins = (currentUser.coins || 0) + 25;
                    await sb.from('profiles').update({ coins: currentUser.coins }).eq('id', userId);
                    showToast('🎁 Davetle geldiğin için +25 Coin!');
                }
                localStorage.removeItem('ekipbul_referred_by');
            } catch (e) { console.error('Davet işleme hatası:', e); }
        }

                const { data: user } = await sb.auth.getUser();

                        await sb.from('profiles').update({ level: 9999, coins: 10000 }).eq('id', profile.id);
                        profile.level = 9999;
                        profile.coins = 10000;

                }
                currentUser = {
                    id: profile.id,
                    email: user?.user?.email || '',
                    username: profile.username,
                    role: profile.role,
                    is_premium: profile.is_premium,
                    is_verified: profile.is_verified,
                    discord: profile.discord || '',
                    avatar_url: profile.avatar_url,
                    game_hours: profile.game_hours,
                    bio: profile.bio,
                    badges: profile.badges || [],
                    rating: profile.rating,
                    rating_count: profile.rating_count,
                    invite_code: profile.referral_code,
                    invite_count: profile.invite_count || 0,
                    last_username_change: profile.last_username_change,
                    xp: profile.xp || 0,
                    level: profile.level || 1,
                    coins: profile.coins || 0,
                    premium_until: profile.premium_until,
                    name_color: profile.name_color || null,
                    frame_type: profile.frame_type || null
                };
                if (!currentUser.invite_code) {
                    var code = 'EKIP' + Math.random().toString(36).substring(2, 8).toUpperCase();
                    await sb.from('profiles').update({ referral_code: code }).eq('id', userId);
                    currentUser.invite_code = code;

        async function buyMarketItem(itemId, price) {
            if (!currentUser) return;
            if ((currentUser.coins || 0) < price) { showToast('⚠️ Yetersiz coin!'); return; }
            if (inventory.includes(itemId)) { showToast('⚠️ Bu ürüne zaten sahipsin!'); return; }
            const item = MARKET_ITEMS.find(function(i) { return i.id === itemId; });
            if (!item) return;
            const newCoins = (currentUser.coins || 0) - price;
            await sb.from('profiles').update({ coins: newCoins }).eq('id', currentUser.id);
            currentUser.coins = newCoins;
            // Envantere ekle
            await sb.from('inventory').insert([{ user_id: currentUser.id, item_id: itemId, purchased_at: new Date().toISOString() }]);
            inventory.push(itemId);
            localStorage.setItem('ekipbul_inventory', JSON.stringify(inventory));
            // Ürün efektini uygula
            switch (itemId) {
                case 'gold_frame':
                    await sb.from('profiles').update({ frame_type: 'gold_frame' }).eq('id', currentUser.id);
                    currentUser.frame_type = 'gold_frame';
                    break;
                case 'diamond_frame':
                    await sb.from('profiles').update({ frame_type: 'diamond_frame' }).eq('id', currentUser.id);
                    currentUser.frame_type = 'diamond_frame';
                    break;
                case 'red_name':
                    await sb.from('profiles').update({ name_color: '#ff4444' }).eq('id', currentUser.id);
                    currentUser.name_color = '#ff4444';
                    break;
                case 'gold_name':
                    await sb.from('profiles').update({ name_color: '#ffd700' }).eq('id', currentUser.id);
                    currentUser.name_color = '#ffd700';
                    break;
                case 'custom_color':
                    var hex = prompt('İstediğiniz HEX renk kodunu girin (örn: #00ff00):', '#00ff00');
                    if (hex && /^#[0-9A-F]{6}$/i.test(hex)) {
                        await sb.from('profiles').update({ name_color: hex }).eq('id', currentUser.id);
                        currentUser.name_color = hex;
                    } else {
                        await sb.from('profiles').update({ name_color: '#a855f7' }).eq('id', currentUser.id);
                        currentUser.name_color = '#a855f7';
                    }
                    break;
                case 'premium_1':
                    var until = new Date();
                    until.setDate(until.getDate() + 1);
                    await sb.from('profiles').update({ is_premium: true, premium_until: until.toISOString() }).eq('id', currentUser.id);
                    currentUser.is_premium = true;
                    currentUser.premium_until = until.toISOString();
                    startPremiumCheck();
                    break;
                case 'xp_boost':
                    await addXP(75); // %50 bonus ile 75 XP
                    showToast('⚡ XP Boost aktif! +75 XP kazandın!');
                    break;
            }
            showToast('✅ ' + item.name + ' satın alındı!');
            updateNavbar();
            renderMarket();
        }

async function renderChat() {
    const content = document.getElementById('dynamicContent');
    if (!content) return;
    const { data: messages } = await sb.from('messages').select('sender_id,text,created_at').eq('receiver_id', 'all').order('created_at', { ascending: false }).limit(40);
    
    const senderIds = [...new Set((messages || []).map(function(m) { return m.sender_id; }))];
    for (let i = 0; i < senderIds.length; i++) {
        if (!usernameCache[senderIds[i]]) {
            try {
                const { data: profile } = await sb.from('profiles').select('username').eq('id', senderIds[i]).single();
                if (profile) { usernameCache[senderIds[i]] = profile.username; }
                else { usernameCache[senderIds[i]] = senderIds[i].substring(0, 8); }
            } catch (e) { usernameCache[senderIds[i]] = senderIds[i].substring(0, 8); }
        }
    }
    
    let html = '<div class="forum-box"><div class="forum-box-header"><span class="icon">💬</span> Canlı Sohbet</div><div id="chatMessages" style="height:400px;overflow-y:auto;padding:12px 16px;font-size:13px;">';

        const senderName = escapeHTML(usernameCache[m.sender_id] || m.sender_id.substring(0, 8));
        html += '<div style="padding:6px 0;border-bottom:1px solid var(--border2);"><strong style="color:var(--blue);">' + senderName + ':</strong> ' + escapeHTML(m.text) + '<span style="color:var(--text3);font-size:10px;float:right;">' + timeAgo(m.created_at) + '</span></div>';

        }

            if (error) { showToast('❌ Duyuru eklenemedi!'); return; }
            // Tüm kullanıcıların shown listesini temizle (yeni duyuru herkese gösterilsin)

            showAdminSection('announcement');
        }

        async function togglePin(id, current) { await sb.from('listings').update({ is_pinned: !current }).eq('id', id); showToast(current ? '📌 Sabitleme kaldırıldı' : '📌 Sabitlendi!'); showAdminSection('listings'); }
        async function deleteListing(id) { await sb.from('listings').update({ deleted: true }).eq('id', id); showToast('🗑️ İlan silindi!'); showAdminSection('listings'); }
        async function banUser() {
            const userId = document.getElementById('banUserId')?.value || '';
            const reason = document.getElementById('banReason')?.value.trim() || '';
            if (!userId || !reason) { showToast('⚠️ Kullanıcı ve sebep zorunlu!'); return; }
            await sb.from('profiles').update({ is_banned: true }).eq('id', userId);
            showToast('🚫 Kullanıcı yasaklandı!');
            showAdminSection('ban');
        }
        async function unbanUser() {
            const userId = document.getElementById('unbanUserId')?.value || '';
            if (!userId) return;
            await sb.from('profiles').update({ is_banned: false }).eq('id', userId);
            showToast('✅ Ban açıldı!');
            showAdminSection('unban');
        }
        async function verifyUser() {
            const userId = document.getElementById('verifyUser')?.value || '';
            if (!userId) return;
            await sb.from('profiles').update({ is_verified: true }).eq('id', userId);
            showToast('✓ Kullanıcı onaylandı!');
        }
        async function givePremium() {
            const userId = document.getElementById('premUser')?.value || '';
            const days = parseInt(document.getElementById('premDays')?.value || '7');
            if (!userId || days < 1) return;
            var until = new Date();
            until.setDate(until.getDate() + days);
            await sb.from('profiles').update({ is_premium: true, premium_until: until.toISOString() }).eq('id', userId);
            showToast('⭐ ' + days + ' gün premium verildi!');
        }
        async function changeRole() {
            const userId = document.getElementById('roleUser')?.value || '';
            const newRole = document.getElementById('roleName')?.value || '';
            if (!userId || !newRole) return;
            await sb.from('profiles').update({ role: newRole }).eq('id', userId);
            showToast('🎭 Rol değiştirildi!');
            showAdminSection('role');
        }
        async function giveXpAndCoins() {
            const userId = document.getElementById('targetUser')?.value || '';
            const xpAmount = parseInt(document.getElementById('giveXp')?.value || '0');
            const coinAmount = parseInt(document.getElementById('giveCoins')?.value || '0');
            if (!userId || (xpAmount === 0 && coinAmount === 0)) { showToast('⚠️ Değer girin!'); return; }
            const { data: target } = await sb.from('profiles').select('xp,level,coins').eq('id', userId).single();
            if (target) {
                var newXp = (target.xp || 0) + xpAmount;
                var newLevel = target.level || 1;
                while (newXp >= xpForLevel(newLevel)) { newXp -= xpForLevel(newLevel); newLevel++; }
                var newCoins = (target.coins || 0) + coinAmount;
                await sb.from('profiles').update({ xp: newXp, level: newLevel, coins: newCoins }).eq('id', userId);
            }
            showToast('✅ XP/Coin verildi!');
        }
        async function sendAdminMessage() {
            const userId = document.getElementById('adminMsgUser')?.value || '';
            const text = document.getElementById('adminMsgText')?.value.trim() || '';
            if (!userId || !text) return;
            await sb.from('notifications').insert([{ user_id: userId, text: '👑 Admin Mesajı: ' + escapeHTML(text), is_read: false, created_at: new Date().toISOString() }]);
            showToast('✅ Mesaj gönderildi!');
        }

        // ==================== MESAJLAR (DM) ====================
        async function renderMessages(receiverId) {
            if (!currentUser) { showToast('⚠️ Giriş yap!'); return; }
            const content = document.getElementById('dynamicContent');
            if (!content) return;
            const { data: users } = await sb.from('profiles').select('id,username');
            let html = '<h2 style="margin-bottom:20px;">💬 Mesajlar</h2><div class="form-group"><label>Alıcı</label><select id="msgReceiver" style="width:100%;padding:14px;border-radius:6px;background:var(--bg);color:var(--text);border:2px solid var(--border);" onchange="navigateTo(\'messages\', this.value)"><option value="">Seçin...</option>';
            (users || []).filter(function(u) { return u.id !== currentUser.id; }).forEach(function(u) { html += '<option value="' + escapeHTML(u.id) + '" ' + (u.id === receiverId ? 'selected' : '') + '>' + escapeHTML(u.username) + '</option>'; });
            html += '</select></div>';
            if (receiverId) {
                const { data: msgs } = await sb.from('messages').select('*').or('sender_id.eq.' + currentUser.id + ',receiver_id.eq.' + currentUser.id).order('created_at', { ascending: true });
                const privateMsgs = (msgs || []).filter(function(m) { return (m.sender_id === currentUser.id && m.receiver_id === receiverId) || (m.sender_id === receiverId && m.receiver_id === currentUser.id); });
                html += '<div style="height:300px;overflow-y:auto;padding:12px;background:var(--card);border-radius:6px;border:1px solid var(--border);margin-top:10px;" id="privateMessages">';
                privateMsgs.forEach(function(m) { html += '<div style="padding:8px;margin-bottom:4px;border-radius:6px;' + (m.sender_id === currentUser.id ? 'background:var(--red);color:#fff;margin-left:40px;' : 'background:var(--card2);margin-right:40px;') + '"><b style="font-size:10px;">' + escapeHTML((m.sender_id || '').substring(0, 8)) + '</b><br>' + escapeHTML(m.text) + '</div>'; });
                html += '</div><div style="display:flex;gap:10px;margin-top:10px;"><input type="text" id="msgText" placeholder="Mesaj..." maxlength="500" style="flex:1;padding:14px;border-radius:30px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;"><button class="btn-submit" style="width:auto;margin-top:0;" onclick="sendMessage()">Gönder</button></div>';
            }
            html += '<button class="btn-submit blue" style="margin-top:16px;" onclick="navigateTo(\'home\')">← Ana Sayfa</button>';
            content.innerHTML = html;
            const sidebar = document.getElementById('sidebarContent');
            if (sidebar) sidebar.innerHTML = '';
            setTimeout(function() { const pmDiv = document.getElementById('privateMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight; }, 100);
        }

async function sendMessage() {
    const receiverId = document.getElementById('msgReceiver')?.value || '';
    const text = document.getElementById('msgText')?.value.trim() || '';
    if (!receiverId || !text) { showToast('⚠️ Alıcı ve mesaj zorunlu!'); return; }
    if (text.length > 500) { showToast('⚠️ Mesaj 500 karakteri geçemez!'); return; }
    await sb.from('messages').insert([{ sender_id: currentUser.id, receiver_id: receiverId, text: escapeHTML(text), created_at: new Date().toISOString() }]);
    // Alıcıya bildirim gönder
    try {
        await sb.from('notifications').insert([{
            user_id: receiverId,
            text: '💬 ' + currentUser.username + ' size özel mesaj gönderdi:\n"' + escapeHTML(text.substring(0, 100)) + (text.length > 100 ? '...' : '') + '"',
            is_read: false,
            created_at: new Date().toISOString()
        }]);
    } catch (e) {}
    showToast('✅ Mesaj gönderildi!');
    navigateTo('messages', receiverId);
}

        // ==================== BAŞLANGIÇ ====================
        async function initApp() {
            checkReferralCode();
            updateNavbar();
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session && session.user) {
                    await loadUserProfile(session.user.id);
                }
            } catch (e) { console.error('Başlangıç hatası:', e); }
            updateNavbar();
            startBonusTimer();
            navigateTo('home');
        }

        sb.auth.onAuthStateChange(function(event, session) {
            if (event === 'SIGNED_IN' && session) {
                loadUserProfile(session.user.id).then(function() { updateNavbar(); navigateTo('home'); });
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                clearInterval(notifCheckInterval);
                clearInterval(xpCheckInterval);
                clearInterval(bonusTimerInterval);
                clearInterval(premiumCheckInterval);
                updateNavbar();
                navigateTo('home');
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
