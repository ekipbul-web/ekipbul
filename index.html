<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkipBul - RP Grand Mobile</title>
    <meta name="description" content="EkipBul - RP Grand Mobile için ekip bulma platformu">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --card2: #1a1a1a;
            --border: #222222;
            --red: #e74c3c;
            --red2: #ff4444;
            --blue: #3498db;
            --blue2: #2980b9;
            --yellow: #f1c40f;
            --gold: #ffd700;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #777777;
            --green: #2ecc71;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }

        /* NAVBAR */
        .navbar {
            background: #000;
            border-bottom: 2px solid var(--red);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -1px;
        }
        .logo span { color: var(--red); }
        .logo-icon {
            background: var(--red);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .nav-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
            text-decoration: none;
        }
        .btn-outline { background: transparent; color: #fff; border: 2px solid var(--border); }
        .btn-outline:hover { border-color: var(--red); }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { background: #c0392b; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-blue:hover { background: var(--blue2); }
        .btn-gold { background: var(--yellow); color: #000; }
        .btn-green { background: var(--green); color: #fff; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .role-dot { width: 8px; height: 8px; border-radius: 50%; }
        .role-admin { color: #e74c3c; }
        .role-chief { color: #f1c40f; }
        .role-curator { color: #ffd700; }
        .role-deputy { color: #ffa500; }
        .role-senior { color: #3498db; }
        .role-moderator { color: #2ecc71; }
        .role-writer { color: #9b59b6; }
        .role-technical { color: #00bcd4; }
        .role-player { color: #aaa; }

        .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #1a0000 0%, #0a0a0a 50%, #001a1a 100%);
            padding: 32px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .hero h1 { font-size: 24px; margin-bottom: 6px; }
        .hero h1 span { color: var(--red); }
        .hero p { color: var(--text2); font-size: 13px; }

        /* TABS */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            padding: 6px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            color: var(--text2);
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .tab-btn.active { background: var(--red); color: #fff; }

        /* CARDS */
        .listings { display: flex; flex-direction: column; gap: 10px; }
        .listing-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .listing-card:hover { border-color: var(--red); }
        .listing-card.premium { border-color: var(--yellow); background: #1a1a00; }
        .listing-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .listing-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            flex-shrink: 0;
        }
        .av-red { background: #3d0000; color: var(--red); }
        .av-blue { background: #001a3d; color: var(--blue); }
        .av-green { background: #003d00; color: var(--green); }
        .av-gold { background: #3d3000; color: var(--yellow); }
        .av-purple { background: #1a003d; color: #9b59b6; }
        .listing-title { font-weight: 700; font-size: 14px; flex: 1; min-width: 150px; }
        .listing-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
        .listing-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
        }
        .tag-lfm { background: #3d3000; color: var(--yellow); }
        .tag-lfg { background: #003d1a; color: var(--green); }
        .tag-server { background: #1a1a2e; color: var(--blue); }
        .tag-premium { background: #3d0000; color: var(--red2); }
        .listing-action { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .listing-views { font-size: 10px; color: var(--text3); }

        /* FORMS */
        .form-container {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 500px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }
        .form-container h2 { text-align: center; margin-bottom: 16px; font-size: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 12px; color: var(--text2); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: #fff;
            font-size: 13px;
            outline: none;
            font-family: var(--font);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--red); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:hover { background: #c0392b; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .modal h3 { font-size: 16px; margin-bottom: 4px; }
        .modal .modal-server { color: var(--text2); font-size: 12px; margin-bottom: 10px; }
        .modal .modal-desc {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text2);
            margin-bottom: 12px;
        }
        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .modal-row span:first-child { color: var(--text3); }
        .btn-modal-contact {
            width: 100%;
            padding: 10px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        /* ADMIN PANEL */
        .admin-panel {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--red);
        }
        .admin-panel h2 { font-size: 20px; margin-bottom: 16px; color: var(--red); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .admin-card {
            background: var(--bg);
            border-radius: 8px;
            padding: 14px;
            border: 1px solid var(--border);
        }
        .admin-card h4 { font-size: 13px; margin-bottom: 8px; color: var(--yellow); }
        .admin-card .stat-big { font-size: 28px; font-weight: 900; color: var(--red); }
        .admin-card .stat-label { font-size: 11px; color: var(--text3); }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--red);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 9999;
            display: none;
            box-shadow: var(--shadow);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text3);
            font-size: 10px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .navbar { padding: 8px 12px; }
            .logo { font-size: 16px; }
            .btn { padding: 6px 10px; font-size: 10px; }
            .hero h1 { font-size: 18px; }
            .tab-btn { padding: 8px 10px; font-size: 10px; }
            .listing-header { flex-direction: column; align-items: flex-start; }
            .admin-grid { grid-template-columns: 1fr; }
        }

        /* ROLE COLORS */
        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
        .rb-admin { background: #3d0000; color: #e74c3c; }
        .rb-chief { background: #3d3000; color: #f1c40f; }
        .rb-curator { background: #3d3000; color: #ffd700; }
        .rb-deputy { background: #3d2000; color: #ffa500; }
        .rb-senior { background: #001a3d; color: #3498db; }
        .rb-moderator { background: #003d1a; color: #2ecc71; }
        .rb-writer { background: #1a003d; color: #9b59b6; }
        .rb-technical { background: #003d3d; color: #00bcd4; }
        .rb-player { background: #1a1a1a; color: #aaa; }

        .announcement {
            background: var(--card);
            border-left: 4px solid var(--yellow);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 16px;
            font-size: 12px;
        }
        .announcement strong { color: var(--yellow); }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="logo" onclick="showPage('home')">
            <div class="logo-icon">🎮</div>
            Ekip<span>Bul</span>
        </a>
        <div class="nav-actions" id="navActions">
            <button class="btn btn-outline" onclick="showPage('login')">Giriş</button>
            <button class="btn btn-red" onclick="showPage('register')">Kayıt Ol</button>
        </div>
    </nav>

    <!-- MAIN -->
    <div id="mainContent">
        <div class="hero">
            <h1>Ekip<span>Bul</span></h1>
            <p>RP Grand Mobile için ekip arkadaşını bul</p>
        </div>
        <div class="container" id="dynamicContent"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- FOOTER -->
    <div class="footer">© 2026 EkipBul · ekipbul.onrender.com</div>

    <script>
        // ==================== VERİTABANI ====================
        const DB_KEY = 'ekipbul_db';
        let DB = JSON.parse(localStorage.getItem(DB_KEY)) || null;

        // Varsayılan kurucu
        const DEFAULT_DB = {
            users: [
                {
                    id: 'admin_001',
                    email: 'kyzenbaba78@gmail.com',
                    password: '123456&Hack',
                    username: 'FLEX OTTOMAN',
                    discord: 'FlexOttoman',
                    role: 'Admin',
                    isPremium: true,
                    isBanned: false,
                    createdAt: new Date().toISOString(),
                    avatarColor: 'av-red',
                    avatarLetter: 'F',
                    gameHours: '5000+',
                    bio: 'Site Kurucusu'
                }
            ],
            listings: [],
            announcements: [],
            siteName: 'EkipBul',
            totalViews: 0
        };

        if (!DB) {
            DB = JSON.parse(JSON.stringify(DEFAULT_DB));
            saveDB();
        }

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(DB));
        }

        let currentUser = JSON.parse(sessionStorage.getItem('ekipbul_session')) || null;

        // ==================== ROLE COLORS ====================
        const ROLE_COLORS = {
            'Admin': { color: '#e74c3c', class: 'rb-admin', dot: '#e74c3c' },
            'Chief Admin': { color: '#f1c40f', class: 'rb-chief', dot: '#f1c40f' },
            'Curator of the Project': { color: '#ffd700', class: 'rb-curator', dot: '#ffd700' },
            'Deputy Curator of the Project': { color: '#ffa500', class: 'rb-deputy', dot: '#ffa500' },
            'Senior Admin': { color: '#3498db', class: 'rb-senior', dot: '#3498db' },
            'Moderator': { color: '#2ecc71', class: 'rb-moderator', dot: '#2ecc71' },
            'Yazıcı': { color: '#9b59b6', class: 'rb-writer', dot: '#9b59b6' },
            'Technical Admin': { color: '#00bcd4', class: 'rb-technical', dot: '#00bcd4' },
            'Player': { color: '#aaa', class: 'rb-player', dot: '#aaa' }
        };

        const ADMIN_ROLES = ['Admin', 'Chief Admin', 'Curator of the Project', 'Deputy Curator of the Project', 'Senior Admin', 'Moderator', 'Technical Admin'];

        function isAdmin() {
            return currentUser && ADMIN_ROLES.includes(currentUser.role);
        }

        function isPremiumUser() {
            return currentUser && (currentUser.isPremium || ADMIN_ROLES.includes(currentUser.role));
        }

        function canGivePremium() {
            return currentUser && ['Admin', 'Chief Admin', 'Curator of the Project', 'Deputy Curator of the Project'].includes(currentUser.role);
        }

        function canManageRoles() {
            return currentUser && ['Admin', 'Chief Admin', 'Curator of the Project'].includes(currentUser.role);
        }

        function canBan() {
            return currentUser && ['Admin', 'Chief Admin', 'Curator of the Project', 'Deputy Curator of the Project', 'Senior Admin'].includes(currentUser.role);
        }

        // ==================== NAVBAR ====================
        function updateNavbar() {
            const nav = document.getElementById('navActions');
            if (currentUser) {
                const rc = ROLE_COLORS[currentUser.role] || ROLE_COLORS['Player'];
                nav.innerHTML = `
                    <span class="user-badge">
                        <span class="role-dot" style="background:${rc.dot}"></span>
                        <span style="color:${rc.color}">${currentUser.username}</span>
                        <span class="role-badge ${rc.class}">${currentUser.role}</span>
                    </span>
                    ${isAdmin() ? '<button class="btn btn-gold" onclick="showAdminPanel()">👑 Panel</button>' : ''}
                    <button class="btn btn-red" onclick="showPage('create-listing')">📝 İlan Ver</button>
                    <button class="btn btn-outline" onclick="logout()">Çıkış</button>
                `;
            } else {
                nav.innerHTML = `
                    <button class="btn btn-outline" onclick="showPage('login')">Giriş</button>
                    <button class="btn btn-red" onclick="showPage('register')">Kayıt Ol</button>
                `;
            }
        }

        // ==================== SAYFA GEÇİŞ ====================
        function showPage(page, data = null) {
            const content = document.getElementById('dynamicContent');
            updateNavbar();

            switch (page) {
                case 'home':
                    renderHome(content);
                    break;
                case 'login':
                    renderLogin(content);
                    break;
                case 'register':
                    renderRegister(content);
                    break;
                case 'create-listing':
                    if (!currentUser) { showToast('⚠️ Önce giriş yap!'); renderLogin(content); return; }
                    renderCreateListing(content);
                    break;
                case 'admin':
                    if (!isAdmin()) { showToast('⚠️ Yetkisiz!'); renderHome(content); return; }
                    renderAdminPanel(content);
                    break;
                default:
                    renderHome(content);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== ANA SAYFA ====================
        function renderHome(content) {
            const listings = DB.listings.filter(l => !l.deleted).sort((a, b) => b.createdAt - a.createdAt);
            const premiumListings = listings.filter(l => l.isPremium);
            const normalListings = listings.filter(l => !l.isPremium);
            const allListings = [...premiumListings, ...normalListings];

            let annHTML = '';
            if (DB.announcements.length > 0) {
                const lastAnn = DB.announcements[DB.announcements.length - 1];
                annHTML = `<div class="announcement"><strong>📢 Duyuru:</strong> ${lastAnn.text} <span style="color:var(--text3);font-size:10px;">- ${new Date(lastAnn.date).toLocaleString('tr-TR')}</span></div>`;
            }

            content.innerHTML = `
                ${annHTML}
                <div class="tabs">
                    <button class="tab-btn active" onclick="filterHomeTab('all', this)">Tümü (${allListings.length})</button>
                    <button class="tab-btn" onclick="filterHomeTab('lfm', this)">Aranan</button>
                    <button class="tab-btn" onclick="filterHomeTab('lfg', this)">Arıyor</button>
                    <button class="tab-btn" onclick="filterHomeTab('premium', this)">⭐ Premium</button>
                </div>
                <div class="listings" id="homeListings"></div>
                <div style="text-align:center;margin-top:16px;">
                    <button class="btn btn-outline" onclick="loadMoreHome()">Daha Fazla</button>
                </div>
            `;

            window._homeListings = allListings;
            window._homeFilter = 'all';
            window._homePage = 1;
            renderHomeListings();
        }

        function renderHomeListings() {
            const container = document.getElementById('homeListings');
            if (!container) return;
            let data = window._homeListings || [];
            if (window._homeFilter === 'lfm') data = data.filter(l => l.type === 'lfm');
            if (window._homeFilter === 'lfg') data = data.filter(l => l.type === 'lfg');
            if (window._homeFilter === 'premium') data = data.filter(l => l.isPremium);

            const perPage = 10;
            const page = window._homePage || 1;
            const slice = data.slice(0, page * perPage);

            container.innerHTML = slice.map(l => {
                const author = DB.users.find(u => u.id === l.authorId);
                const rc = author ? ROLE_COLORS[author.role] || ROLE_COLORS['Player'] : ROLE_COLORS['Player'];
                const avClass = author ? author.avatarColor || 'av-red' : 'av-red';
                const avLetter = author ? author.avatarLetter || '?' : '?';
                return `
                <div class="listing-card ${l.isPremium ? 'premium' : ''}" onclick="viewListing('${l.id}')">
                    ${l.isPremium ? '<div style="position:absolute;top:8px;right:8px;font-size:14px;">⭐</div>' : ''}
                    <div class="listing-header">
                        <div class="listing-avatar ${avClass}">${avLetter}</div>
                        <div class="listing-title">${l.title}</div>
                    </div>
                    <div class="listing-meta">
                        <span>👤 ${author ? author.username : 'Bilinmiyor'}</span>
                        <span style="color:${rc.color}">${author ? author.role : 'Player'}</span>
                        <span>🕐 ${timeAgo(l.createdAt)}</span>
                        <span>🌐 ${l.server}</span>
                    </div>
                    <div class="listing-tags">
                        <span class="tag ${l.type === 'lfm' ? 'tag-lfm' : 'tag-lfg'}">${l.type === 'lfm' ? 'Aranan' : 'Arıyor'}</span>
                        <span class="tag tag-server">${l.server}</span>
                        ${l.isPremium ? '<span class="tag tag-premium">Premium</span>' : ''}
                    </div>
                    <div class="listing-action">
                        <button class="btn btn-blue btn-sm" onclick="event.stopPropagation();contactListing('${l.id}')">📩 İletişim</button>
                        <span class="listing-views">👁 ${l.views || 0}</span>
                    </div>
                </div>`;
            }).join('');

            if (slice.length >= data.length && container.children.length > 0) {
                document.querySelector('.btn-outline[onclick="loadMoreHome()"]').textContent = '✓ Tümü Yüklendi';
            }
        }

        function filterHomeTab(tab, btn) {
            window._homeFilter = tab;
            window._homePage = 1;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderHomeListings();
        }

        function loadMoreHome() {
            window._homePage++;
            renderHomeListings();
        }

        // ==================== İLAN GÖRÜNTÜLE ====================
        function viewListing(id) {
            const listing = DB.listings.find(l => l.id === id);
            if (!listing || listing.deleted) return;
            listing.views = (listing.views || 0) + 1;
            DB.totalViews++;
            saveDB();

            const author = DB.users.find(u => u.id === listing.authorId);
            const rc = author ? ROLE_COLORS[author.role] || ROLE_COLORS['Player'] : ROLE_COLORS['Player'];
            const avClass = author ? author.avatarColor || 'av-red' : 'av-red';
            const avLetter = author ? author.avatarLetter || '?' : '?';

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    <div class="modal-avatar ${avClass}">${avLetter}</div>
                    <h3>${listing.title}</h3>
                    <p class="modal-server">👤 ${author ? author.username : '?'} · <span style="color:${rc.color}">${author ? author.role : '?'}</span> · 🌐 ${listing.server} · 🕐 ${timeAgo(listing.createdAt)}</p>
                    <div class="modal-desc">${listing.description}</div>
                    <div class="modal-row"><span>İlan Türü</span><span>${listing.type === 'lfm' ? 'Aranan (LFM)' : 'Arıyor (LFG)'}</span></div>
                    <div class="modal-row"><span>Kategori</span><span>${listing.category}</span></div>
                    <div class="modal-row"><span>Discord</span><span>${listing.discord}</span></div>
                    <div class="modal-row"><span>Oyun Süresi</span><span>${listing.gameHours}</span></div>
                    <div class="modal-row"><span>Görüntülenme</span><span>${listing.views}</span></div>
                    <button class="btn-modal-contact" onclick="copyDiscord('${listing.discord}')">💬 Discord'u Kopyala</button>
                    ${isAdmin() ? `<button class="btn btn-red" style="width:100%;margin-top:8px;" onclick="deleteListing('${listing.id}');this.closest('.modal-overlay').remove();">🗑️ İlanı Sil</button>` : ''}
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        }

        function contactListing(id) {
            const listing = DB.listings.find(l => l.id === id);
            if (listing) copyDiscord(listing.discord);
        }

        function copyDiscord(discord) {
            navigator.clipboard.writeText(discord).then(() => {
                showToast('✅ Discord kopyalandı: ' + discord);
            }).catch(() => {
                showToast('📋 Discord: ' + discord);
            });
        }

        function deleteListing(id) {
            const listing = DB.listings.find(l => l.id === id);
            if (listing) listing.deleted = true;
            saveDB();
            showToast('🗑️ İlan silindi');
            showPage('home');
        }

        // ==================== GİRİŞ ====================
        function renderLogin(content) {
            content.innerHTML = `
                <div class="form-container">
                    <h2>🔐 Giriş Yap</h2>
                    <div class="form-group"><label>E-posta</label><input type="email" id="loginEmail" placeholder="ornek@mail.com"></div>
                    <div class="form-group"><label>Şifre</label><input type="password" id="loginPass" placeholder="********"></div>
                    <button class="btn-submit" onclick="login()">Giriş Yap</button>
                    <p style="text-align:center;margin-top:10px;font-size:12px;">Hesabın yok mu? <a href="#" style="color:var(--red);" onclick="showPage('register')">Kayıt Ol</a></p>
                </div>
            `;
        }

        function login() {
            const email = document.getElementById('loginEmail')?.value.trim().toLowerCase();
            const pass = document.getElementById('loginPass')?.value;
            if (!email || !pass) { showToast('⚠️ Tüm alanları doldur!'); return; }

            const user = DB.users.find(u => u.email === email && u.password === pass);
            if (!user) { showToast('❌ Hatalı e-posta veya şifre!'); return; }
            if (user.isBanned) { showToast('🚫 Hesabın yasaklandı!'); return; }

            currentUser = { ...user };
            delete currentUser.password;
            sessionStorage.setItem('ekipbul_session', JSON.stringify(currentUser));
            showToast('✅ Hoş geldin, ' + user.username + '!');
            showPage('home');
        }

        function logout() {
            currentUser = null;
            sessionStorage.removeItem('ekipbul_session');
            showToast('👋 Çıkış yapıldı');
            showPage('home');
        }

        // ==================== KAYIT ====================
        function renderRegister(content) {
            content.innerHTML = `
                <div class="form-container">
                    <h2>📋 Kayıt Ol</h2>
                    <div class="form-group"><label>Kullanıcı Adı (Oyun içi)</label><input type="text" id="regUser" placeholder="FLEX OTTOMAN"></div>
                    <div class="form-group"><label>E-posta</label><input type="email" id="regEmail" placeholder="ornek@mail.com"></div>
                    <div class="form-group"><label>Discord</label><input type="text" id="regDiscord" placeholder="kullanici#1234"></div>
                    <div class="form-group"><label>Şifre</label><input type="password" id="regPass" placeholder="********"></div>
                    <button class="btn-submit" onclick="register()">Kayıt Ol</button>
                    <p style="text-align:center;margin-top:10px;font-size:12px;">Hesabın var mı? <a href="#" style="color:var(--red);" onclick="showPage('login')">Giriş Yap</a></p>
                </div>
            `;
        }

        function register() {
            const username = document.getElementById('regUser')?.value.trim();
            const email = document.getElementById('regEmail')?.value.trim().toLowerCase();
            const discord = document.getElementById('regDiscord')?.value.trim();
            const pass = document.getElementById('regPass')?.value;
            if (!username || !email || !discord || !pass) { showToast('⚠️ Tüm alanları doldur!'); return; }
            if (DB.users.find(u => u.email === email)) { showToast('⚠️ Bu e-posta zaten kayıtlı!'); return; }
            if (pass.length < 6) { showToast('⚠️ Şifre en az 6 karakter olmalı!'); return; }

            const avatarColors = ['av-red', 'av-blue', 'av-green', 'av-gold', 'av-purple'];
            const newUser = {
                id: 'user_' + Date.now(),
                email,
                password: pass,
                username,
                discord,
                role: 'Player',
                isPremium: false,
                isBanned: false,
                createdAt: new Date().toISOString(),
                avatarColor: avatarColors[Math.floor(Math.random() * avatarColors.length)],
                avatarLetter: username.charAt(0).toUpperCase(),
                gameHours: '0',
                bio: ''
            };
            DB.users.push(newUser);
            saveDB();

            currentUser = { ...newUser };
            delete currentUser.password;
            sessionStorage.setItem('ekipbul_session', JSON.stringify(currentUser));
            showToast('✅ Kayıt başarılı! Hoş geldin, ' + username + '!');
            showPage('home');
        }

        // ==================== İLAN VER ====================
        function renderCreateListing(content) {
            content.innerHTML = `
                <div class="form-container">
                    <h2>📝 İlan Oluştur</h2>
                    <div class="form-group"><label>İlan Başlığı</label><input type="text" id="listTitle" placeholder="örn: Polis Departmanı Arıyor"></div>
                    <div class="form-group"><label>Kategori</label><select id="listCat"><option>Yasal Rol</option><option>Yasadışı Rol</option><option>Serbest Rol</option><option>Çete/Aile</option></select></div>
                    <div class="form-group"><label>Sunucu</label><select id="listServer"><option>RP Grand #1</option><option>RP Grand #2</option><option>RP Grand RP</option></select></div>
                    <div class="form-group"><label>İlan Türü</label><select id="listType"><option value="lfm">Aranan (LFM)</option><option value="lfg">Arıyor (LFG)</option></select></div>
                    <div class="form-group"><label>Discord</label><input type="text" id="listDiscord" value="${currentUser.discord || ''}"></div>
                    <div class="form-group"><label>Oyun Süresi</label><input type="text" id="listHours" placeholder="örn: 500+ saat"></div>
                    <div class="form-group"><label>Açıklama</label><textarea id="listDesc" placeholder="Detaylı açıklama yaz..."></textarea></div>
                    <button class="btn-submit" onclick="createListing()">✅ Yayınla</button>
                    <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="showPage('home')">← Ana Sayfa</button>
                </div>
            `;
        }

        function createListing() {
            const title = document.getElementById('listTitle')?.value.trim();
            const category = document.getElementById('listCat')?.value;
            const server = document.getElementById('listServer')?.value;
            const type = document.getElementById('listType')?.value;
            const discord = document.getElementById('listDiscord')?.value.trim();
            const gameHours = document.getElementById('listHours')?.value.trim();
            const desc = document.getElementById('listDesc')?.value.trim();

            if (!title || !discord || !desc) { showToast('⚠️ Başlık, Discord ve Açıklama zorunlu!'); return; }

            const newListing = {
                id: 'list_' + Date.now(),
                authorId: currentUser.id,
                title,
                category,
                server,
                type,
                discord,
                gameHours,
                description: desc,
                isPremium: isPremiumUser(),
                views: 0,
                deleted: false,
                createdAt: new Date().toISOString()
            };
            DB.listings.push(newListing);
            saveDB();
            showToast('✅ İlan yayınlandı!');
            showPage('home');
        }

        // ==================== ADMIN PANELİ ====================
        function showAdminPanel() {
            showPage('admin');
        }

        function renderAdminPanel(content) {
            const totalUsers = DB.users.length;
            const totalListings = DB.listings.filter(l => !l.deleted).length;
            const bannedUsers = DB.users.filter(u => u.isBanned).length;
            const totalViews = DB.totalViews;

            content.innerHTML = `
                <div class="admin-panel">
                    <h2>👑 Admin Panel</h2>
                    <div class="admin-grid">
                        <div class="admin-card"><h4>👥 Kullanıcı</h4><div class="stat-big">${totalUsers}</div><div class="stat-label">Toplam</div></div>
                        <div class="admin-card"><h4>📝 İlan</h4><div class="stat-big">${totalListings}</div><div class="stat-label">Aktif</div></div>
                        <div class="admin-card"><h4>🚫 Yasaklı</h4><div class="stat-big">${bannedUsers}</div><div class="stat-label">Kullanıcı</div></div>
                        <div class="admin-card"><h4>👁 Görüntülenme</h4><div class="stat-big">${totalViews}</div><div class="stat-label">Toplam</div></div>
                    </div>

                    <div style="margin-top:20px;display:flex;flex-wrap:wrap;gap:8px;">
                        <button class="btn btn-yellow" onclick="showAdminSection('announcement')" style="background:var(--yellow);color:#000;">📢 Duyuru</button>
                        <button class="btn btn-red" onclick="showAdminSection('users')">👥 Kullanıcılar</button>
                        <button class="btn btn-blue" onclick="showAdminSection('listings')">📝 İlanlar</button>
                        <button class="btn btn-outline" onclick="showAdminSection('roles')">🎭 Rol Ver</button>
                        <button class="btn btn-outline" onclick="showAdminSection('premium')">⭐ Premium</button>
                        <button class="btn btn-outline" onclick="showAdminSection('ban')">🚫 Yasakla</button>
                    </div>
                    <div id="adminSection" style="margin-top:16px;"></div>
                    <button class="btn btn-outline" style="margin-top:16px;width:100%;" onclick="showPage('home')">← Ana Sayfa</button>
                </div>
            `;
            showAdminSection('announcement');
        }

        function showAdminSection(section) {
            const container = document.getElementById('adminSection');
            if (!container) return;

            switch (section) {
                case 'announcement':
                    container.innerHTML = `
                        <div class="admin-card"><h4>📢 Duyuru Ekle</h4>
                            <textarea id="annText" placeholder="Duyuru metni..." style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);min-height:60px;font-family:var(--font);"></textarea>
                            <button class="btn btn-gold" style="margin-top:8px;width:100%;" onclick="addAnnouncement()">Yayınla</button>
                        </div>
                        <div style="margin-top:8px;">${DB.announcements.slice(-5).reverse().map(a => `<div style="background:var(--bg);padding:8px;border-radius:8px;margin-bottom:4px;font-size:11px;">${a.text}<br><span style="color:var(--text3);">${new Date(a.date).toLocaleString('tr-TR')}</span></div>`).join('')}</div>
                    `;
                    break;
                case 'users':
                    container.innerHTML = `<div class="admin-card"><h4>👥 Kullanıcı Listesi</h4>${DB.users.map(u => {
                        const rc = ROLE_COLORS[u.role] || ROLE_COLORS['Player'];
                        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:4px;">
                            <span>${u.username} <span style="color:${rc.color};font-size:10px;">[${u.role}]</span> ${u.isPremium?'⭐':''} ${u.isBanned?'🚫':''}</span>
                            <span style="font-size:10px;color:var(--text3);">${u.email}</span>
                        </div>`;
                    }).join('')}</div>`;
                    break;
                case 'listings':
                    const activeListings = DB.listings.filter(l => !l.deleted);
                    container.innerHTML = `<div class="admin-card"><h4>📝 Tüm İlanlar (${activeListings.length})</h4>${activeListings.map(l => {
                        const author = DB.users.find(u => u.id === l.authorId);
                        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:4px;">
                            <span style="font-size:11px;">${l.title} - ${author ? author.username : '?'}</span>
                            <button class="btn btn-red btn-sm" onclick="deleteListing('${l.id}');showAdminSection('listings');">Sil</button>
                        </div>`;
                    }).join('')}</div>`;
                    break;
                case 'roles':
                    const users = DB.users.filter(u => u.id !== (currentUser?.id || ''));
                    container.innerHTML = `<div class="admin-card"><h4>🎭 Rol Ver</h4>
                        <select id="roleUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">
                            ${users.map(u => `<option value="${u.id}">${u.username} (${u.role})</option>`).join('')}
                        </select>
                        <select id="roleName" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">
                            ${Object.keys(ROLE_COLORS).map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                        <button class="btn btn-blue" style="width:100%;" onclick="changeRole()">Rolü Değiştir</button>
                    </div>`;
                    break;
                case 'premium':
                    const nonPremium = DB.users.filter(u => !u.isPremium && !ADMIN_ROLES.includes(u.role));
                    container.innerHTML = `<div class="admin-card"><h4>⭐ Premium Ver</h4>
                        <select id="premUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">
                            ${nonPremium.map(u => `<option value="${u.id}">${u.username}</option>`).join('')}
                        </select>
                        <button class="btn btn-gold" style="width:100%;" onclick="givePremium()">Premium Yap</button>
                        <hr style="border-color:var(--border);margin:10px 0;">
                        <h5>Premium Kullanıcılar:</h5>
                        ${DB.users.filter(u => u.isPremium).map(u => `<div style="font-size:11px;padding:4px;">⭐ ${u.username} - ${u.role}</div>`).join('')}
                    </div>`;
                    break;
                case 'ban':
                    const nonBanned = DB.users.filter(u => !u.isBanned && u.id !== (currentUser?.id || ''));
                    container.innerHTML = `<div class="admin-card"><h4>🚫 Kullanıcı Yasakla</h4>
                        <select id="banUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">
                            ${nonBanned.map(u => `<option value="${u.id}">${u.username} (${u.role})</option>`).join('')}
                        </select>
                        <button class="btn btn-red" style="width:100%;" onclick="banUser()">Yasakla</button>
                        <hr style="border-color:var(--border);margin:10px 0;">
                        <h5>Yasaklı Kullanıcılar:</h5>
                        ${DB.users.filter(u => u.isBanned).map(u => `<div style="font-size:11px;padding:4px;display:flex;justify-content:space-between;">🚫 ${u.username} <button class="btn btn-green btn-sm" onclick="unbanUser('${u.id}');showAdminSection('ban');">Kaldır</button></div>`).join('')}
                    </div>`;
                    break;
            }
        }

        function addAnnouncement() {
            const text = document.getElementById('annText')?.value.trim();
            if (!text) return;
            DB.announcements.push({ text, date: new Date().toISOString(), authorId: currentUser.id });
            saveDB();
            showToast('📢 Duyuru yayınlandı!');
            showAdminSection('announcement');
        }

        function changeRole() {
            if (!canManageRoles()) { showToast('⚠️ Yetkin yok!'); return; }
            const userId = document.getElementById('roleUser')?.value;
            const newRole = document.getElementById('roleName')?.value;
            const user = DB.users.find(u => u.id === userId);
            if (user && newRole) {
                user.role = newRole;
                saveDB();
                showToast('✅ ' + user.username + ' rolü: ' + newRole);
                showAdminSection('roles');
            }
        }

        function givePremium() {
            if (!canGivePremium()) { showToast('⚠️ Yetkin yok!'); return; }
            const userId = document.getElementById('premUser')?.value;
            const user = DB.users.find(u => u.id === userId);
            if (user) {
                user.isPremium = true;
                saveDB();
                showToast('⭐ ' + user.username + ' premium yapıldı!');
                showAdminSection('premium');
            }
        }

        function banUser() {
            if (!canBan()) { showToast('⚠️ Yetkin yok!'); return; }
            const userId = document.getElementById('banUser')?.value;
            const user = DB.users.find(u => u.id === userId);
            if (user) {
                user.isBanned = true;
                saveDB();
                showToast('🚫 ' + user.username + ' yasaklandı!');
                showAdminSection('ban');
            }
        }

        function unbanUser(userId) {
            if (!canBan()) return;
            const user = DB.users.find(u => u.id === userId);
            if (user) {
                user.isBanned = false;
                saveDB();
                showToast('✅ Yasak kaldırıldı!');
            }
        }

        // ==================== YARDIMCI ====================
        function timeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' saat önce';
            return Math.floor(diff / 86400) + ' gün önce';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        // ==================== BAŞLANGIÇ ====================
        updateNavbar();
        showPage('home');
        console.log('🎮 EkipBul Hazır! 👑 Admin: kyzenbaba78@gmail.com');
    </script>
</body>
</html>
