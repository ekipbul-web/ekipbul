<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkipBul v5.2 - RP Grand Mobile</title>
    <meta name="description" content="EkipBul - RP Grand Mobile için ekip bulma platformu">
    <link rel="manifest" href="data:application/json,{}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --card2: #1a1a1a;
            --border: #222222;
            --red: #e74c3c;
            --red2: #ff4444;
            --blue: #3498db;
            --blue2: #2980b9;
            --yellow: #f1c40f;
            --gold: #ffd700;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #777777;
            --green: #2ecc71;
            --purple: #9b59b6;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .dark-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --card2: #e8e8e8;
            --border: #cccccc;
            --text: #111111;
            --text2: #555555;
            --text3: #888888;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }

        .navbar {
            background: #000;
            border-bottom: 2px solid var(--red);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -1px;
        }
        .logo span { color: var(--red); }
        .logo-icon {
            background: var(--red);
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .nav-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
            text-decoration: none;
        }
        .btn-outline { background: transparent; color: #fff; border: 2px solid var(--border); }
        .btn-outline:hover { border-color: var(--red); }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { background: #c0392b; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-blue:hover { background: var(--blue2); }
        .btn-gold { background: var(--yellow); color: #000; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-discord { background: #5865F2; color: #fff; }
        .btn-discord:hover { background: #4752C4; }
        .btn-sm { padding: 6px 10px; font-size: 10px; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .role-dot { width: 8px; height: 8px; border-radius: 50%; }
        .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

        .hero {
            background: linear-gradient(135deg, #1a0000 0%, #0a0a0a 50%, #001a1a 100%);
            padding: 32px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .hero h1 { font-size: 24px; margin-bottom: 6px; }
        .hero h1 span { color: var(--red); }
        .hero p { color: var(--text2); font-size: 13px; }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            padding: 6px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            color: var(--text2);
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .tab-btn.active { background: var(--red); color: #fff; }

        .listings { display: flex; flex-direction: column; gap: 10px; }
        .listing-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .listing-card:hover { border-color: var(--red); }
        .listing-card.premium { border-color: var(--yellow); background: #1a1a00; }
        .listing-card.pinned { border-color: var(--blue); background: #001a1a; }
        .listing-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .listing-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .av-red { background: #3d0000; color: var(--red); }
        .av-blue { background: #001a3d; color: var(--blue); }
        .av-green { background: #003d00; color: var(--green); }
        .av-gold { background: #3d3000; color: var(--yellow); }
        .av-purple { background: #1a003d; color: #9b59b6; }
        .listing-title { font-weight: 700; font-size: 14px; flex: 1; min-width: 150px; }
        .listing-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
        .listing-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
        .tag-lfm { background: #3d3000; color: var(--yellow); }
        .tag-lfg { background: #003d1a; color: var(--green); }
        .tag-server { background: #1a1a2e; color: var(--blue); }
        .tag-premium { background: #3d0000; color: var(--red2); }
        .tag-pinned { background: #001a3d; color: var(--blue); }
        .listing-action { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .listing-views { font-size: 10px; color: var(--text3); }
        .verified-badge {
            background: var(--blue);
            color: #fff;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            position: absolute;
            bottom: -2px;
            right: -2px;
        }
        .favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
            color: #444;
            transition: 0.2s;
        }
        .favorite-btn.active { color: var(--red); }

        .form-container {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 500px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }
        .form-container h2 { text-align: center; margin-bottom: 16px; font-size: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 12px; color: var(--text2); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: #fff;
            font-size: 13px;
            outline: none;
            font-family: var(--font);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--red); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            width: 100%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px; right: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
        }
        .modal h3 { font-size: 16px; margin-bottom: 4px; }
        .modal .modal-server { color: var(--text2); font-size: 12px; margin-bottom: 10px; }
        .modal .modal-desc {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text2);
            margin-bottom: 12px;
        }
        .modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .modal-row span:first-child { color: var(--text3); }
        .btn-modal-contact {
            width: 100%;
            padding: 10px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        .modal-comments { margin-top: 16px; }
        .modal-comments h4 { margin-bottom: 8px; }
        .comment { background: var(--bg); padding: 8px; border-radius: 8px; margin-bottom: 6px; font-size: 12px; }

        .admin-panel { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--red); }
        .admin-panel h2 { font-size: 20px; margin-bottom: 16px; color: var(--red); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .admin-card { background: var(--bg); border-radius: 8px; padding: 14px; border: 1px solid var(--border); }
        .admin-card h4 { font-size: 13px; margin-bottom: 8px; color: var(--yellow); }
        .admin-card .stat-big { font-size: 28px; font-weight: 900; color: var(--red); }
        .admin-card .stat-label { font-size: 11px; color: var(--text3); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--red);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 9999;
            display: none;
        }

        .star-rating { display: flex; gap: 2px; }
        .star-rating .star { color: #444; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .star-rating .star.active { color: var(--gold); }

        .badge-icon { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; margin: 2px; }

        .profile-banner {
            width: 100%;
            height: 120px;
            border-radius: var(--radius);
            background: var(--card2);
            background-size: cover;
            background-position: center;
            margin-bottom: 12px;
        }

        .leaderboard-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); }
        .leaderboard-rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; }
        .rank-1 { background: #ffd700; color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #fff; }

        .chat-container { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .chat-msg { background: var(--bg); padding: 8px 12px; border-radius: 12px; font-size: 12px; max-width: 80%; align-self: flex-start; }
        .chat-msg.own { align-self: flex-end; background: var(--red); }
        .chat-input-row { display: flex; gap: 6px; padding: 10px; border-top: 1px solid var(--border); }
        .chat-input-row input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: #fff; font-size: 12px; outline: none; }

        .ban-message { background: #3d0000; border: 2px solid var(--red); border-radius: var(--radius); padding: 24px; text-align: center; margin: 20px auto; max-width: 500px; }
        .ban-message h3 { color: var(--red); margin-bottom: 12px; }
        .ban-message .ban-detail { color: var(--text2); font-size: 13px; margin: 6px 0; }

        .team-card { background: var(--card); border-radius: var(--radius); padding: 14px; border: 1px solid var(--blue); margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .team-card:hover { border-color: var(--blue2); }
        .event-card { background: var(--card); border-radius: var(--radius); padding: 12px; border: 1px solid var(--blue); margin-bottom: 8px; }

        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
        .rb-curator { background: #3d0000; color: #ff4444; border: 1px solid #ff4444; }
        .rb-deputy { background: #3d2000; color: #ffa500; }
        .rb-chief { background: #3d3000; color: #f1c40f; }
        .rb-senior { background: #001a3d; color: #3498db; }
        .rb-admin { background: #3d0000; color: #e74c3c; }
        .rb-technical { background: #003d3d; color: #00bcd4; }
        .rb-moderator { background: #003d1a; color: #2ecc71; }
        .rb-writer { background: #1a003d; color: #9b59b6; }
        .rb-player { background: #1a1a1a; color: #aaa; }

        .announcement { background: #1a1a00; border-left: 4px solid var(--yellow); padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 12px; }
        .announcement strong { color: var(--yellow); }

        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
        .page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-weight: 700; font-size: 12px; color: var(--text); }
        .page-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        .footer { text-align: center; padding: 20px; color: var(--text3); font-size: 10px; border-top: 1px solid var(--border); margin-top: 40px; }

        .server-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .server-box { background: var(--card); border-radius: var(--radius); padding: 14px; text-align: center; border: 1px solid var(--border); }
        .server-box h4 { color: var(--blue); margin-bottom: 4px; }
        .server-box .server-count { font-size: 24px; font-weight: 900; color: var(--red); }

        @media (max-width: 768px) {
            .navbar { padding: 8px 12px; }
            .logo { font-size: 16px; }
            .btn { padding: 6px 10px; font-size: 10px; }
            .hero h1 { font-size: 18px; }
            .tab-btn { padding: 8px 10px; font-size: 10px; }
            .listing-header { flex-direction: column; align-items: flex-start; }
            .admin-grid { grid-template-columns: 1fr; }
            .profile-banner { height: 80px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="#" class="logo" onclick="navigateTo('home')"><div class="logo-icon">🎮</div>Ekip<span>Bul</span></a>
    <div class="nav-actions" id="navActions"></div>
</nav>
<div class="hero"><h1>Ekip<span>Bul</span> v5.2</h1><p>Discord Giriş · Supabase Auth · Tüm Özellikler</p></div>
<div class="container" id="dynamicContent"></div>
<div class="toast" id="toast"></div>
<div class="footer">© 2026 EkipBul v5.2 · ekipbul.onrender.com</div>

<script>
const SUPABASE_URL = 'https://dyapvhoefuimnzorevoz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5YXB2aG9lZnVpbW56b3Jldm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTY4NDcsImV4cCI6MjA5NzI5Mjg0N30.5mmSd9kYBWuj5J6ldiRXQbb1Fa4Wnf_biThQO9zqWZw';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_ROLES = ['Curator of the Project','Deputy Curator of the Project','Chief Admin','Senior Admin','Admin','Technical Admin','Moderator'];
const ROLE_HIERARCHY = ['Curator of the Project','Deputy Curator of the Project','Chief Admin','Senior Admin','Admin','Technical Admin','Moderator','Yazıcı','Player'];
const ROLE_COLORS = {
    'Curator of the Project':{color:'#ff4444',class:'rb-curator',dot:'#ff4444',icon:'👑'},
    'Deputy Curator of the Project':{color:'#ffa500',class:'rb-deputy',dot:'#ffa500',icon:'🏅'},
    'Chief Admin':{color:'#f1c40f',class:'rb-chief',dot:'#f1c40f',icon:'⭐'},
    'Senior Admin':{color:'#3498db',class:'rb-senior',dot:'#3498db',icon:'💎'},
    'Admin':{color:'#e74c3c',class:'rb-admin',dot:'#e74c3c',icon:'🔴'},
    'Technical Admin':{color:'#00bcd4',class:'rb-technical',dot:'#00bcd4',icon:'🔧'},
    'Moderator':{color:'#2ecc71',class:'rb-moderator',dot:'#2ecc71',icon:'🛡️'},
    'Yazıcı':{color:'#9b59b6',class:'rb-writer',dot:'#9b59b6',icon:'✍️'},
    'Player':{color:'#aaa',class:'rb-player',dot:'#aaa',icon:'🎮'}
};
const BADGES = {
    'founder':{name:'Kurucu',icon:'👑',color:'#ffd700'},'premium':{name:'Premium',icon:'⭐',color:'#f1c40f'},
    'verified':{name:'Onaylı',icon:'✓',color:'#3498db'},'veteran':{name:'Veteran',icon:'🎖️',color:'#e74c3c'},
    'inviter5':{name:'5 Davet',icon:'📨',color:'#2ecc71'},'inviter10':{name:'10 Davet',icon:'📬',color:'#9b59b6'},
    'inviter25':{name:'25 Davet',icon:'📦',color:'#ffa500'},'toprated':{name:'En İyi',icon:'💎',color:'#00bcd4'}
};

let currentUser = null;
let favorites = JSON.parse(localStorage.getItem('ekipbul_favorites')) || [];

function isAdmin(){return currentUser&&ADMIN_ROLES.includes(currentUser.role);}
function getRoleLevel(r){return ROLE_HIERARCHY.indexOf(r);}
function canModifyRole(tr){return currentUser&&getRoleLevel(currentUser.role)<getRoleLevel(tr);}
function getBadgeHTML(b){const d=BADGES[b];return d?`<span class="badge-icon" style="background:${d.color}20;color:${d.color};border:1px solid ${d.color};">${d.icon} ${d.name}</span>`:'';}

sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
        const{data:profiles}=await sb.from('profiles').select('*').eq('id',session.user.id);
        const profile=profiles&&profiles[0];
        if(profile){
            const{data:user}=await sb.auth.getUser();
            currentUser={id:profile.id,email:user.user.email,username:profile.username,role:profile.role,is_premium:profile.is_premium,is_verified:profile.is_verified,discord:profile.discord||'',avatar_url:profile.avatar_url,banner_url:profile.banner_url,game_hours:profile.game_hours,bio:profile.bio,badges:profile.badges||[],rating:profile.rating,rating_count:profile.rating_count,invite_code:profile.invite_code,invite_count:profile.invite_count||0};
        }
        updateNavbar();navigateTo('home');
    }
    if(event==='SIGNED_OUT'){currentUser=null;updateNavbar();navigateTo('home');}
});

function updateNavbar(){
    const nav=document.getElementById('navActions');
    if(currentUser){
        const rc=ROLE_COLORS[currentUser.role]||ROLE_COLORS['Player'];
        nav.innerHTML=`<button class="btn btn-outline btn-sm" onclick="toggleDarkMode()">🌙</button>
            <button class="btn btn-outline" onclick="navigateTo('notifications')">🔔</button>
            <span class="user-badge" onclick="navigateTo('profile','${currentUser.id}')"><span class="role-dot" style="background:${rc.dot}"></span><span style="color:${rc.color}">${currentUser.username}</span>${currentUser.is_verified?'<span style="color:var(--blue);">✓</span>':''}<span class="role-badge ${rc.class}">${rc.icon} ${currentUser.role}</span></span>
            ${isAdmin()?'<button class="btn btn-gold" onclick="navigateTo(\'admin\')">👑 Panel</button>':''}
            <button class="btn btn-red" onclick="navigateTo('create-listing')">📝 İlan Ver</button>
            <button class="btn btn-blue" onclick="navigateTo('teams')">👥 Ekipler</button>
            <button class="btn btn-outline" onclick="logout()">Çıkış</button>`;
    }else{
        nav.innerHTML=`<button class="btn btn-outline btn-sm" onclick="toggleDarkMode()">🌙</button>
            <button class="btn btn-outline" onclick="navigateTo('login')">Giriş</button>
            <button class="btn btn-red" onclick="navigateTo('register')">Kayıt Ol</button>`;
    }
}
function toggleDarkMode(){document.body.classList.toggle('dark-mode');localStorage.setItem('ekipbul_darkmode',document.body.classList.contains('dark-mode')?'on':'off');}

async function navigateTo(page,data){
    const content=document.getElementById('dynamicContent');updateNavbar();
    switch(page){
        case 'home':await renderHome(content);break;
        case 'login':renderLogin(content);break;
        case 'register':renderRegister(content);break;
        case 'reset-password':renderResetPassword(content);break;
        case 'create-listing':if(!currentUser){showToast('⚠️ Giriş yap!');renderLogin(content);return;}renderCreateListing(content);break;
        case 'admin':if(!isAdmin()){showToast('⚠️ Yetkisiz!');await renderHome(content);return;}await renderAdminPanel(content);break;
        case 'profile':await renderProfile(content,data);break;
        case 'leaderboard':await renderLeaderboard(content);break;
        case 'chat':await renderChat(content);break;
        case 'events':await renderEvents(content);break;
        case 'notifications':await renderNotifications(content);break;
        case 'teams':await renderTeams(content);break;
        case 'messages':await renderMessages(content,data);break;
        case 'server-map':await renderServerMap(content);break;
        default:await renderHome(content);
    }
    window.scrollTo({top:0,behavior:'smooth'});
}

async function renderHome(content){
    const{data:listings}=await sb.from('listings').select('*').eq('deleted',false).order('created_at',{ascending:false});
    const{data:announcements}=await sb.from('announcements').select('*').order('created_at',{ascending:false}).limit(1);
    const allListings=[...(listings||[]).filter(l=>l.is_premium||l.is_pinned),...(listings||[]).filter(l=>!l.is_premium&&!l.is_pinned)];
    let annHTML='';
    if(announcements&&announcements.length>0)annHTML=`<div class="announcement"><strong>📢 Duyuru:</strong> ${announcements[0].text}</div>`;
    content.innerHTML=annHTML+`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="btn btn-outline btn-sm" onclick="navigateTo('leaderboard')">🏆 Liderlik</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('chat')">💬 Sohbet</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('events')">📅 Etkinlikler</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('messages')">💬 Mesajlar</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('server-map')">🗺️ Sunucu Haritası</button></div>
        <div class="tabs"><button class="tab-btn active" onclick="filterHomeTab('all',this)">Tümü (${allListings.length})</button>
        <button class="tab-btn" onclick="filterHomeTab('lfm',this)">Aranan</button>
        <button class="tab-btn" onclick="filterHomeTab('lfg',this)">Arıyor</button>
        <button class="tab-btn" onclick="filterHomeTab('premium',this)">⭐ Premium</button>
        <button class="tab-btn" onclick="filterHomeTab('pinned',this)">📌 Sabit</button>
        <button class="tab-btn" onclick="filterHomeTab('favorites',this)">❤️ Favoriler</button></div>
        <input type="text" placeholder="🔍 Ara..." id="searchInput" style="width:100%;padding:10px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:#fff;margin-bottom:12px;font-size:13px;" oninput="searchListings()">
        <div class="listings" id="homeListings"></div><div class="pagination" id="pagination"></div>`;
    window._homeListings=allListings;window._homeFilter='all';window._homePage=1;window._homeSearch='';renderHomeListings();
}
function renderHomeListings(){
    const container=document.getElementById('homeListings');if(!container)return;
    let data=window._homeListings||[];
    if(window._homeFilter==='lfm')data=data.filter(l=>l.type==='lfm');
    if(window._homeFilter==='lfg')data=data.filter(l=>l.type==='lfg');
    if(window._homeFilter==='premium')data=data.filter(l=>l.is_premium);
    if(window._homeFilter==='pinned')data=data.filter(l=>l.is_pinned);
    if(window._homeFilter==='favorites')data=data.filter(l=>favorites.includes(l.id));
    if(window._homeSearch){const s=window._homeSearch.toLowerCase();data=data.filter(l=>l.title.toLowerCase().includes(s)||l.description.toLowerCase().includes(s)||l.server.toLowerCase().includes(s));}
    const perPage=8,page=window._homePage||1,totalPages=Math.ceil(data.length/perPage),slice=data.slice((page-1)*perPage,page*perPage);
    container.innerHTML=slice.map(l=>{
        const avLetter=(l.author_id||'?').charAt(0).toUpperCase(),isFav=favorites.includes(l.id);
        return`<div class="listing-card ${l.is_premium?'premium':''} ${l.is_pinned?'pinned':''}" onclick="viewListing('${l.id}')">
            <button class="favorite-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${l.id}')">${isFav?'❤️':'🤍'}</button>
            ${l.is_pinned?'<div style="position:absolute;top:8px;left:8px;">📌</div>':''}${l.is_premium&&!l.is_pinned?'<div style="position:absolute;top:8px;left:8px;">⭐</div>':''}
            <div class="listing-header"><div class="listing-avatar av-red">${avLetter}</div><div class="listing-title">${l.title}</div></div>
            <div class="listing-meta"><span>🌐 ${l.server}</span><span>🕐 ${timeAgo(l.created_at)}</span><span>👁 ${l.views||0}</span></div>
            <div class="listing-tags"><span class="tag ${l.type==='lfm'?'tag-lfm':'tag-lfg'}">${l.type==='lfm'?'Aranan':'Arıyor'}</span><span class="tag tag-server">${l.server}</span>${l.is_premium?'<span class="tag tag-premium">Premium</span>':''}${l.is_pinned?'<span class="tag tag-pinned">Sabit</span>':''}</div>
            <div class="listing-action"><button class="btn btn-blue btn-sm" onclick="event.stopPropagation();copyDiscord('${l.discord}')">📩 İletişim</button></div></div>`;
    }).join('');
    const pagDiv=document.getElementById('pagination');
    if(pagDiv&&totalPages>1)pagDiv.innerHTML=Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===page?'active':''}" onclick="window._homePage=${i+1};renderHomeListings();">${i+1}</button>`).join('');
}
function filterHomeTab(tab,btn){window._homeFilter=tab;window._homePage=1;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHomeListings();}
function searchListings(){window._homeSearch=document.getElementById('searchInput')?.value||'';window._homePage=1;renderHomeListings();}
function toggleFavorite(id){if(favorites.includes(id))favorites=favorites.filter(f=>f!==id);else favorites.push(id);localStorage.setItem('ekipbul_favorites',JSON.stringify(favorites));renderHomeListings();}

async function addComment(listingId){const text=document.getElementById('commentText')?.value.trim();if(!text)return;await sb.from('comments').insert([{id:'com_'+Date.now(),listing_id:listingId,user_id:currentUser.id,username:currentUser.username,text,created_at:new Date().toISOString()}]);showToast('💬 Yorum eklendi!');navigateTo('home');}

async function login(){
    const email=document.getElementById('loginEmail')?.value.trim().toLowerCase();
    const pass=document.getElementById('loginPass')?.value;
    if(!email||!pass){showToast('⚠️ Doldur!');return;}
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showToast('❌ Hatalı!');return;}
    if(!data.user){showToast('❌ Kullanıcı bulunamadı!');return;}
    const{data:profiles}=await sb.from('profiles').select('*').eq('id',data.user.id);
    const profile=profiles&&profiles[0];
    if(!profile){showToast('❌ Profil bulunamadı!');return;}
    if(profile.is_banned){
        const{data:ban}=await sb.from('bans').select('*').eq('user_id',profile.id).eq('is_active',true).single();
        document.getElementById('dynamicContent').innerHTML=`<div class="ban-message"><h3>🚫 Hesabınız Engellendi</h3>
            <p class="ban-detail"><b>Hesap:</b> ${profile.username}</p><p class="ban-detail"><b>Sebep:</b> ${ban?.reason||'Belirtilmemiş'}</p>
            ${ban?.unban_date?`<p class="ban-detail"><b>Açılma:</b> ${new Date(ban.unban_date).toLocaleDateString('tr-TR')}</p>`:''}
            <p style="margin-top:12px;font-size:12px;color:var(--text3);">Haksız olduğunuzu düşünüyorsanız destek ile iletişime geçin.</p></div>`;
        return;
    }
    await sb.from('profiles').update({last_login:new Date().toISOString()}).eq('id',profile.id);
    currentUser={id:profile.id,email:data.user.email,username:profile.username,role:profile.role,is_premium:profile.is_premium,is_verified:profile.is_verified,discord:profile.discord||'',avatar_url:profile.avatar_url,banner_url:profile.banner_url,game_hours:profile.game_hours,bio:profile.bio,badges:profile.badges||[],rating:profile.rating,rating_count:profile.rating_count,invite_code:profile.invite_code,invite_count:profile.invite_count||0};
    await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:profile.id,username:profile.username,action:'GİRİŞ',detail:'Giriş yaptı'}]);
    showToast('✅ Hoş geldin, '+profile.username+'!');navigateTo('home');
}
async function loginWithDiscord(){await sb.auth.signInWithOAuth({provider:'discord',options:{redirectTo:'https://ekipbul.onrender.com'}});}
async function logout(){
    await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:currentUser?.id,username:currentUser?.username||'?',action:'ÇIKIŞ',detail:'Çıkış yaptı'}]);
    await sb.auth.signOut();currentUser=null;updateNavbar();showToast('👋 Çıkış yapıldı');navigateTo('home');
}

async function register(){
    const username=document.getElementById('regUser')?.value.trim();
    const email=document.getElementById('regEmail')?.value.trim().toLowerCase();
    const discord=document.getElementById('regDiscord')?.value.trim();
    const pass=document.getElementById('regPass')?.value;
    const inviteCode=document.getElementById('regInvite')?.value.trim();
    if(!username||!email||!discord||!pass){showToast('⚠️ Doldur!');return;}
    if(pass.length<6){showToast('⚠️ Şifre en az 6 karakter!');return;}
    const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username,discord}}});
    if(error){showToast('❌ '+error.message);return;}
    if(data.user){await sb.from('profiles').update({username,discord,invite_code:username.substring(0,4).toUpperCase()+Math.floor(Math.random()*900+100)}).eq('id',data.user.id);}
    if(inviteCode){
        const{data:inviter}=await sb.from('profiles').select('*').eq('invite_code',inviteCode).single();
        if(inviter){await sb.from('profiles').update({invite_count:(inviter.invite_count||0)+1}).eq('id',inviter.id);}
    }
    await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:data.user?.id,username,action:'KAYIT',detail:'Yeni kayıt'}]);
    showToast('✅ Kayıt başarılı! Giriş yapabilirsin.');navigateTo('login');
}

async function rateUser(uid,r){
    if(!currentUser||currentUser.id===uid)return;
    const{data:u}=await sb.from('profiles').select('*').eq('id',uid).single();if(!u)return;
    const newRating=((u.rating||0)*(u.rating_count||0)+r)/((u.rating_count||0)+1);
    const badges=[...(u.badges||[])];if(newRating>=4.5&&!badges.includes('toprated'))badges.push('toprated');
    await sb.from('profiles').update({rating:newRating,rating_count:(u.rating_count||0)+1,badges}).eq('id',uid);
    showToast('⭐ '+r+' yıldız!');document.querySelectorAll('#starRating .star').forEach((s,i)=>s.classList.toggle('active',i<r));
}
async function saveProfile(uid){
    const avatar_url=document.getElementById('editAvatar')?.value.trim()||'';
    const banner_url=document.getElementById('editBanner')?.value.trim()||'';
    const game_hours=document.getElementById('editHours')?.value.trim()||'0';
    const bio=document.getElementById('editBio')?.value.trim()||'';
    await sb.from('profiles').update({avatar_url,banner_url,game_hours,bio}).eq('id',uid);
    if(currentUser&&currentUser.id===uid){currentUser.avatar_url=avatar_url;currentUser.banner_url=banner_url;currentUser.game_hours=game_hours;currentUser.bio=bio;}
    showToast('✅ Güncellendi!');navigateTo('profile',uid);
}

// ==================== LİDERLİK ====================
async function renderLeaderboard(content){
    const{data:users}=await sb.from('profiles').select('*').eq('is_banned',false).order('invite_count',{ascending:false}).limit(20);
    content.innerHTML=`<h2 style="margin-bottom:16px;">🏆 Liderlik</h2><div class="admin-panel">${(users||[]).map((u,i)=>{
        const rc=ROLE_COLORS[u.role]||ROLE_COLORS['Player'],rClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
        return`<div class="leaderboard-item"><div class="leaderboard-rank ${rClass}" style="${!rClass?'background:var(--card);color:var(--text2);':''}">${i+1}</div><span style="flex:1;cursor:pointer;color:${rc.color}" onclick="navigateTo('profile','${u.id}')">${rc.icon} ${u.username} ${u.is_verified?'✓':''}</span><span style="font-size:11px;color:var(--text2);">⭐${Math.round(u.rating||0)} · 📨${u.invite_count||0}</span></div>`;
    }).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;
}

// ==================== SOHBET ====================
async function renderChat(content){
    const{data:messages}=await sb.from('messages').select('*').order('created_at',{ascending:false}).limit(30);
    content.innerHTML=`<h2>💬 Sohbet</h2><div class="chat-container"><div class="chat-messages" id="chatMessages">${(messages||[]).reverse().map(m=>`<div class="chat-msg ${m.sender_id===(currentUser?.id||'')?'own':''}"><b>${m.sender_id?.substring(0,6)}</b><br>${m.text}</div>`).join('')}</div>${currentUser?`<div class="chat-input-row"><input type="text" id="chatInput" placeholder="Mesaj..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-red btn-sm" onclick="sendChat()">Gönder</button></div>`:'<p style="text-align:center;padding:10px;color:var(--text3);">Giriş yap</p>'}</div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;
    setTimeout(()=>{const d=document.getElementById('chatMessages');if(d)d.scrollTop=d.scrollHeight;},100);
}
async function sendChat(){if(!currentUser)return;const text=document.getElementById('chatInput')?.value.trim();if(!text)return;await sb.from('messages').insert([{id:'msg_'+Date.now(),sender_id:currentUser.id,receiver_id:'all',text,created_at:new Date().toISOString()}]);document.getElementById('chatInput').value='';await renderChat(document.getElementById('dynamicContent'));}

// ==================== ETKİNLİKLER ====================
async function renderEvents(content){
    const{data:events}=await sb.from('events').select('*').order('date',{ascending:true});
    content.innerHTML=`<h2>📅 Etkinlikler</h2><div class="admin-panel">${(events||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(events||[]).map(e=>`<div class="event-card"><h4>${e.title}</h4><p>📅 ${new Date(e.date).toLocaleString('tr-TR')} · 🌐 ${e.server}</p><p>${e.description||''}</p></div>`).join('')}</div>${isAdmin()?`<div class="admin-card" style="margin-top:12px;"><h4>Etkinlik Ekle</h4><div class="form-group"><label>Başlık</label><input type="text" id="evTitle"></div><div class="form-group"><label>Tarih</label><input type="datetime-local" id="evDate"></div><div class="form-group"><label>Sunucu</label><select id="evServer"><option>RP Grand #1</option><option>RP Grand #2</option><option>RP Grand RP</option></select></div><div class="form-group"><label>Açıklama</label><textarea id="evDesc"></textarea></div><button class="btn btn-gold" style="width:100%;" onclick="addEvent()">Ekle</button></div>`:''}<button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;
}
async function addEvent(){const title=document.getElementById('evTitle')?.value.trim(),date=document.getElementById('evDate')?.value,server=document.getElementById('evServer')?.value,desc=document.getElementById('evDesc')?.value.trim();if(!title||!date){showToast('⚠️ Başlık ve tarih zorunlu!');return;}await sb.from('events').insert([{id:'ev_'+Date.now(),title,date,server,description:desc,created_by:currentUser.id}]);showToast('✅ Eklendi!');navigateTo('events');}

// ==================== BİLDİRİMLER ====================
async function renderNotifications(content){if(!currentUser){navigateTo('login');return;}const{data:notifs}=await sb.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});content.innerHTML=`<h2>🔔 Bildirimler</h2><div>${(notifs||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(notifs||[]).map(n=>`<div style="padding:8px;border-bottom:1px solid var(--border);font-size:12px;">${n.text}</div>`).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}

// ==================== EKİPLER ====================
async function renderTeams(content){const{data:teams}=await sb.from('teams').select('*');content.innerHTML=`<h2>👥 Ekipler</h2>${(teams||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(teams||[]).map(t=>`<div class="team-card" onclick="viewTeam('${t.id}')"><h3>${t.name}</h3><p>🌐 ${t.server} · ${t.type} · ${t.current_members}/${t.max_members} üye</p><p style="font-size:11px;color:var(--text2);">Aradığı: ${t.looking_for||'Belirtilmemiş'}</p></div>`).join('')}${currentUser?`<button class="btn btn-blue" style="width:100%;margin-top:12px;" onclick="createTeam()">+ Ekip Kur</button>`:''}<button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}
async function viewTeam(id){const{data:team}=await sb.from('teams').select('*').eq('id',id).single();if(!team)return;const{data:members}=await sb.from('team_members').select('*').eq('team_id',id);const overlay=document.createElement('div');overlay.className='modal-overlay active';overlay.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><h2>${team.name}</h2><p>🌐 ${team.server} · ${team.type} · ${team.current_members}/${team.max_members}</p><p>${team.description||''}</p><p><b>Aradığı:</b> ${team.looking_for||'Belirtilmemiş'}</p><h4 style="margin-top:12px;">Üyeler (${members?.length||0})</h4>${(members||[]).map(m=>`<p>👤 ${m.user_id} - ${m.role}</p>`).join('')}</div>`;document.body.appendChild(overlay);overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});}
async function createTeam(){const name=prompt('Ekip adı:');if(!name)return;const server=prompt('Sunucu:','RP Grand #1'),type=prompt('Tür (Mafia/Polis/Ordu/Gang):','Mafia'),looking=prompt('Aradığı roller:','Şoför, Silahçı');await sb.from('teams').insert([{id:'team_'+Date.now(),name,founder_id:currentUser.id,server,type,looking_for:looking,max_members:50,current_members:1,created_at:new Date().toISOString()}]);showToast('✅ Ekip kuruldu!');navigateTo('teams');}

// ==================== MESAJLAR ====================
async function renderMessages(content,receiverId){if(!currentUser){showToast('⚠️ Giriş yap!');return;}const{data:users}=await sb.from('profiles').select('id,username');content.innerHTML=`<h2>💬 Mesajlar</h2><select id="msgReceiver" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${(users||[]).filter(u=>u.id!==currentUser.id).map(u=>`<option value="${u.id}" ${u.id===receiverId?'selected':''}>${u.username}</option>`).join('')}</select><div style="display:flex;gap:8px;"><input type="text" id="msgText" placeholder="Mesaj..." style="flex:1;padding:10px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);"><button class="btn btn-red btn-sm" onclick="sendMessage()">Gönder</button></div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}
async function sendMessage(){const receiverId=document.getElementById('msgReceiver')?.value,text=document.getElementById('msgText')?.value.trim();if(!receiverId||!text)return;await sb.from('messages').insert([{id:'msg_'+Date.now(),sender_id:currentUser.id,receiver_id:receiverId,text,created_at:new Date().toISOString()}]);showToast('✅ Gönderildi!');navigateTo('messages',receiverId);}

// ==================== SUNUCU HARİTASI ====================
async function renderServerMap(content){const{data:listings}=await sb.from('listings').select('server').eq('deleted',false);const servers={'RP Grand #1':0,'RP Grand #2':0,'RP Grand RP':0};(listings||[]).forEach(l=>{if(servers[l.server]!==undefined)servers[l.server]++;});content.innerHTML=`<h2>🗺️ Sunucu Haritası</h2><div class="server-map">${Object.entries(servers).map(([name,count])=>`<div class="server-box"><h4>🌐 ${name}</h4><div class="server-count">${count}</div><p style="font-size:11px;color:var(--text2);">Aktif İlan</p></div>`).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}

// ==================== ADMIN PANEL ====================
async function renderAdminPanel(content){const{count:totalUsers}=await sb.from('profiles').select('*',{count:'exact',head:true});const{count:totalListings}=await sb.from('listings').select('*',{count:'exact',head:true}).eq('deleted',false);const{data:users}=await sb.from('profiles').select('*');const bannedCount=(users||[]).filter(u=>u.is_banned).length;const onlineCount=(users||[]).filter(u=>u.last_login&&(new Date()-new Date(u.last_login))<300000).length;content.innerHTML=`<div class="admin-panel"><h2>👑 Admin Panel</h2><div class="admin-grid"><div class="admin-card"><h4>👥 Kayıtlı</h4><div class="stat-big">${totalUsers||0}</div></div><div class="admin-card"><h4>🟢 Çevrimiçi</h4><div class="stat-big">${onlineCount}</div></div><div class="admin-card"><h4>📝 İlan</h4><div class="stat-big">${totalListings||0}</div></div><div class="admin-card"><h4>🚫 Yasaklı</h4><div class="stat-big">${bannedCount}</div></div></div><div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;"><button class="btn btn-gold" onclick="showAdminSection('announcement')">📢 Duyuru</button><button class="btn btn-red" onclick="showAdminSection('users')">👥 Kullanıcılar</button><button class="btn btn-blue" onclick="showAdminSection('listings')">📝 İlanlar</button><button class="btn btn-outline" onclick="showAdminSection('roles')">🎭 Rol Ver</button><button class="btn btn-outline" onclick="showAdminSection('premium')">⭐ Premium</button><button class="btn btn-outline" onclick="showAdminSection('ban')">🚫 Yasakla</button><button class="btn btn-outline" onclick="showAdminSection('verify')">✓ Onayla</button><button class="btn btn-outline" onclick="showAdminSection('logs')">📋 Loglar</button></div><div id="adminSection" style="margin-top:16px;"></div><button class="btn btn-outline" style="margin-top:16px;width:100%;" onclick="navigateTo('home')">← Ana Sayfa</button></div>`;showAdminSection('announcement');}
async function showAdminSection(section){const container=document.getElementById('adminSection');if(!container)return;switch(section){case 'announcement':container.innerHTML=`<div class="admin-card"><h4>📢 Duyuru Ekle</h4><textarea id="annText" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);min-height:60px;"></textarea><button class="btn btn-gold" style="margin-top:8px;width:100%;" onclick="addAnnouncement()">Yayınla</button></div>`;break;case 'users':{const{data:users}=await sb.from('profiles').select('*');container.innerHTML=`<div class="admin-card"><h4>👥 Kullanıcılar (${(users||[]).length})</h4>${(users||[]).map(u=>{const rc=ROLE_COLORS[u.role]||ROLE_COLORS['Player'];const isOnline=u.last_login&&(new Date()-new Date(u.last_login))<300000;return`<div style="padding:6px;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;" onclick="navigateTo('profile','${u.id}')">${rc.icon} ${u.username} - ${u.role} ${u.is_banned?'🚫':''} ${u.is_premium?'⭐':''} ${u.is_verified?'✓':''} ${isOnline?'🟢':'⚫'}</div>`;}).join('')}</div>`;break;}case 'listings':{const{data:listings}=await sb.from('listings').select('*').eq('deleted',false);container.innerHTML=`<div class="admin-card"><h4>📝 İlanlar (${(listings||[]).length})</h4>${(listings||[]).map(l=>`<div style="display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid var(--border);font-size:11px;"><span>${l.title}${l.is_pinned?' 📌':''}</span><button class="btn btn-red btn-sm" onclick="deleteListing('${l.id}');showAdminSection('listings');">Sil</button></div>`).join('')}</div>`;break;}case 'roles':{const{data:allUsers}=await sb.from('profiles').select('*');const roleUsers=(allUsers||[]).filter(u=>u.id!==currentUser?.id&&canModifyRole(u.role));container.innerHTML=`<div class="admin-card"><h4>🎭 Rol Ver</h4><select id="roleUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${roleUsers.map(u=>`<option value="${u.id}">${u.username} (${u.role})</option>`).join('')}</select><select id="roleName" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${ROLE_HIERARCHY.filter(r=>getRoleLevel(r)>getRoleLevel(currentUser.role)).map(r=>`<option value="${r}">${r}</option>`).join('')}</select><button class="btn btn-blue" style="width:100%;" onclick="changeRole()">Değiştir</button></div>`;break;}case 'premium':{const{data:pu}=await sb.from('profiles').select('*').eq('is_premium',false);container.innerHTML=`<div class="admin-card"><h4>⭐ Premium Ver</h4><select id="premUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${(pu||[]).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><button class="btn btn-gold" style="width:100%;" onclick="givePremium()">Premium Yap</button></div>`;break;}case 'ban':{const{data:bu}=await sb.from('profiles').select('*').eq('is_banned',false);container.innerHTML=`<div class="admin-card"><h4>🚫 Yasakla</h4><select id="banUserId" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${(bu||[]).filter(u=>u.id!==currentUser?.id).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><input type="text" id="banReason" placeholder="Sebep" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;"><input type="date" id="banUnbanDate" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;"><button class="btn btn-red" style="width:100%;" onclick="banUser()">Yasakla</button></div>`;break;}case 'verify':{const{data:vu}=await sb.from('profiles').select('*').eq('is_verified',false);container.innerHTML=`<div class="admin-card"><h4>✓ Onayla</h4><select id="verifyUser" style="width:100%;padding:8px;border-radius:8px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:8px;">${(vu||[]).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><button class="btn btn-blue" style="width:100%;" onclick="verifyUser()">Onayla</button></div>`;break;}case 'logs':{const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(50);container.innerHTML=`<div class="admin-card"><h4>📋 Son Loglar</h4><button class="btn btn-blue btn-sm" style="margin-bottom:8px;" onclick="exportLogs()">📥 log.txt İndir</button><div style="max-height:300px;overflow-y:auto;font-family:monospace;font-size:11px;">${(logs||[]).map(l=>`<div style="padding:2px 0;">[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail||''}</div>`).join('')}</div></div>`;break;}}}
async function addAnnouncement(){const text=document.getElementById('annText')?.value.trim();if(!text)return;await sb.from('announcements').insert([{id:'ann_'+Date.now(),author_id:currentUser.id,text,created_at:new Date().toISOString()}]);await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:currentUser.id,username:currentUser.username,action:'DUYURU',detail:text.substring(0,50)}]);showToast('📢 Yayınlandı!');showAdminSection('announcement');}
async function changeRole(){const userId=document.getElementById('roleUser')?.value,newRole=document.getElementById('roleName')?.value;if(!userId||!newRole)return;await sb.from('profiles').update({role:newRole}).eq('id',userId);await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:currentUser.id,username:currentUser.username,action:'ROL',detail:'Rol: '+newRole}]);showToast('✅ '+newRole);showAdminSection('roles');}
async function givePremium(){const userId=document.getElementById('premUser')?.value;if(!userId)return;await sb.from('profiles').update({is_premium:true}).eq('id',userId);showToast('⭐ Premium!');showAdminSection('premium');}
async function banUser(){const userId=document.getElementById('banUserId')?.value,reason=document.getElementById('banReason')?.value.trim(),unbanDate=document.getElementById('banUnbanDate')?.value;if(!userId||!reason){showToast('⚠️ Kullanıcı ve sebep zorunlu!');return;}const{data:user}=await sb.from('profiles').select('username').eq('id',userId).single();await sb.from('profiles').update({is_banned:true}).eq('id',userId);await sb.from('bans').insert([{id:'ban_'+Date.now(),user_id:userId,username:user?.username,reason,banned_by:currentUser.username,unban_date:unbanDate?new Date(unbanDate).toISOString():null,is_active:true}]);await sb.from('logs').insert([{id:'log_'+Date.now(),user_id:currentUser.id,username:currentUser.username,action:'YASAK',detail:user?.username+': '+reason}]);showToast('🚫 Yasaklandı!');showAdminSection('ban');}
async function verifyUser(){const userId=document.getElementById('verifyUser')?.value;if(!userId)return;const{data:user}=await sb.from('profiles').select('*').eq('id',userId).single();await sb.from('profiles').update({is_verified:true,badges:[...new Set([...(user?.badges||[]),'verified'])]}).eq('id',userId);showToast('✓ Onaylandı!');showAdminSection('verify');}
async function exportLogs(){const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(500);let text='EKİPBUL LOG KAYITLARI\n'+'='.repeat(60)+'\n';(logs||[]).forEach(l=>{text+=`[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail||''}\n`;});const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ekipbul_log_'+new Date().toISOString().slice(0,10)+'.txt';a.click();showToast('📥 log.txt indirildi!');}

function timeAgo(d){const diff=Math.floor((new Date()-new Date(d))/1000);if(diff<60)return'Az önce';if(diff<3600)return Math.floor(diff/60)+' dk';if(diff<86400)return Math.floor(diff/3600)+' saat';return Math.floor(diff/86400)+' gün';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(window._toastTimeout);window._toastTimeout=setTimeout(()=>{t.style.display='none';},2500);}
function initApp(){if(localStorage.getItem('ekipbul_darkmode')==='on')document.body.classList.add('dark-mode');updateNavbar();navigateTo('home');}
initApp();
</script>
</body>
