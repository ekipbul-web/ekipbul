<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkipBul - RP Grand Mobile</title>
    <meta name="description" content="EkipBul - RP Grand Mobile için profesyonel ekip bulma platformu">
    <link rel="manifest" href="data:application/json,{}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #04040b;
            --card: #0a0a1a;
            --card2: #0f0f25;
            --border: #1a1a38;
            --red: #ff4164;
            --red2: #ff6b81;
            --blue: #4da6ff;
            --blue2: #7abfff;
            --yellow: #ffb830;
            --gold: #ffc944;
            --text: #f0f0ff;
            --text2: #b0b0cc;
            --text3: #7777aa;
            --green: #33cc77;
            --purple: #bb66ff;
            --radius: 20px;
            --shadow: 0 8px 40px rgba(0,0,0,0.6);
            --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 20% 20%, #0f0f2e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #1a0020 0%, transparent 50%),
                radial-gradient(ellipse at top, #0a0a2e 0%, #04040b 70%);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #04040b; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        .navbar {
            background: rgba(8,8,25,0.9);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,65,100,0.25);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -1px;
        }
        .logo span {
            background: linear-gradient(135deg, var(--red), var(--red2), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 20px rgba(255,65,100,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(255,65,100,0.5); }
            50% { box-shadow: 0 4px 30px rgba(255,65,100,0.8); }
        }
        .nav-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap;
            text-decoration: none;
            letter-spacing: 0.4px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        .btn:active::after { width: 300px; height: 300px; }
        .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.2); }
        .btn-outline:hover { border-color: var(--red); background: rgba(255,65,100,0.08); transform: translateY(-2px); }
        .btn-red { background: linear-gradient(135deg, var(--red), var(--red2)); color: #fff; box-shadow: 0 4px 18px rgba(255,65,100,0.3); }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,65,100,0.5); }
        .btn-blue { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: #fff; box-shadow: 0 4px 18px rgba(77,166,255,0.3); }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(77,166,255,0.5); }
        .btn-gold { background: linear-gradient(135deg, var(--yellow), var(--gold)); color: #1a1a2e; box-shadow: 0 4px 18px rgba(255,184,48,0.3); }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,184,48,0.5); }
        .btn-green { background: linear-gradient(135deg, var(--green), #55ee99); color: #fff; }
        .btn-discord { background: linear-gradient(135deg, #5865F2, #7b83ff); color: #fff; box-shadow: 0 4px 18px rgba(88,101,242,0.3); }
        .btn-github { background: linear-gradient(135deg, #333, #555); color: #fff; box-shadow: 0 4px 18px rgba(51,51,51,0.3); }
        .btn-guest { background: linear-gradient(135deg, var(--purple), #dd88ff); color: #fff; box-shadow: 0 4px 18px rgba(187,102,255,0.3); }
        .btn-sm { padding: 7px 16px; font-size: 11px; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            padding: 9px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .user-badge:hover { border-color: var(--red); box-shadow: 0 4px 16px rgba(255,65,100,0.2); }
        .role-dot { width: 10px; height: 10px; border-radius: 50%; }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        .hero {
            background: linear-gradient(180deg, rgba(255,65,100,0.12) 0%, transparent 100%);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        .hero p { color: var(--text2); font-size: 15px; opacity: 0.8; }

        .tabs { display: flex; gap: 6px; background: var(--card); padding: 6px; border-radius: 30px; margin-bottom: 24px; flex-wrap: wrap; border: 1px solid var(--border); }
        .tab-btn {

            border: none;
            background: transparent;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: var(--text2);
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .tab-btn.active { background: linear-gradient(135deg, var(--red), var(--red2)); color: #fff; }

        .listings { display: flex; flex-direction: column; gap: 16px; }
        .listing-card {
            background: linear-gradient(135deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;

        .listing-card:hover { border-color: var(--red); transform: translateY(-4px); box-shadow: var(--shadow); }
        .listing-card.premium { border-color: rgba(255,184,48,0.5); background: linear-gradient(135deg, #1a1a08, #0a0a1a); }
        .listing-card.pinned { border-color: rgba(77,166,255,0.5); background: linear-gradient(135deg, #001a2e, #0a0a1a); }
        .listing-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
        .listing-avatar {

            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            flex-shrink: 0;

            background-position: center;

        .listing-title { font-weight: 700; font-size: 16px; flex: 1; min-width: 150px; }
        .listing-meta { font-size: 12px; color: var(--text2); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
        .listing-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 5px 12px; border-radius: 20px; font-weight: 700; letter-spacing: 0.3px; }
        .tag-lfm { background: rgba(255,184,48,0.2); color: var(--yellow); }
        .tag-lfg { background: rgba(51,204,119,0.2); color: var(--green); }
        .tag-server { background: rgba(77,166,255,0.2); color: var(--blue); }

        .tag-pinned { background: rgba(77,166,255,0.2); color: var(--blue); }
        .listing-action { margin-top: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .listing-views { font-size: 11px; color: var(--text3); }
        .favorite-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; color: #333; transition: 0.2s; }
        .favorite-btn.active { color: var(--red); }

        .form-container {
            background: linear-gradient(135deg, var(--card), var(--card2));
            border-radius: var(--radius);

            max-width: 500px;
            margin: 40px auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);

        .form-container h2 { text-align: center; margin-bottom: 24px; font-size: 22px; font-weight: 900; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--bg);
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--red); box-shadow: 0 0 0 4px rgba(255,65,100,0.1); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 20px rgba(255,65,100,0.3);
            transition: all 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,65,100,0.5); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(15px); }
        .modal-overlay.active { display: flex; }
        .modal {
            background: linear-gradient(135deg, var(--card), var(--card2));
            border-radius: var(--radius);
            padding: 28px;
            width: 100%;
            max-width: 580px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
            box-shadow: var(--shadow);
        }
        .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        .admin-panel { background: linear-gradient(135deg, var(--card), var(--card2)); border-radius: var(--radius); padding: 28px; border: 1px solid rgba(255,65,100,0.3); }
        .admin-panel h2 { font-size: 24px; margin-bottom: 24px; color: var(--red); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; }
        .admin-card { background: var(--bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
        .admin-card h4 { font-size: 14px; margin-bottom: 12px; color: var(--yellow); }
        .admin-card .stat-big { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--red), var(--red2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1a1a2e, #2a2a4e); color: #fff; padding: 14px 28px; border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 9999; display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.6); border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        /* ADMIN MESAJ POPUP */
        .admin-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a0030, #0a0a1a);
            border: 2px solid var(--gold);
            border-radius: var(--radius);
            padding: 30px;
            z-index: 3000;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,184,48,0.4);
            animation: popIn 0.5s ease;
            max-width: 450px;
            width: 90%;
        }
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .admin-popup h3 { color: var(--gold); margin-bottom: 10px; font-size: 20px; }
        .admin-popup p { color: var(--text); font-size: 16px; margin-bottom: 16px; }
        .admin-popup .popup-close {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
        }

        .star-rating { display: flex; gap: 4px; }
        .star-rating .star { color: #333; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .star-rating .star.active { color: var(--gold); }

        .badge-icon { display: inline-block; padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: 700; margin: 3px; }

        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 24px; }
        .page-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-weight: 700; font-size: 14px; color: var(--text); transition: all 0.2s; }
        .page-btn.active { background: linear-gradient(135deg, var(--red), var(--red2)); color: #fff; border-color: var(--red); }

        .footer { text-align: center; padding: 28px; color: var(--text3); font-size: 12px; border-top: 1px solid var(--border); margin-top: 50px; }

        .server-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .server-box { background: linear-gradient(135deg, var(--card), var(--card2)); border-radius: var(--radius); padding: 20px; text-align: center; border: 1px solid var(--border); }
        .server-box h4 { color: var(--blue); margin-bottom: 8px; font-size: 15px; }
        .server-box .server-count { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, var(--red), var(--red2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .divider { text-align: center; color: var(--text3); margin: 18px 0; font-size: 12px; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: var(--border); }
        .divider::before { left: 0; }

        .comment { background: var(--bg); padding: 10px 14px; border-radius: 10px; margin-top: 6px; font-size: 13px; border: 1px solid var(--border); }

        .online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .online-dot.active { background: #33cc77; box-shadow: 0 0 8px #33cc77; }
        .online-dot.offline { background: #555; }

        @media (max-width: 768px) {
            .navbar { padding: 10px 14px; }
            .logo { font-size: 18px; }
            .btn { padding: 8px 14px; font-size: 11px; }
            .hero h1 { font-size: 24px; }
            .tab-btn { padding: 8px 14px; font-size: 11px; }
            .listing-header { flex-direction: column; align-items: flex-start; }
            .admin-grid { grid-template-columns: 1fr; }
            .profile-banner { height: 120px; }
        }
    </style>
</head>

    'Chief Admin':{color:'#f1c40f',class:'rb-chief',dot:'#f1c40f',icon:'⭐'},
    'Senior Admin':{color:'#3498db',class:'rb-senior',dot:'#3498db',icon:'💎'},
    'Admin':{color:'#e74c3c',class:'rb-admin',dot:'#e74c3c',icon:'🔴'},
    'Technical Admin':{color:'#00bcd4',class:'rb-technical',dot:'#00bcd4',icon:'🔧'},
    'Moderator':{color:'#2ecc71',class:'rb-moderator',dot:'#2ecc71',icon:'🛡️'},
    'Yazıcı':{color:'#9b59b6',class:'rb-writer',dot:'#9b59b6',icon:'✍️'},
    'Player':{color:'#aaa',class:'rb-player',dot:'#aaa',icon:'🎮'}
};
const BADGES = {
    'founder':{name:'Kurucu',icon:'👑',color:'#ffd700'},'premium':{name:'Premium',icon:'⭐',color:'#f1c40f'},
    'verified':{name:'Onaylı',icon:'✓',color:'#3498db'},'veteran':{name:'Veteran',icon:'🎖️',color:'#e74c3c'},
    'inviter5':{name:'5 Davet',icon:'📨',color:'#2ecc71'},'inviter10':{name:'10 Davet',icon:'📬',color:'#9b59b6'},
    'inviter25':{name:'25 Davet',icon:'📦',color:'#ffa500'},'toprated':{name:'En İyi',icon:'💎',color:'#00bcd4'},
    'first_listing':{name:'İlk İlan',icon:'📝',color:'#ffb830'},'ten_listings':{name:'10 İlan',icon:'📋',color:'#4da6ff'},
    'hundred_views':{name:'100 Görüntülenme',icon:'👁',color:'#33cc77'}
};

let currentUser = null;
let favorites = JSON.parse(localStorage.getItem('ekipbul_favorites')) || [];

function isAdmin(){return currentUser&&ADMIN_ROLES.includes(currentUser.role);}
function getRoleLevel(r){return ROLE_HIERARCHY.indexOf(r);}
function canModifyRole(tr){return currentUser&&getRoleLevel(currentUser.role)<getRoleLevel(tr);}
function getBadgeHTML(b){const d=BADGES[b];return d?`<span class="badge-icon" style="background:${d.color}20;color:${d.color};border:1px solid ${d.color};">${d.icon} ${d.name}</span>`:'';}
function checkAchievementBadges(user,listings){const b=[...(user.badges||[])];if((listings||[]).length>=1&&!b.includes('first_listing'))b.push('first_listing');if((listings||[]).length>=10&&!b.includes('ten_listings'))b.push('ten_listings');if((listings||[]).some(l=>(l.views||0)>=100)&&!b.includes('hundred_views'))b.push('hundred_views');return b;}

function timeAgo(d){const diff=Math.floor((new Date()-new Date(d))/1000);if(diff<60)return'Az önce';if(diff<3600)return Math.floor(diff/60)+' dk önce';if(diff<86400)return Math.floor(diff/3600)+' saat önce';return Math.floor(diff/86400)+' gün önce';}
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.style.display='block';clearTimeout(window._toastTimeout);window._toastTimeout=setTimeout(()=>{t.style.display='none';},3000);}

// ==================== OTURUM ====================
async function loadUserProfile(userId){
    const{data:profiles}=await sb.from('profiles').select('*').eq('id',userId);
    const profile=profiles&&profiles[0];
    if(profile){
        const{data:listings}=await sb.from('listings').select('views').eq('author_id',userId).eq('deleted',false);
        const updatedBadges=checkAchievementBadges(profile,listings||[]);
        if(JSON.stringify(updatedBadges)!==JSON.stringify(profile.badges||[])){await sb.from('profiles').update({badges:updatedBadges}).eq('id',userId);profile.badges=updatedBadges;}
        const{data:user}=await sb.auth.getUser();
        currentUser={id:profile.id,email:user.user?.email||'',username:profile.username,role:profile.role,is_premium:profile.is_premium,is_verified:profile.is_verified,discord:profile.discord||'',avatar_url:profile.avatar_url,banner_url:profile.banner_url,game_hours:profile.game_hours,bio:profile.bio,badges:profile.badges||[],rating:profile.rating,rating_count:profile.rating_count,invite_code:profile.invite_code,invite_count:profile.invite_count||0,last_username_change:profile.last_username_change};
        localStorage.setItem('ekipbul_session',JSON.stringify(currentUser));
    }
}

function loadSessionFromStorage(){
    const saved=localStorage.getItem('ekipbul_session');
    if(saved){try{const p=JSON.parse(saved);if(p&&p.id){currentUser=p;return true;}}catch(e){localStorage.removeItem('ekipbul_session');}}
    return false;
}

sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){await loadUserProfile(session.user.id);updateNavbar();}
    if(event==='SIGNED_OUT'){currentUser=null;localStorage.removeItem('ekipbul_session');updateNavbar();navigateTo('home');}
});

function updateNavbar(){
    const nav=document.getElementById('navActions');
    if(currentUser){
        const rc=ROLE_COLORS[currentUser.role]||ROLE_COLORS['Player'];
        nav.innerHTML=`
            <button class="btn btn-outline btn-sm" onclick="navigateTo('notifications')">🔔</button>
            <span class="user-badge" onclick="navigateTo('profile','${currentUser.id}')"><span class="role-dot" style="background:${rc.dot}"></span><span style="color:${rc.color}">${currentUser.username}</span>${currentUser.is_verified?'<span style="color:var(--blue);">✓</span>':''}<span class="role-badge ${rc.class}">${rc.icon} ${currentUser.role}</span></span>
            ${isAdmin()?'<button class="btn btn-gold btn-sm" onclick="navigateTo(\'admin\')">👑 Panel</button>':''}
            <button class="btn btn-red btn-sm" onclick="navigateTo('create-listing')">📝 İlan Ver</button>
            <button class="btn btn-blue btn-sm" onclick="navigateTo('teams')">👥 Ekipler</button>
            <button class="btn btn-outline btn-sm" onclick="logout()">Çıkış</button>`;
    }else{
        nav.innerHTML=`<button class="btn btn-outline btn-sm" onclick="navigateTo('login')">Giriş</button>`;
    }
}

async function navigateTo(page,data){
    const content=document.getElementById('dynamicContent');updateNavbar();
    switch(page){
        case 'home':await renderHome(content);break;
        case 'login':renderLogin(content);break;
        case 'create-listing':if(!currentUser){showToast('⚠️ Giriş yap!');renderLogin(content);return;}renderCreateListing(content);break;
        case 'admin':if(!isAdmin()){showToast('⚠️ Yetkisiz!');await renderHome(content);return;}await renderAdminPanel(content);break;
        case 'profile':await renderProfile(content,data);break;
        case 'leaderboard':await renderLeaderboard(content);break;
        case 'chat':await renderChat(content);break;
        case 'events':await renderEvents(content);break;
        case 'notifications':await renderNotifications(content);break;
        case 'teams':await renderTeams(content);break;
        case 'messages':await renderMessages(content,data);break;
        case 'server-map':await renderServerMap(content);break;
        default:await renderHome(content);
    }
    window.scrollTo({top:0,behavior:'smooth'});
}

    content.innerHTML=`<div class="form-container"><h2>🔐 EkipBul'a Giriş Yap</h2><p style="text-align:center;color:var(--text2);margin-bottom:20px;font-size:14px;">Tek tıkla hızlı giriş</p>
        <button class="btn btn-discord" style="width:100%;margin-bottom:12px;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;" onclick="loginWithDiscord()">🟣 Discord ile Giriş Yap</button>
        <button class="btn btn-github" style="width:100%;margin-bottom:12px;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;" onclick="loginWithGitHub()">🐙 GitHub ile Giriş Yap</button>
        <button class="btn btn-guest" style="width:100%;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;" onclick="loginAsGuest()">👻 Misafir Girişi</button></div>`;
}
async function loginWithDiscord(){await sb.auth.signInWithOAuth({provider:'discord',options:{redirectTo:'https://ekipbul.onrender.com'}});}
async function loginWithGitHub(){await sb.auth.signInWithOAuth({provider:'github',options:{redirectTo:'https://ekipbul.onrender.com'}});}
async function loginAsGuest(){
    const guestId='guest_'+Date.now()+'_'+Math.random().toString(36).substring(2,10);
    const guestName='Misafir_'+Math.floor(Math.random()*9000+1000);
    const{error}=await sb.from('profiles').insert([{id:guestId,username:guestName,role:'Player',is_premium:false,is_banned:false,is_verified:false,game_hours:'0',rating:0,rating_count:0,invite_count:0,created_at:new Date().toISOString()}]);
    if(error){console.error('Misafir hatası:',error);showToast('❌ Misafir girişi başarısız!');return;}
    currentUser={id:guestId,email:'',username:guestName,role:'Player',is_premium:false,is_verified:false,discord:'',avatar_url:'',banner_url:'',game_hours:'0',bio:'',badges:[],rating:0,rating_count:0,invite_code:'',invite_count:0,is_guest:true};
    localStorage.setItem('ekipbul_session',JSON.stringify(currentUser));
    updateNavbar();showToast('✅ Hoş geldin, '+guestName+'!');navigateTo('home');
}
async function logout(){
    if(currentUser&&!currentUser.is_guest)await sb.auth.signOut();
    currentUser=null;localStorage.removeItem('ekipbul_session');updateNavbar();showToast('👋 Çıkış yapıldı');navigateTo('home');
}

// ==================== ANA SAYFA ====================
async function renderHome(content){
    const{data:listings}=await sb.from('listings').select('*').eq('deleted',false).order('created_at',{ascending:false});
    const{data:announcements}=await sb.from('announcements').select('*').order('created_at',{ascending:false}).limit(1);
    const premiumPinned=(listings||[]).filter(l=>l.is_premium||l.is_pinned);
    const normal=(listings||[]).filter(l=>!l.is_premium&&!l.is_pinned);
    const allListings=[...premiumPinned,...normal];
    let annHTML='';
    if(announcements&&announcements.length>0)annHTML=`<div class="announcement"><strong>📢 Duyuru:</strong> ${announcements[0].text}</div>`;
    content.innerHTML=annHTML+`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        <button class="btn btn-outline btn-sm" onclick="navigateTo('leaderboard')">🏆 Liderlik</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('chat')">💬 Sohbet</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('events')">📅 Etkinlikler</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('messages')">💬 Mesajlar</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('server-map')">🗺️ Sunucu Haritası</button></div>
        <div class="tabs"><button class="tab-btn active" onclick="filterHomeTab('all',this)">Tümü (${allListings.length})</button>
        <button class="tab-btn" onclick="filterHomeTab('lfm',this)">Aranan</button>
        <button class="tab-btn" onclick="filterHomeTab('lfg',this)">Arıyor</button>
        <button class="tab-btn" onclick="filterHomeTab('premium',this)">⭐ Premium</button>
        <button class="tab-btn" onclick="filterHomeTab('pinned',this)">📌 Sabit</button>
        <button class="tab-btn" onclick="filterHomeTab('favorites',this)">❤️ Favoriler</button></div>
        <input type="text" placeholder="🔍 İlan ara..." id="searchInput" style="width:100%;padding:14px 18px;border-radius:30px;background:var(--card);border:2px solid var(--border);color:#fff;margin-bottom:16px;font-size:14px;outline:none;" oninput="searchListings()">
        <div class="listings" id="homeListings"></div><div class="pagination" id="pagination"></div>`;
    window._homeListings=allListings;window._homeFilter='all';window._homePage=1;window._homeSearch='';renderHomeListings();
}
function renderHomeListings(){
    const container=document.getElementById('homeListings');if(!container)return;
    let data=window._homeListings||[];
    if(window._homeFilter==='lfm')data=data.filter(l=>l.type==='lfm');
    if(window._homeFilter==='lfg')data=data.filter(l=>l.type==='lfg');
    if(window._homeFilter==='premium')data=data.filter(l=>l.is_premium);
    if(window._homeFilter==='pinned')data=data.filter(l=>l.is_pinned);
    if(window._homeFilter==='favorites')data=data.filter(l=>favorites.includes(l.id));
    if(window._homeSearch){const s=window._homeSearch.toLowerCase();data=data.filter(l=>l.title.toLowerCase().includes(s)||l.description.toLowerCase().includes(s)||l.server.toLowerCase().includes(s));}
    const perPage=8,page=window._homePage||1,totalPages=Math.ceil(data.length/perPage),slice=data.slice((page-1)*perPage,page*perPage);
    container.innerHTML=slice.map(l=>{const avLetter=(l.author_id||'?').charAt(0).toUpperCase(),isFav=favorites.includes(l.id);return`<div class="listing-card ${l.is_premium?'premium':''} ${l.is_pinned?'pinned':''}" onclick="viewListing('${l.id}')"><button class="favorite-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${l.id}')">${isFav?'❤️':'🤍'}</button>${l.is_pinned?'<div style="position:absolute;top:10px;left:16px;font-size:18px;">📌</div>':''}${l.is_premium&&!l.is_pinned?'<div style="position:absolute;top:10px;left:16px;font-size:18px;">⭐</div>':''}<div class="listing-header"><div class="listing-avatar">${avLetter}</div><div class="listing-title">${l.title}</div></div><div class="listing-meta"><span>🌐 ${l.server}</span><span>🕐 ${timeAgo(l.created_at)}</span><span>👁 ${l.views||0}</span></div><div class="listing-tags"><span class="tag ${l.type==='lfm'?'tag-lfm':'tag-lfg'}">${l.type==='lfm'?'Aranan':'Arıyor'}</span><span class="tag tag-server">${l.server}</span>${l.is_premium?'<span class="tag tag-premium">Premium</span>':''}${l.is_pinned?'<span class="tag tag-pinned">Sabit</span>':''}</div><div class="listing-action"><button class="btn btn-blue btn-sm" onclick="event.stopPropagation();copyDiscord('${l.discord}')">📩 İletişim</button></div></div>`;}).join('');
    const pagDiv=document.getElementById('pagination');if(pagDiv&&totalPages>1)pagDiv.innerHTML=Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===page?'active':''}" onclick="window._homePage=${i+1};renderHomeListings();">${i+1}</button>`).join('');
}
function filterHomeTab(tab,btn){window._homeFilter=tab;window._homePage=1;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHomeListings();}
function searchListings(){window._homeSearch=document.getElementById('searchInput')?.value||'';window._homePage=1;renderHomeListings();}
function toggleFavorite(id){if(favorites.includes(id))favorites=favorites.filter(f=>f!==id);else favorites.push(id);localStorage.setItem('ekipbul_favorites',JSON.stringify(favorites));renderHomeListings();}

async function viewListing(id){
    const{data:listing}=await sb.from('listings').select('*').eq('id',id).single();if(!listing)return;
    await sb.from('listings').update({views:(listing.views||0)+1}).eq('id',id);
    const{data:comments}=await sb.from('comments').select('*').eq('listing_id',id).order('created_at',{ascending:true});
    const overlay=document.createElement('div');overlay.className='modal-overlay active';
    overlay.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><h3>${listing.title}</h3><p class="modal-server">🌐 ${listing.server} · 🕐 ${timeAgo(listing.created_at)}</p><div class="modal-desc">${listing.description}</div><div class="modal-row"><span>İlan Türü</span><span>${listing.type==='lfm'?'Aranan':'Arıyor'}</span></div><div class="modal-row"><span>Discord</span><span>${listing.discord}</span></div><button class="btn-modal-contact" onclick="copyDiscord('${listing.discord}')">💬 Discord'u Kopyala</button>${isAdmin()?`<button class="btn btn-blue btn-sm" style="width:100%;margin-top:8px;" onclick="togglePin('${listing.id}',${listing.is_pinned||false});this.closest('.modal-overlay').remove();">${listing.is_pinned?'📌 Sabitlemeyi Kaldır':'📌 Sabitle'}</button>`:''}${isAdmin()?`<button class="btn btn-red btn-sm" style="width:100%;margin-top:8px;" onclick="deleteListing('${listing.id}');this.closest('.modal-overlay').remove();">🗑️ Sil</button>`:''}<div class="modal-comments" style="margin-top:16px;"><h4>💬 Yorumlar (${(comments||[]).length})</h4><div id="modalCommentsList">${(comments||[]).map(c=>`<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`).join('')}</div>${currentUser?`<textarea id="commentText" placeholder="Yorum yaz..." style="width:100%;margin-top:8px;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);" rows="2"></textarea><button class="btn btn-green btn-sm" style="margin-top:6px;" onclick="addComment('${listing.id}')">Gönder</button>`:''}</div></div>`;
    document.body.appendChild(overlay);overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
}
async function togglePin(id,current){await sb.from('listings').update({is_pinned:!current}).eq('id',id);showToast(current?'📌 Kaldırıldı':'📌 Sabitlendi!');navigateTo('home');}
async function addComment(listingId){
    const text=document.getElementById('commentText')?.value.trim();if(!text)return;
    const{error}=await sb.from('comments').insert([{id:'com_'+Date.now(),listing_id:listingId,user_id:currentUser.id,username:currentUser.username,text,created_at:new Date().toISOString()}]);
    if(error){console.error('Yorum hatası:',error);showToast('❌ Yorum eklenemedi!');return;}
    showToast('💬 Yorum eklendi!');document.getElementById('commentText').value='';
    const{data:comments}=await sb.from('comments').select('*').eq('listing_id',listingId).order('created_at',{ascending:true});
    const cList=document.getElementById('modalCommentsList');if(cList&&comments)cList.innerHTML=comments.map(c=>`<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`).join('');
}
async function deleteListing(id){await sb.from('listings').update({deleted:true}).eq('id',id);showToast('🗑️ Silindi!');navigateTo('home');}
function copyDiscord(d){navigator.clipboard.writeText(d).then(()=>showToast('✅ Kopyalandı')).catch(()=>showToast('📋 '+d));}

// ==================== PROFİL ====================
async function renderProfile(content,userId){const uid=userId||currentUser?.id;const{data:user}=await sb.from('profiles').select('*').eq('id',uid).single();if(!user){showToast('❌ Bulunamadı!');return;}const rc=ROLE_COLORS[user.role]||ROLE_COLORS['Player'];const avStyle=user.avatar_url?`background-image:url(${user.avatar_url});color:transparent;`:'';const bannerStyle=user.banner_url?`background-image:url(${user.banner_url});`:'';const isOwn=currentUser&&currentUser.id===user.id;const isOnline=(user.last_login&&(new Date()-new Date(user.last_login))<300000);content.innerHTML=`<div class="admin-panel"><div class="profile-banner" style="${bannerStyle}"></div><div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;"><div class="modal-avatar" style="${avStyle}">${avStyle?'':user.username.charAt(0).toUpperCase()}${user.is_verified?'<span class="verified-badge">✓</span>':''}</div><div><h2 style="color:${rc.color};margin:0">${rc.icon} ${user.username}</h2><span class="role-badge ${rc.class}">${user.role}</span> ${user.is_premium?'⭐':''} ${user.is_verified?'✓ Onaylı':''} <span class="online-dot ${isOnline?'active':'offline'}"></span>${isOnline?'Çevrimiçi':'Çevrimdışı'}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${(user.badges||[]).map(b=>getBadgeHTML(b)).join('')}</div><div class="modal-row"><span>Discord</span><span>${user.discord||'-'}</span></div><div class="modal-row"><span>Oyun Süresi</span><span>${user.game_hours||'0'}</span></div><div class="modal-row"><span>Puan</span><span>${'⭐'.repeat(Math.round(user.rating||0))} (${user.rating_count||0} oy)</span></div><div class="modal-row"><span>Davet</span><span>${user.invite_code||'-'} (${user.invite_count||0} davet)</span></div><p style="margin-top:12px;color:var(--text2);font-size:14px;">${user.bio||'Biyografi yok.'}</p>${!isOwn?`<div style="margin-top:14px;"><p style="font-size:12px;color:var(--text3);margin-bottom:6px;">Puanla:</p><div class="star-rating" id="starRating">${[1,2,3,4,5].map(i=>`<span class="star" onclick="rateUser('${user.id}',${i})">★</span>`).join('')}</div></div>`:`<div style="margin-top:18px;"><h4 style="margin-bottom:10px;">✏️ Düzenle</h4><div class="form-group"><label>Avatar URL (GIF)</label><input type="text" id="editAvatar" value="${user.avatar_url||''}"></div><div class="form-group"><label>Banner URL (GIF)</label><input type="text" id="editBanner" value="${user.banner_url||''}"></div><div class="form-group"><label>Kullanıcı Adı ${user.last_username_change?`(Son: ${new Date(user.last_username_change).toLocaleDateString('tr-TR')})`:''}</label><input type="text" id="editUsername" value="${user.username}" ${user.last_username_change&&(new Date()-new Date(user.last_username_change))<172800000?'disabled':''}></div><div class="form-group"><label>Oyun Süresi</label><input type="text" id="editHours" value="${user.game_hours||'0'}"></div><div class="form-group"><label>Biyografi</label><textarea id="editBio">${user.bio||''}</textarea></div><button class="btn btn-red" style="width:100%;" onclick="saveProfile('${user.id}')">💾 Kaydet</button></div>`}<button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button></div>`;}
async function rateUser(uid,r){if(!currentUser||currentUser.id===uid)return;const{data:u}=await sb.from('profiles').select('*').eq('id',uid).single();if(!u)return;const newRating=((u.rating||0)*(u.rating_count||0)+r)/((u.rating_count||0)+1);const badges=[...(u.badges||[])];if(newRating>=4.5&&!badges.includes('toprated'))badges.push('toprated');await sb.from('profiles').update({rating:newRating,rating_count:(u.rating_count||0)+1,badges}).eq('id',uid);showToast('⭐ '+r+' yıldız!');document.querySelectorAll('#starRating .star').forEach((s,i)=>s.classList.toggle('active',i<r));}
async function saveProfile(uid){const avatar_url=document.getElementById('editAvatar')?.value.trim()||'';const banner_url=document.getElementById('editBanner')?.value.trim()||'';const newUsername=document.getElementById('editUsername')?.value.trim();const game_hours=document.getElementById('editHours')?.value.trim()||'0';const bio=document.getElementById('editBio')?.value.trim()||'';const updates={avatar_url,banner_url,game_hours,bio};if(newUsername&&newUsername!==currentUser.username){const{data:existing}=await sb.from('profiles').select('id').eq('username',newUsername).neq('id',uid).single();if(existing){showToast('⚠️ Bu kullanıcı adı alınmış!');return;}const{data:user}=await sb.from('profiles').select('last_username_change').eq('id',uid).single();if(user?.last_username_change&&(new Date()-new Date(user.last_username_change))<172800000){showToast('⚠️ 2 gün dolmadan değiştiremezsin!');return;}updates.username=newUsername;updates.last_username_change=new Date().toISOString();}await sb.from('profiles').update(updates).eq('id',uid);if(currentUser&&currentUser.id===uid){Object.assign(currentUser,updates);}showToast('✅ Güncellendi!');navigateTo('profile',uid);}

// ==================== LİDERLİK ====================
async function renderLeaderboard(content){const{data:users}=await sb.from('profiles').select('*').eq('is_banned',false).order('invite_count',{ascending:false}).limit(20);content.innerHTML=`<h2 style="margin-bottom:18px;">🏆 Liderlik</h2><div class="admin-panel">${(users||[]).map((u,i)=>{const rc=ROLE_COLORS[u.role]||ROLE_COLORS['Player'],rClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';return`<div class="leaderboard-item"><div class="leaderboard-rank ${rClass}" style="${!rClass?'background:var(--card);color:var(--text2);':''}">${i+1}</div><span style="flex:1;cursor:pointer;color:${rc.color};font-weight:700;" onclick="navigateTo('profile','${u.id}')">${rc.icon} ${u.username} ${u.is_verified?'✓':''}</span><span style="font-size:12px;color:var(--text2);">⭐${Math.round(u.rating||0)} · 📨${u.invite_count||0}</span></div>`;}).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}

// ==================== SOHBET ====================
async function renderChat(content){const{data:messages}=await sb.from('messages').select('*').order('created_at',{ascending:false}).limit(30);content.innerHTML=`<h2 style="margin-bottom:18px;">💬 Canlı Sohbet</h2><div class="chat-container"><div class="chat-messages" id="chatMessages">${(messages||[]).reverse().map(m=>`<div class="chat-msg ${m.sender_id===(currentUser?.id||'')?'own':''}"><b style="font-size:10px;opacity:0.7;">${m.sender_id?.substring(0,8)}</b><br>${m.text}</div>`).join('')}</div>${currentUser?`<div class="chat-input-row"><input type="text" id="chatInput" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-red btn-sm" onclick="sendChat()">Gönder</button></div>`:'<p style="text-align:center;padding:14px;color:var(--text3);">Giriş yap</p>'}</div><button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;setTimeout(()=>{const d=document.getElementById('chatMessages');if(d)d.scrollTop=d.scrollHeight;},100);}
async function sendChat(){if(!currentUser)return;const text=document.getElementById('chatInput')?.value.trim();if(!text)return;await sb.from('messages').insert([{id:'msg_'+Date.now(),sender_id:currentUser.id,text,created_at:new Date().toISOString()}]);document.getElementById('chatInput').value='';await renderChat(document.getElementById('dynamicContent'));}

// ==================== ETKİNLİKLER ====================
async function renderEvents(content){const{data:events}=await sb.from('events').select('*').order('date',{ascending:true});content.innerHTML=`<h2 style="margin-bottom:18px;">📅 Etkinlikler</h2><div class="admin-panel">${(events||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(events||[]).map(e=>`<div class="event-card"><h4>${e.title}</h4><p style="font-size:12px;color:var(--text2);">📅 ${new Date(e.date).toLocaleString('tr-TR')} · 🌐 ${e.server}</p></div>`).join('')}</div>${isAdmin()?`<div class="admin-card" style="margin-top:14px;"><h4>Etkinlik Ekle</h4><div class="form-group"><label>Başlık</label><input type="text" id="evTitle"></div><div class="form-group"><label>Tarih</label><input type="datetime-local" id="evDate"></div><div class="form-group"><label>Sunucu</label><select id="evServer"><option>RP Grand #1</option><option>RP Grand #2</option><option>RP Grand RP</option></select></div><button class="btn btn-gold" style="width:100%;" onclick="addEvent()">➕ Ekle</button></div>`:''}<button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}
async function addEvent(){const title=document.getElementById('evTitle')?.value.trim(),date=document.getElementById('evDate')?.value,server=document.getElementById('evServer')?.value;if(!title||!date){showToast('⚠️ Başlık ve tarih zorunlu!');return;}await sb.from('events').insert([{id:'ev_'+Date.now(),title,date,server,created_by:currentUser.id}]);showToast('✅ Eklendi!');navigateTo('events');}

// ==================== BİLDİRİMLER ====================
async function renderNotifications(content){if(!currentUser){navigateTo('login');return;}const{data:notifs}=await sb.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});content.innerHTML=`<h2 style="margin-bottom:18px;">🔔 Bildirimler</h2><div class="admin-panel">${(notifs||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(notifs||[]).map(n=>`<div style="padding:10px;border-bottom:1px solid var(--border);font-size:13px;">${n.text}</div>`).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}

// ==================== EKİPLER ====================
async function renderTeams(content){const{data:teams}=await sb.from('teams').select('*');content.innerHTML=`<h2 style="margin-bottom:18px;">👥 Ekipler</h2>${(teams||[]).length===0?'<p style="color:var(--text3);">Yok</p>':''}${(teams||[]).map(t=>`<div class="team-card" onclick="viewTeam('${t.id}')"><h3>${t.name}</h3><p>🌐 ${t.server} · ${t.type} · ${t.current_members}/${t.max_members} üye</p><p style="font-size:12px;color:var(--text2);">Aradığı: ${t.looking_for||'Belirtilmemiş'}</p></div>`).join('')}${currentUser?`<button class="btn btn-blue" style="width:100%;margin-top:14px;" onclick="createTeam()">+ Yeni Ekip Kur</button>`:''}<button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}
async function viewTeam(id){const{data:team}=await sb.from('teams').select('*').eq('id',id).single();if(!team)return;const overlay=document.createElement('div');overlay.className='modal-overlay active';overlay.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><h2>${team.name}</h2><p>🌐 ${team.server} · ${team.type} · ${team.current_members}/${team.max_members}</p><p>${team.description||''}</p><p><b>Aradığı:</b> ${team.looking_for||'Belirtilmemiş'}</p></div>`;document.body.appendChild(overlay);overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});}
async function createTeam(){const name=prompt('Ekip adı:');if(!name)return;const server=prompt('Sunucu:','RP Grand #1'),type=prompt('Tür:','Mafia'),looking=prompt('Aradığı roller:','Şoför, Silahçı');await sb.from('teams').insert([{id:'team_'+Date.now(),name,founder_id:currentUser.id,server,type,looking_for:looking,max_members:50,current_members:1,created_at:new Date().toISOString()}]);showToast('✅ Ekip kuruldu!');navigateTo('teams');}

// ==================== MESAJLAR ====================
async function renderMessages(content,receiverId){if(!currentUser){showToast('⚠️ Giriş yap!');return;}const{data:users}=await sb.from('profiles').select('id,username');content.innerHTML=`<h2 style="margin-bottom:18px;">💬 Mesajlar</h2><div class="form-group"><label>Alıcı</label><select id="msgReceiver" style="width:100%;">${(users||[]).filter(u=>u.id!==currentUser.id).map(u=>`<option value="${u.id}" ${u.id===receiverId?'selected':''}>${u.username}</option>`).join('')}</select></div><div style="display:flex;gap:8px;margin-bottom:10px;"><input type="text" id="msgText" placeholder="Mesajınızı yazın..." style="flex:1;padding:12px;border-radius:30px;border:2px solid var(--border);background:var(--bg);color:#fff;font-size:14px;outline:none;"><button class="btn btn-red btn-sm" onclick="sendMessage()">Gönder</button></div><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}
async function sendMessage(){const receiverId=document.getElementById('msgReceiver')?.value,text=document.getElementById('msgText')?.value.trim();if(!receiverId||!text)return;await sb.from('messages').insert([{id:'msg_'+Date.now(),sender_id:currentUser.id,receiver_id:receiverId,text,created_at:new Date().toISOString()}]);showToast('✅ Mesaj gönderildi!');navigateTo('messages',receiverId);}

// ==================== SUNUCU HARİTASI ====================
async function renderServerMap(content){const{data:listings}=await sb.from('listings').select('server').eq('deleted',false);const servers={'RP Grand #1':0,'RP Grand #2':0,'RP Grand RP':0};(listings||[]).forEach(l=>{if(servers[l.server]!==undefined)servers[l.server]++;});content.innerHTML=`<h2 style="margin-bottom:18px;">🗺️ Sunucu Haritası</h2><div class="server-map">${Object.entries(servers).map(([name,count])=>`<div class="server-box"><h4>🌐 ${name}</h4><div class="server-count">${count}</div><p style="font-size:12px;color:var(--text2);">Aktif İlan</p></div>`).join('')}</div><button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;}

// ==================== ADMIN PANEL ====================
async function renderAdminPanel(content){const{count:totalUsers}=await sb.from('profiles').select('*',{count:'exact',head:true});const{count:totalListings}=await sb.from('listings').select('*',{count:'exact',head:true}).eq('deleted',false);const{data:users}=await sb.from('profiles').select('*');const bannedCount=(users||[]).filter(u=>u.is_banned).length;const onlineCount=(users||[]).filter(u=>u.last_login&&(new Date()-new Date(u.last_login))<300000).length;content.innerHTML=`<div class="admin-panel"><h2>👑 Admin Panel</h2><div class="admin-grid"><div class="admin-card"><h4>👥 Kayıtlı</h4><div class="stat-big">${totalUsers||0}</div></div><div class="admin-card"><h4>🟢 Çevrimiçi</h4><div class="stat-big">${onlineCount}</div></div><div class="admin-card"><h4>📝 İlan</h4><div class="stat-big">${totalListings||0}</div></div><div class="admin-card"><h4>🚫 Yasaklı</h4><div class="stat-big">${bannedCount}</div></div></div><div style="margin-top:20px;display:flex;flex-wrap:wrap;gap:8px;"><button class="btn btn-gold btn-sm" onclick="showAdminSection('announcement')">📢 Duyuru</button><button class="btn btn-red btn-sm" onclick="showAdminSection('users')">👥 Kullanıcılar</button><button class="btn btn-blue btn-sm" onclick="showAdminSection('listings')">📝 İlanlar</button><button class="btn btn-outline btn-sm" onclick="showAdminSection('roles')">🎭 Rol Ver</button><button class="btn btn-outline btn-sm" onclick="showAdminSection('premium')">⭐ Premium</button><button class="btn btn-outline btn-sm" onclick="showAdminSection('ban')">🚫 Yasakla</button><button class="btn btn-outline btn-sm" onclick="showAdminSection('verify')">✓ Onayla</button><button class="btn btn-outline btn-sm" onclick="showAdminSection('logs')">📋 Loglar</button></div><div id="adminSection" style="margin-top:18px;"></div><button class="btn btn-outline" style="margin-top:18px;width:100%;" onclick="navigateTo('home')">← Ana Sayfa</button></div>`;showAdminSection('announcement');}
async function showAdminSection(section){const container=document.getElementById('adminSection');if(!container)return;switch(section){case 'announcement':container.innerHTML=`<div class="admin-card"><h4>📢 Duyuru Ekle</h4><textarea id="annText" placeholder="Duyuru metnini yazın..." style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);min-height:70px;font-family:var(--font);"></textarea><button class="btn btn-gold" style="margin-top:10px;width:100%;" onclick="addAnnouncement()">📢 Yayınla</button></div>`;break;case 'users':{const{data:users}=await sb.from('profiles').select('*');container.innerHTML=`<div class="admin-card"><h4>👥 Kullanıcılar (${(users||[]).length})</h4>${(users||[]).map(u=>{const rc=ROLE_COLORS[u.role]||ROLE_COLORS['Player'];const isOnline=u.last_login&&(new Date()-new Date(u.last_login))<300000;return`<div style="padding:8px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;" onclick="navigateTo('profile','${u.id}')">${rc.icon} ${u.username} <span style="color:${rc.color};">[${u.role}]</span> ${u.is_banned?'🚫':''} ${u.is_premium?'⭐':''} ${u.is_verified?'✓':''} <span class="online-dot ${isOnline?'active':'offline'}"></span></div>`;}).join('')}</div>`;break;}case 'listings':{const{data:listings}=await sb.from('listings').select('*').eq('deleted',false);container.innerHTML=`<div class="admin-card"><h4>📝 İlanlar (${(listings||[]).length})</h4>${(listings||[]).map(l=>`<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border);font-size:12px;"><span>${l.title}${l.is_pinned?' 📌':''}</span><button class="btn btn-red btn-sm" onclick="deleteListing('${l.id}');showAdminSection('listings');">🗑️</button></div>`).join('')}</div>`;break;}case 'roles':{const{data:allUsers}=await sb.from('profiles').select('*');const roleUsers=(allUsers||[]).filter(u=>u.id!==currentUser?.id&&canModifyRole(u.role));container.innerHTML=`<div class="admin-card"><h4>🎭 Rol Ver</h4><select id="roleUser" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${roleUsers.map(u=>`<option value="${u.id}">${u.username} (${u.role})</option>`).join('')}</select><select id="roleName" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${ROLE_HIERARCHY.filter(r=>getRoleLevel(r)>getRoleLevel(currentUser.role)).map(r=>`<option value="${r}">${r}</option>`).join('')}</select><button class="btn btn-blue" style="width:100%;" onclick="changeRole()">🔄 Rolü Değiştir</button></div>`;break;}case 'premium':{const{data:pu}=await sb.from('profiles').select('*').eq('is_premium',false);container.innerHTML=`<div class="admin-card"><h4>⭐ Premium Ver</h4><select id="premUser" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${(pu||[]).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><button class="btn btn-gold" style="width:100%;" onclick="givePremium()">⭐ Premium Yap</button></div>`;break;}case 'ban':{const{data:bu}=await sb.from('profiles').select('*').eq('is_banned',false);container.innerHTML=`<div class="admin-card"><h4>🚫 Kullanıcı Yasakla</h4><select id="banUserId" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${(bu||[]).filter(u=>u.id!==currentUser?.id&&canModifyRole(u.role)).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><input type="text" id="banReason" placeholder="Yasaklama sebebi" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;"><input type="date" id="banUnbanDate" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;"><button class="btn btn-red" style="width:100%;" onclick="banUser()">🚫 Yasakla</button><hr style="border-color:var(--border);margin:10px 0;"><h5>Yasaklı Kullanıcılar:</h5>${(users||[]).filter(u=>u.is_banned).map(u=>`<div style="font-size:11px;padding:4px;display:flex;justify-content:space-between;">🚫 ${u.username} <button class="btn btn-green btn-sm" onclick="unbanUser('${u.id}')">Kaldır</button></div>`).join('')}</div>`;break;}case 'verify':{const{data:vu}=await sb.from('profiles').select('*').eq('is_verified',false);container.innerHTML=`<div class="admin-card"><h4>✓ Kullanıcı Onayla</h4><select id="verifyUser" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${(vu||[]).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><button class="btn btn-blue" style="width:100%;" onclick="verifyUser()">✓ Onayla</button></div>`;break;}case 'logs':{const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(50);container.innerHTML=`<div class="admin-card"><h4>📋 Son Loglar</h4><button class="btn btn-blue btn-sm" style="margin-bottom:10px;" onclick="exportLogs()">📥 log.txt İndir</button><div style="max-height:350px;overflow-y:auto;font-family:monospace;font-size:11px;color:#0f0;">${(logs||[]).map(l=>`<div style="padding:3px 0;border-bottom:1px solid #1a1a1a;">[${new Date(l.created_at).toLocaleString('tr-TR')}] <b>${l.username}</b> → ${l.action} ${l.detail||''}</div>`).join('')}</div></div>`;break;}}}

// ==================== ADMIN FONKSİYONLARI ====================
async function addAnnouncement(){const text=document.getElementById('annText')?.value.trim();if(!text)return;await sb.from('announcements').insert([{id:'ann_'+Date.now(),author_id:currentUser.id,text,created_at:new Date().toISOString()}]);showToast('📢 Duyuru yayınlandı!');showAdminSection('announcement');}
async function changeRole(){const userId=document.getElementById('roleUser')?.value,newRole=document.getElementById('roleName')?.value;if(!userId||!newRole)return;await sb.from('profiles').update({role:newRole}).eq('id',userId);showToast('✅ Rol değişti: '+newRole);showAdminSection('roles');}
async function givePremium(){const userId=document.getElementById('premUser')?.value;if(!userId)return;await sb.from('profiles').update({is_premium:true}).eq('id',userId);showToast('⭐ Premium verildi!');showAdminSection('premium');}
async function banUser(){
    const userId=document.getElementById('banUserId')?.value,reason=document.getElementById('banReason')?.value.trim(),unbanDate=document.getElementById('banUnbanDate')?.value;
    if(!userId||!reason){showToast('⚠️ Kullanıcı ve sebep zorunlu!');return;}
    const{data:user}=await sb.from('profiles').select('username').eq('id',userId).single();
    if(!user||!canModifyRole(user.role)){showToast('⚠️ Bu kullanıcıyı yasaklayamazsın!');return;}
    await sb.from('profiles').update({is_banned:true}).eq('id',userId);
    await sb.from('bans').insert([{id:'ban_'+Date.now(),user_id:userId,username:user.username,reason,banned_by:currentUser.username,unban_date:unbanDate?new Date(unbanDate).toISOString():null,is_active:true}]);
    showToast('🚫 '+user.username+' yasaklandı!');showAdminSection('ban');
}
async function unbanUser(userId){await sb.from('profiles').update({is_banned:false}).eq('id',userId);await sb.from('bans').update({is_active:false}).eq('user_id',userId).eq('is_active',true);showToast('✅ Yasak kaldırıldı!');showAdminSection('ban');}
async function verifyUser(){const userId=document.getElementById('verifyUser')?.value;if(!userId)return;await sb.from('profiles').update({is_verified:true}).eq('id',userId);showToast('✓ Onaylandı!');showAdminSection('verify');}
async function exportLogs(){const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(500);let text='EKİPBUL LOG KAYITLARI\n'+'='.repeat(60)+'\n';(logs||[]).forEach(l=>{text+=`[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail||''}\n`;});const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ekipbul_log_'+new Date().toISOString().slice(0,10)+'.txt';a.click();showToast('📥 log.txt indirildi!');}

// ==================== ADMIN ÖZEL MESAJ (10 SANİYE POPUP) ====================
async function sendAdminMessage(receiverId, message) {
    const{error}=await sb.from('messages').insert([{id:'msg_'+Date.now(),sender_id:currentUser.id,receiver_id:receiverId,text:message,created_at:new Date().toISOString()}]);
    if(!error)showToast('✅ Mesaj gönderildi!');
}

function showAdminPopup(message, fromUser) {
    const existing=document.getElementById('adminPopup');
    if(existing)existing.remove();
    const popup=document.createElement('div');
    popup.id='adminPopup';
    popup.className='admin-popup';
    popup.innerHTML=`<h3>📢 ${fromUser} tarafından mesaj</h3><p>${message}</p><button class="popup-close" onclick="this.parentElement.remove()">Tamam</button>`;
    document.body.appendChild(popup);
    setTimeout(()=>{if(popup.parentElement)popup.remove();},10000);
}

// Mesajları dinle (her 5 saniyede kontrol)
setInterval(async()=>{
    if(!currentUser)return;
    const{data:newMsgs}=await sb.from('messages').select('*').eq('receiver_id',currentUser.id).eq('is_read',false).order('created_at',{ascending:false}).limit(1);
    if(newMsgs&&newMsgs.length>0){
        const msg=newMsgs[0];
        const{data:sender}=await sb.from('profiles').select('username').eq('id',msg.sender_id).single();
        const senderName=sender?.username||'Admin';
        showAdminPopup(msg.text,senderName);
        await sb.from('messages').update({is_read:true}).eq('id',msg.id);
    }
},5000);

// ==================== BAŞLANGIÇ ====================
async function initApp(){
    updateNavbar();
    const hasLocal=loadSessionFromStorage();
    if(!hasLocal){
        try{const{data:{session}}=await sb.auth.getSession();if(session)await loadUserProfile(session.user.id);}catch(e){}
    }
    updateNavbar();navigateTo('home');
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp);}else{initApp();}
</script>
