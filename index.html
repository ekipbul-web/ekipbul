function getBadgeHTML(b){const d=BADGES[b];return d?`<span class="badge-icon" style="background:${d.color}20;color:${d.color};border:1px solid ${d.color};">${d.icon} ${d.name}</span>`:'';}

async function loadUserProfile(userId){
    const{data:profiles, error}=await sb.from('profiles').select('*').eq('id',userId);
    if (error) { console.error('Profil yükleme hatası:', error); return; }
    const profile=profiles&&profiles[0];
    if(profile){
        const{data:user}=await sb.auth.getUser();
        currentUser={id:profile.id,email:user.user?.email||'',username:profile.username,role:profile.role,is_premium:profile.is_premium,is_verified:profile.is_verified,discord:profile.discord||'',avatar_url:profile.avatar_url,banner_url:profile.banner_url,game_hours:profile.game_hours,bio:profile.bio,badges:profile.badges||[],rating:profile.rating,rating_count:profile.rating_count,invite_code:profile.invite_code,invite_count:profile.invite_count||0};
    }
}

// DeepSeek Yönlendirme Düzeltmesi Entegre Edildi
sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
        await loadUserProfile(session.user.id);
        updateNavbar();
        // SIGNED_IN durumunda zorla home'a fırlatma kaldırıldı. Kullanıcı nerede kaldıysa orada devam eder.
    }
    if(event==='SIGNED_OUT'){
        currentUser=null;
        updateNavbar();
        navigateTo('home'); // Güvenli oturum kapatma için ana sayfaya yönlendirme korundu.
    }
});

function updateNavbar(){
    const nav=document.getElementById('navActions');
    if(!nav) return;
    if(currentUser){
        const rc=ROLE_COLORS[currentUser.role]||ROLE_COLORS['Player'];
        nav.innerHTML=`
            <button class="btn btn-outline btn-sm" onclick="toggleDarkMode()">🌙</button>
            <button class="btn btn-outline btn-sm" onclick="navigateTo('notifications')">🔔</button>
            <span class="user-badge" onclick="navigateTo('profile','${currentUser.id}')">
                <span class="role-dot" style="background:${rc.dot}"></span>
                <span style="color:${rc.color}">${currentUser.username}</span>
                ${currentUser.is_verified?'<span style="color:var(--blue);">✓</span>':''}
                <span class="role-badge ${rc.class}">${rc.icon} ${currentUser.role}</span>
            </span>
            ${isAdmin()?'<button class="btn btn-gold btn-sm" onclick="navigateTo(\'admin\')">👑 Panel</button>':''}
            <button class="btn btn-red btn-sm" onclick="navigateTo('create-listing')">📝 İlan Ver</button>
            <button class="btn btn-blue btn-sm" onclick="navigateTo('teams')">👥 Ekipler</button>
            <button class="btn btn-outline btn-sm" onclick="logout()">Çıkış</button>`;
    }else{
        nav.innerHTML=`
            <button class="btn btn-outline btn-sm" onclick="navigateTo('login')">Giriş</button>
            <button class="btn btn-red btn-sm" onclick="navigateTo('register')">Kayıt Ol</button>`;
    }
}

function toggleDarkMode(){document.body.classList.toggle('dark-mode');localStorage.setItem('ekipbul_darkmode',document.body.classList.contains('dark-mode')?'on':'off');}

async function navigateTo(page,data){
    const content=document.getElementById('dynamicContent'); if(!content) return;
    updateNavbar();
    switch(page){
        case 'home':await renderHome(content);break;
        case 'login':renderLogin(content);break;
        case 'register':renderRegister(content);break;
        case 'reset-password':renderResetPassword(content);break;
        case 'create-listing':if(!currentUser){showToast('⚠️ Giriş yap!');renderLogin(content);return;}renderCreateListing(content);break;
        case 'admin':if(!isAdmin()){showToast('⚠️ Yetkisiz!');await renderHome(content);return;}await renderAdminPanel(content);break;
        case 'profile':await renderProfile(content,data);break;
        case 'leaderboard':await renderLeaderboard(content);break;
        case 'chat':await renderChat(content);break;
        case 'events':await renderEvents(content);break;
        case 'notifications':await renderNotifications(content);break;
        case 'teams':await renderTeams(content);break;
        case 'messages':await renderMessages(content,data);break;
        case 'server-map':await renderServerMap(content);break;
        default:await renderHome(content);
    }
    window.scrollTo({top:0,behavior:'smooth'});
}

// ==================== ANA SAYFA ====================
async function renderHome(content){
    const{data:listings}=await sb.from('listings').select('*').eq('deleted',false).order('created_at',{ascending:false});
    const{data:announcements}=await sb.from('announcements').select('*').order('created_at',{ascending:false}).limit(1);
    const allListings=[...(listings||[]).filter(l=>l.is_premium||l.is_pinned),...(listings||[]).filter(l=>!l.is_premium&&!l.is_pinned)];
    let annHTML='';
    if(announcements&&announcements.length>0)annHTML=`<div class="announcement"><strong>📢 Duyuru:</strong> ${announcements[0].text}</div>`;
    content.innerHTML=annHTML+`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        <button class="btn btn-outline btn-sm" onclick="navigateTo('leaderboard')">🏆 Liderlik</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('chat')">💬 Sohbet</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('events')">📅 Etkinlikler</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('messages')">💬 Mesajlar</button>
        <button class="btn btn-outline btn-sm" onclick="navigateTo('server-map')">🗺️ Sunucu Haritası</button></div>
        <div class="tabs"><button class="tab-btn active" onclick="filterHomeTab('all',this)">Tümü (${allListings.length})</button>
        <button class="tab-btn" onclick="filterHomeTab('lfm',this)">Aranan</button>
        <button class="tab-btn" onclick="filterHomeTab('lfg',this)">Arıyor</button>
        <button class="tab-btn" onclick="filterHomeTab('premium',this)">⭐ Premium</button>
        <button class="tab-btn" onclick="filterHomeTab('pinned',this)">📌 Sabit</button>
        <button class="tab-btn" onclick="filterHomeTab('favorites',this)">❤️ Favoriler</button></div>
        <input type="text" placeholder="🔍 Ara..." id="searchInput" style="width:100%;padding:12px 16px;border-radius:25px;background:var(--card);border:2px solid var(--border);color:#fff;margin-bottom:16px;font-size:14px;outline:none;" oninput="searchListings()">
        <div class="listings" id="homeListings"></div><div class="pagination" id="pagination"></div>`;
    window._homeListings=allListings;window._homeFilter='all';window._homePage=1;window._homeSearch='';renderHomeListings();
}
function renderHomeListings(){
    const container=document.getElementById('homeListings');if(!container)return;
    let data=window._homeListings||[];
    if(window._homeFilter==='lfm')data=data.filter(l=>l.type==='lfm');
    if(window._homeFilter==='lfg')data=data.filter(l=>l.type==='lfg');
    if(window._homeFilter==='premium')data=data.filter(l=>l.is_premium);
    if(window._homeFilter==='pinned')data=data.filter(l=>l.is_pinned);
    if(window._homeFilter==='favorites')data=data.filter(l=>favorites.includes(l.id));
    if(window._homeSearch){const s=window._homeSearch.toLowerCase();data=data.filter(l=>l.title.toLowerCase().includes(s)||l.description.toLowerCase().includes(s)||l.server.toLowerCase().includes(s));}
    const perPage=8,page=window._homePage||1,totalPages=Math.ceil(data.length/perPage),slice=data.slice((page-1)*perPage,page*perPage);
    container.innerHTML=slice.map(l=>{
        const avLetter=(l.author_id||'?').charAt(0).toUpperCase(),isFav=favorites.includes(l.id);
        return`<div class="listing-card ${l.is_premium?'premium':''} ${l.is_pinned?'pinned':''}" onclick="viewListing('${l.id}')">
            <button class="favorite-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${l.id}')">${isFav?'❤️':'🤍'}</button>
            ${l.is_pinned?'<div style="position:absolute;top:10px;left:14px;font-size:16px;">📌</div>':''}${l.is_premium&&!l.is_pinned?'<div style="position:absolute;top:10px;left:14px;font-size:16px;">⭐</div>':''}
            <div class="listing-header"><div class="listing-avatar">${avLetter}</div><div class="listing-title">${l.title}</div></div>
            <div class="listing-meta"><span>🌐 ${l.server}</span><span>🕐 ${timeAgo(l.created_at)}</span><span>👁 ${l.views||0}</span></div>
            <div class="listing-tags"><span class="tag ${l.type==='lfm'?'tag-lfm':'tag-lfg'}">${l.type==='lfm'?'Aranan':'Arıyor'}</span><span class="tag tag-server">${l.server}</span>${l.is_premium?'<span class="tag tag-premium">Premium</span>':''}${l.is_pinned?'<span class="tag tag-pinned">Sabit</span>':''}</div>
            <div class="listing-action"><button class="btn btn-blue btn-sm" onclick="event.stopPropagation();copyDiscord('${l.discord}')">📩 İletişim</button></div></div>`;
    }).join('');
    const pagDiv=document.getElementById('pagination');if(pagDiv&&totalPages>1)pagDiv.innerHTML=Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===page?'active':''}" onclick="window._homePage=${i+1};renderHomeListings();">${i+1}</button>`).join('');
}
function filterHomeTab(tab,btn){window._homeFilter=tab;window._homePage=1;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHomeListings();}
function searchListings(){window._homeSearch=document.getElementById('searchInput')?.value||'';window._homePage=1;renderHomeListings();}
function toggleFavorite(id){if(favorites.includes(id))favorites=favorites.filter(f=>f!==id);else favorites.push(id);localStorage.setItem('ekipbul_favorites',JSON.stringify(favorites));renderHomeListings();}

async function viewListing(id){
    const{data:listing, error:lError}=await sb.from('listings').select('*').eq('id',id).single();if(!listing || lError)return;
    await sb.from('listings').update({views:(listing.views||0)+1}).eq('id',id);
    const{data:comments}=await sb.from('comments').select('*').eq('listing_id',id).order('created_at',{ascending:true});
    const overlay=document.createElement('div');overlay.className='modal-overlay active';
    overlay.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        <h3>${listing.title}</h3><p class="modal-server">🌐 ${listing.server} · 🕐 ${timeAgo(listing.created_at)}</p>
        <div class="modal-desc">${listing.description}</div>
        <div class="modal-row"><span>İlan Türü</span><span>${listing.type==='lfm'?'Aranan':'Arıyor'}</span></div>
        <div class="modal-row"><span>Discord</span><span>${listing.discord}</span></div>
        <button class="btn-modal-contact" onclick="copyDiscord('${listing.discord}')">💬 Discord'u Kopyala</button>
        ${isAdmin()?`<button class="btn btn-blue btn-sm" style="width:100%;margin-top:8px;" onclick="togglePin('${listing.id}',${listing.is_pinned||false});this.closest('.modal-overlay').remove();">${listing.is_pinned?'📌 Sabitlemeyi Kaldır':'📌 Sabitle'}</button>`:''}
        ${isAdmin()?`<button class="btn btn-red btn-sm" style="width:100%;margin-top:8px;" onclick="deleteListing('${listing.id}');this.closest('.modal-overlay').remove();">🗑️ Sil</button>`:''}
        <div class="modal-comments" style="margin-top:16px;"><h4>💬 Yorumlar (${(comments||[]).length})</h4>
            <div id="modalCommentsList">${(comments||[]).map(c=>`<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`).join('')}</div>
            ${currentUser?`<textarea id="commentText" placeholder="Yorum yaz..." style="width:100%;margin-top:8px;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);" rows="2"></textarea>
            <button class="btn btn-green btn-sm" style="margin-top:6px;" onclick="addComment('${listing.id}')">Gönder</button>`:''}</div></div>`;
    document.body.appendChild(overlay);overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
}
async function togglePin(id,current){await sb.from('listings').update({is_pinned:!current}).eq('id',id);showToast(current?'📌 Kaldırıldı':'📌 Sabitlendi!');navigateTo('home');}
async function addComment(listingId){
    const text=document.getElementById('commentText')?.value.trim();if(!text)return;
    const {error}=await sb.from('comments').insert([{listing_id:listingId,user_id:currentUser.id,username:currentUser.username,text,created_at:new Date().toISOString()}]);
    if(error){showToast('❌ Yorum eklenemedi!'); return;}
    showToast('💬 Eklendi!');
    document.getElementById('commentText').value = '';
    const{data:comments}=await sb.from('comments').select('*').eq('listing_id',listingId).order('created_at',{ascending:true});
    const cList = document.getElementById('modalCommentsList');
    if(cList && comments) {
        cList.innerHTML = comments.map(c=>`<div class="comment"><strong>${c.username}:</strong> ${c.text}</div>`).join('');
    }
}
async function deleteListing(id){await sb.from('listings').update({deleted:true}).eq('id',id);showToast('🗑️ Silindi!');navigateTo('home');}
function copyDiscord(d){navigator.clipboard.writeText(d).then(()=>showToast('✅ Kopyalandı')).catch(()=>showToast('📋 '+d));}

function renderLogin(content){
    content.innerHTML=`<div class="form-container"><h2>🔐 Giriş Yap</h2>
        <button class="btn btn-discord" style="width:100%;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;" onclick="loginWithDiscord()">🟣 Discord ile Giriş Yap</button>
        <div class="divider">veya e-posta ile</div>
        <div class="form-group"><label>E-posta</label><input type="email" id="loginEmail" placeholder="ornek@mail.com"></div>
        <div class="form-group"><label>Şifre</label><input type="password" id="loginPass" placeholder="********"></div>
        <button class="btn-submit" onclick="login()">Giriş Yap</button>
        <p style="text-align:center;margin-top:14px;font-size:13px;">Hesabın yok mu? <a href="#" style="color:var(--red);font-weight:700;" onclick="navigateTo('register')">Kayıt Ol</a></p>
        <p style="text-align:center;margin-top:8px;"><a href="#" style="color:var(--text3);font-size:11px;" onclick="navigateTo('reset-password')">🔑 Şifremi Unuttum</a></p></div>`;
}
async function login(){
    const email=document.getElementById('loginEmail')?.value.trim().toLowerCase();
    const pass=document.getElementById('loginPass')?.value;
    if(!email||!pass){showToast('⚠️ Lütfen tüm alanları doldurun!');return;}
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
        console.error('Login hatası:',error);
        if(error.message?.includes('Invalid'))showToast('❌ Hatalı e-posta veya şifre!');
        else if(error.message?.includes('confirmed'))showToast('❌ E-posta doğrulanmamış!');
        else showToast('❌ Giriş başarısız!');
        return;
    }
    if(!data.user){showToast('❌ Kullanıcı bulunamadı!');return;}
    const{data:profiles}=await sb.from('profiles').select('*').eq('id',data.user.id);
    const profile=profiles&&profiles[0];
    if(!profile){showToast('❌ Profil bulunamadı!');return;}
    if(profile.is_banned){
        await sb.auth.signOut();
        const{data:ban}=await sb.from('bans').select('*').eq('user_id',profile.id).eq('is_active',true).single();
        document.getElementById('dynamicContent').innerHTML=`<div class="ban-message"><h3>🚫 Hesabınız Engellendi</h3><p class="ban-detail"><b>Hesap:</b> ${profile.username}</p><p class="ban-detail"><b>Sebep:</b> ${ban?.reason||'Belirtilmemiş'}</p>${ban?.unban_date?`<p class="ban-detail"><b>Açılma:</b> ${new Date(ban.unban_date).toLocaleDateString('tr-TR')}</p>`:''}<p style="margin-top:16px;font-size:12px;color:var(--text3);">Sistemden çıkışınız yapılmıştır.</p></div>`;
        return;
    }
    await sb.from('profiles').update({last_login:new Date().toISOString()}).eq('id',profile.id);
    currentUser={id:profile.id,email:data.user.email,username:profile.username,role:profile.role,is_premium:profile.is_premium,is_verified:profile.is_verified,discord:profile.discord||'',avatar_url:profile.avatar_url,banner_url:profile.banner_url,game_hours:profile.game_hours,bio:profile.bio,badges:profile.badges||[],rating:profile.rating,rating_count:profile.rating_count,invite_code:profile.invite_code,invite_count:profile.invite_count||0};
    await sb.from('logs').insert([{user_id:profile.id,username:profile.username,action:'GİRİŞ',detail:'Kullanıcı giriş yaptı'}]);
    updateNavbar();showToast('✅ Hoş geldin, '+profile.username+'!');navigateTo('home');
}
async function loginWithDiscord(){await sb.auth.signInWithOAuth({provider:'discord',options:{redirectTo:'https://ekipbul.onrender.com'}});}
async function logout(){if(currentUser){await sb.from('logs').insert([{user_id:currentUser.id,username:currentUser.username,action:'ÇIKIŞ',detail:'Kullanıcı çıkış yaptı'}]);}await sb.auth.signOut();currentUser=null;updateNavbar();showToast('👋 Çıkış yapıldı');navigateTo('home');}

function renderRegister(content){
    content.innerHTML=`<div class="form-container"><h2>📋 Kayıt Ol</h2>
        <button class="btn btn-discord" style="width:100%;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;" onclick="loginWithDiscord()">🟣 Discord ile Kayıt Ol</button>
        <div class="divider">veya e-posta ile</div>
        <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="regUser" placeholder="RP nickiniz"></div>
        <div class="form-group"><label>E-posta</label><input type="email" id="regEmail" placeholder="ornek@mail.com"></div>
        <div class="form-group"><label>Discord</label><input type="text" id="regDiscord" placeholder="kullanici#1234"></div>
        <div class="form-group"><label>Şifre</label><input type="password" id="regPass" placeholder="En az 6 karakter"></div>
        <div class="form-group"><label>Davet Kodu (varsa)</label><input type="text" id="regInvite" placeholder="İsteğe bağlı"></div>
        <button class="btn-submit" onclick="register()">Kayıt Ol</button>
        <p style="text-align:center;margin-top:14px;font-size:13px;">Hesabın var mı? <a href="#" style="color:var(--red);font-weight:700;" onclick="navigateTo('login')">Giriş Yap</a></p></div>`;
}
async function register(){
    const username=document.getElementById('regUser')?.value.trim();
    const email=document.getElementById('regEmail')?.value.trim().toLowerCase();
    const discord=document.getElementById('regDiscord')?.value.trim();
    const pass=document.getElementById('regPass')?.value;
    const inviteCode=document.getElementById('regInvite')?.value.trim();
    if(!username||!email||!discord||!pass){showToast('⚠️ Lütfen tüm alanları doldurun!');return;}
    if(pass.length<6){showToast('⚠️ Şifre en az 6 karakter olmalı!');return;}
    const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username,discord}}});
    if(error){console.error('Kayıt hatası:',error);showToast('❌ Kayıt başarısız! '+(error.message||''));return;}
    if(data.user){
        const generatedCode = username.substring(0,4).toUpperCase()+Math.floor(Math.random()*900+100);
        await sb.from('profiles').upsert([{id:data.user.id,username,discord,invite_code:generatedCode,role:'Player',is_premium:false,is_banned:false,is_verified:false,game_hours:'0',rating:0,rating_count:0,invite_count:0}]);
        if(inviteCode){const{data:inviter}=await sb.from('profiles').select('*').eq('invite_code',inviteCode).single();if(inviter){await sb.from('profiles').update({invite_count:(inviter.invite_count||0)+1}).eq('id',inviter.id);}}
        await sb.from('logs').insert([{user_id:data.user.id,username,action:'KAYIT',detail:'Yeni kullanıcı kayıt oldu'}]);
    }
    showToast('✅ Kayıt başarılı! Giriş yapabilirsiniz.');navigateTo('login');
}

function renderCreateListing(content){content.innerHTML=`<div class="form-container"><h2>📝 İlan Oluştur</h2><div class="form-group"><label>Başlık</label><input type="text" id="listTitle" placeholder="örn: Polis Departmanı"></div><div class="form-group"><label>Kategori</label><select id="listCat"><option>Yasal Rol</option><option>Yasadışı Rol</option><option>Serbest Rol</option></select></div><div class="form-group"><label>Sunucu</label><select id="listServer"><option>RP Grand #1</option><option>RP Grand #2</option><option>RP Grand RP</option></select></div><div class="form-group"><label>Tür</label><select id="listType"><option value="lfm">Aranan</option><option value="lfg">Arıyor</option></select></div><div class="form-group"><label>Discord</label><input type="text" id="listDiscord" value="${currentUser?.discord||''}"></div><div class="form-group"><label>Açıklama</label><textarea id="listDesc" placeholder="Detaylı açıklama yazın..."></textarea></div><button class="btn-submit" onclick="createListing()">✅ Yayınla</button><button class="btn btn-outline" style="width:100%;margin-top:10px;" onclick="navigateTo('home')">← Ana Sayfa</button></div>`;}
async function createListing(){const title=document.getElementById('listTitle')?.value.trim();const cat=document.getElementById('listCat')?.value,server=document.getElementById('listServer')?.value;const type=document.getElementById('listType')?.value,discord=document.getElementById('listDiscord')?.value.trim();const desc=document.getElementById('listDesc')?.value.trim();if(!title||!discord||!desc){showToast('⚠️ Başlık, Discord ve Açıklama zorunlu!');return;}const {error}=await sb.from('listings').insert([{author_id:currentUser.id,title,category:cat,server,type,discord,description:desc,is_premium:currentUser.is_premium||false,deleted:false,views:0,created_at:new Date().toISOString()}]);if(error){showToast('❌ İlan eklenemedi!');return;}await sb.from('logs').insert([{user_id:currentUser.id,username:currentUser.username,action:'İLAN',detail:title}]);showToast('✅ İlan yayınlandı!');navigateTo('home');}

async function renderProfile(content,userId){const uid=userId||currentUser?.id;const{data:user, error}=await sb.from('profiles').select('*').eq('id',uid).single();if(!user || error){showToast('❌ Kullanıcı bulunamadı!');return;}const rc=ROLE_COLORS[user.role]||ROLE_COLORS['Player'];const avStyle=user.avatar_url?`background-image:url(${user.avatar_url});color:transparent;`:'';const bannerStyle=user.banner_url?`background-image:url(${user.banner_url});`:'';const isOwn=currentUser&&currentUser.id===user.id;const isOnline=(user.last_login&&(new Date()-new Date(user.last_login))<300000)?'🟢':'⚫';content.innerHTML=`<div class="admin-panel"><div class="profile-banner" style="${bannerStyle}"></div><div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;"><div class="modal-avatar" style="${avStyle}">${avStyle?'':user.username.charAt(0).toUpperCase()}${user.is_verified?'<span class="verified-badge">✓</span>':''}</div><div><h2 style="color:${rc.color};margin:0">${rc.icon} ${user.username}</h2><span class="role-badge ${rc.class}">${user.role}</span> ${user.is_premium?'⭐':''} ${user.is_verified?'✓ Onaylı':''} ${isOnline}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${(user.badges||[]).map(b=>getBadgeHTML(b)).join('')}</div><div class="modal-row"><span>Discord</span><span>${user.discord||'-'}</span></div><div class="modal-row"><span>Oyun Süresi</span><span>${user.game_hours||'0'}</span></div><div class="modal-row"><span>Puan</span><span>${'⭐'.repeat(Math.round(user.rating||0))} (${user.rating_count||0} oy)</span></div><div class="modal-row"><span>Davet</span><span>${user.invite_code} (${user.invite_count||0} davet)</span></div><p style="margin-top:12px;color:var(--text2);font-size:14px;">${user.bio||'Henüz biyografi eklenmemiş.'}</p>${!isOwn?`<div style="margin-top:14px;"><p style="font-size:12px;color:var(--text3);margin-bottom:6px;">Puanla:</p><div class="star-rating" id="starRating">${[1,2,3,4,5].map(i=>`<span class="star" onclick="rateUser('${user.id}',${i})">★</span>`).join('')}</div></div>`:`<div style="margin-top:18px;"><h4 style="margin-bottom:10px;">✏️ Profili Düzenle</h4><div class="form-group"><label>Avatar URL (GIF)</label><input type="text" id="editAvatar" value="${user.avatar_url||''}"></div><div class="form-group"><label>Banner URL (GIF)</label><input type="text" id="editBanner" value="${user.banner_url||''}"></div><div class="form-group"><label>Oyun Süresi</label><input type="text" id="editHours" value="${user.game_hours||'0'}"></div><div class="form-group"><label>Biyografi</label><textarea id="editBio">${user.bio||''}</textarea></div><button class="btn btn-red" style="width:100%;" onclick="saveProfile('${user.id}')">💾 Kaydet</button></div>`}<button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button></div>`;}
async function rateUser(uid,r){if(!currentUser||currentUser.id===uid)return;const{data:u}=await sb.from('profiles').select('*').eq('id',uid).single();if(!u)return;const newRating=((u.rating||0)*(u.rating_count||0)+r)/((u.rating_count||0)+1);const badges=[...(u.badges||[])];if(newRating>=4.5&&!badges.includes('toprated'))badges.push('toprated');await sb.from('profiles').update({rating:newRating,rating_count:(u.rating_count||0)+1,badges}).eq('id',uid);showToast('⭐ '+r+' yıldız verdiniz!');document.querySelectorAll('#starRating .star').forEach((s,i)=>s.classList.toggle('active',i<r));}
async function saveProfile(uid){const avatar_url=document.getElementById('editAvatar')?.value.trim()||'';const banner_url=document.getElementById('editBanner')?.value.trim()||'';const game_hours=document.getElementById('editHours')?.value.trim()||'0';const bio=document.getElementById('editBio')?.value.trim()||'';await sb.from('profiles').update({avatar_url,banner_url,game_hours,bio}).eq('id',uid);if(currentUser&&currentUser.id===uid){currentUser.avatar_url=avatar_url;currentUser.banner_url=banner_url;currentUser.game_hours=game_hours;currentUser.bio=bio;}showToast('✅ Profil güncellendi!');navigateTo('profile',uid);}

// ==================== SOHBET ====================
async function renderChat(content){
    const{data:messages}=await sb.from('messages').select('*').eq('receiver_id','all').order('created_at',{ascending:false}).limit(30);
    content.innerHTML=`<h2 style="margin-bottom:18px;">💬 Canlı Sohbet</h2><div class="chat-container"><div class="chat-messages" id="chatMessages">${(messages||[]).reverse().map(m=>`<div class="chat-msg ${m.sender_id===(currentUser?.id||'')?'own':''}"><b style="font-size:10px;opacity:0.7;">${m.sender_id?.substring(0,8)}</b><br>${m.text}</div>`).join('')}</div>${currentUser?`<div class="chat-input-row"><input type="text" id="chatInput" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-red btn-sm" onclick="sendChat()">Gönder</button></div>`:'<p style="text-align:center;padding:14px;color:var(--text3);">Sohbet için giriş yapın</p>'}</div><button class="btn btn-outline" style="width:100%;margin-top:14px;" onclick="navigateTo('home')">← Ana Sayfa</button>`;
    setTimeout(()=>{const d=document.getElementById('chatMessages');if(d)d.scrollTop=d.scrollHeight;},100);
}
async function sendChat(){
    if(!currentUser)return;const input=document.getElementById('chatInput');const text=input?.value.trim();if(!text)return;
    const {error}=await sb.from('messages').insert([{sender_id:currentUser.id,receiver_id:'all',text,created_at:new Date().toISOString()}]);
    if(error){showToast('❌ Mesaj gönderilemedi.');return;}
    if(input) input.value='';
    const{data:messages}=await sb.from('messages').select('*').eq('receiver_id','all').order('created_at',{ascending:false}).limit(30);
    const chatBox = document.getElementById('chatMessages');
    if(chatBox && messages){
        chatBox.innerHTML = messages.reverse().map(m=>`<div class="chat-msg ${m.sender_id===currentUser.id?'own':''}"><b style="font-size:10px;opacity:0.7;">${m.sender_id?.substring(0,8)}</b><br>${m.text}</div>`).join('');
        chatBox.scrollTop=chatBox.scrollHeight;
    }
}

ick="banUser()">🚫 Yasakla</button></div>`;break;}case 'verify':{const{data:vu}=await sb.from('profiles').select('*').eq('is_verified',false);container.innerHTML=`<div class="admin-card"><h4>✓ Kullanıcı Onayla</h4><select id="verifyUser" style="width:100%;padding:10px;border-radius:12px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:10px;">${(vu||[]).map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}</select><button class="btn btn-blue" style="width:100%;" onclick="verifyUser()">✓ Onayla</button></div>`;break;}case 'logs':{const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(50);container.innerHTML=`<div class="admin-card"><h4>📋 Son Loglar</h4><button class="btn btn-blue btn-sm" style="margin-bottom:10px;" onclick="exportLogs()">📥 log.txt İndir</button><div style="max-height:350px;overflow-y:auto;font-family:monospace;font-size:11px;color:#0f0;">${(logs||[]).map(l=>`<div style="padding:3px 0;border-bottom:1px solid #1a1a1a;">[${new Date(l.created_at).toLocaleString('tr-TR')}] <b>${l.username}</b> → ${l.action} ${l.detail||''}</div>`).join('')}</div></div>`;break;}}}
async function addAnnouncement(){const text=document.getElementById('annText')?.value.trim();if(!text)return;await sb.from('announcements').insert([{author_id:currentUser.id,text,created_at:new Date().toISOString()}]);await sb.from('logs').insert([{user_id:currentUser.id,username:currentUser.username,action:'DUYURU',detail:text.substring(0,50)}]);showToast('📢 Duyuru yayınlandı!');showAdminSection('announcement');}
async function changeRole(){const userId=document.getElementById('roleUser')?.value,newRole=document.getElementById('roleName')?.value;if(!userId||!newRole)return;await sb.from('profiles').update({role:newRole}).eq('id',userId);await sb.from('logs').insert([{user_id:currentUser.id,username:currentUser.username,action:'ROL',detail:'Rol değiştirildi: '+newRole}]);showToast('✅ Rol güncellendi!');showAdminSection('roles');}
async function givePremium(){const userId=document.getElementById('premUser')?.value;if(!userId)return;await sb.from('profiles').update({is_premium:true}).eq('id',userId);showToast('⭐ Premium verildi!');showAdminSection('premium');}
async function banUser(){const userId=document.getElementById('banUserId')?.value,reason=document.getElementById('banReason')?.value.trim(),unbanDate=document.getElementById('banUnbanDate')?.value;if(!userId||!reason){showToast('⚠️ Kullanıcı ve sebep zorunlu!');return;}const{data:user}=await sb.from('profiles').select('username').eq('id',userId).single();await sb.from('profiles').update({is_banned:true}).eq('id',userId);await sb.from('bans').insert([{user_id:userId,username:user?.username,reason,banned_by:currentUser.username,unban_date:unbanDate?new Date(unbanDate).toISOString():null,is_active:true}]);await sb.from('logs').insert([{user_id:currentUser.id,username:currentUser.username,action:'YASAK',detail:user?.username+': '+reason}]);showToast('🚫 Kullanıcı yasaklandı!');showAdminSection('ban');}
async function verifyUser(){const userId=document.getElementById('verifyUser')?.value;if(!userId)return;const{data:user}=await sb.from('profiles').select('*').eq('id',userId).single();await sb.from('profiles').update({is_verified:true,badges:[...new Set([...(user?.badges||[]),'verified'])]}).eq('id',userId);showToast('✓ Kullanıcı onaylandı!');showAdminSection('verify');}
async function exportLogs(){const{data:logs}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(500);let text='EKİPBUL LOG KAYITLARI\n'+'='.repeat(60)+'\n';(logs||[]).forEach(l=>{text+=`[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail||''}\n`;});const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ekipbul_log_'+new Date().toISOString().slice(0,10)+'.txt';a.click();showToast('📥 log.txt indirildi!');}

function timeAgo(d){const diff=Math.floor((new Date()-new Date(d))/1000);if(diff<60)return'Az önce';if(diff<3600)return Math.floor(diff/60)+' dk önce';if(diff<86400)return Math.floor(diff/3600)+' saat önce';return Math.floor(diff/86400)+' gün önce';}
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.style.display='block';clearTimeout(window._toastTimeout);window._toastTimeout=setTimeout(()=>{t.style.display='none';},3000);}

async function initApp(){
    if(localStorage.getItem('ekipbul_darkmode')==='on')document.body.classList.add('dark-mode');
    updateNavbar();
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        await loadUserProfile(session.user.id);
        updateNavbar();
    }
    navigateTo('home');
    console.log('🎮 EkipBul v6.0 Hazır!');
}
initApp();
</script>
</body>
</html>
