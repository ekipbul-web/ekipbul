        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            color: var(--text);
            padding: 12px 24px;

            to {
                transform: translateX(-50%) translateY(0);

            position: absolute;
            top: -6px;

        }
        .notif-count.show {

        .form-group input,

            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;

            color: var(--text);
            font-size: 13px;

        .form-group input:focus,

        .form-group textarea {

        .btn-submit {

            background: var(--red);

            border: none;
            border-radius: 6px;

            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            background: var(--red2);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: -1;
            }
            .forum-table {
                font-size: 11px;
            }
            .forum-table th,
            .forum-table td {
                padding: 8px 6px;
            }
            .hide-mobile {
                display: none;
            }
            .navbar-inner {
                flex-wrap: wrap;

                padding: 10px 12px;
            }
            .nav-links {

            }
            .nav-link {
                padding: 6px 10px;

        }

                display: none;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .quick-menu {
                flex-direction: column;
            }
        }
    </style>
</head>

        // ==================== XSS KORUMASI ====================
        function escapeHTML(str) {
            if (!str || typeof str !== 'string') return '';
            const div = document.createElement('div');

        }

        function isValidURL(url) {
            return url && url.startsWith('https://') && url.length < 500;

        // ==================== SABİTLER ====================

        // ==================== YARDIMCILAR ====================
        function isAdmin() { return currentUser && ADMIN_ROLES.includes(currentUser.role); }

        function timeAgo(dateStr) {
            const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' saat önce';
            return Math.floor(diff / 86400) + ' gün önce';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // ==================== NAVİGASYON ====================
        async function navigateTo(page, data) {
            updateNavbar();
            if (currentUser && !(await checkBan())) return;
            switch (page) {
                case 'home':
                    await renderHome();
                    break;
                case 'login':
                    renderLogin();
                    break;
                case 'create-listing':
                    if (!currentUser) { showToast('⚠️ Giriş yap!');
                        renderLogin(); return; }
                    renderCreateListing();
                    break;
                case 'profile':
                    await renderProfile(data);
                    break;
                case 'leaderboard':
                    await renderLeaderboard();
                    break;
                case 'chat':
                    await renderChat();
                    break;
                case 'teams':
                    await renderTeams();
                    break;
                case 'notifications':
                    await renderNotifications();
                    break;
                case 'admin':
                    await renderAdminPanel();

                default:

            window.scrollTo({ top: 0, behavior: 'smooth' });

        // ==================== BAN KONTROLÜ ====================
        async function checkBan() {
            if (!currentUser) return true;
            const { data } = await sb.from('profiles').select('is_banned').eq('id', currentUser.id).single();
            if (data?.is_banned) {
                showToast('🚫 Hesabınız yasaklanmış!');
                await sb.auth.signOut();
                currentUser = null;
                updateNavbar();
                navigateTo('home');
                return false;
            }
            return true;
        }

        // ==================== KULLANICI YÜKLEME ====================
        async function loadUserProfile(userId) {
            const { data: profiles } = await sb.from('profiles')
                .select('id,username,role,is_premium,is_verified,is_banned,discord,avatar_url,game_hours,bio,badges,rating,rating_count,invite_code,invite_count,last_username_change,last_login')
                .eq('id', userId);
            const profile = profiles && profiles[0];
            if (!profile) return;
            if (profile.is_banned) {
                await sb.auth.signOut();
                currentUser = null;
                updateNavbar();
                showToast('🚫 Hesabınız yasaklanmış!');
                navigateTo('home');
                return;
            }
            const { data: user } = await sb.auth.getUser();
            currentUser = {
                id: profile.id,
                email: user?.user?.email || '',
                username: profile.username,
                role: profile.role,
                is_premium: profile.is_premium,
                is_verified: profile.is_verified,
                discord: profile.discord || '',
                avatar_url: profile.avatar_url,
                game_hours: profile.game_hours,
                bio: profile.bio,
                badges: profile.badges || [],
                rating: profile.rating,
                rating_count: profile.rating_count,
                invite_code: profile.invite_code,
                invite_count: profile.invite_count || 0,
                last_username_change: profile.last_username_change
            };
            await sb.from('profiles').update({ last_login: new Date().toISOString() }).eq('id', userId);
            startNotifCheck();
        }

        function updateNavbar() {

                userArea.innerHTML = `
                    <span class="user-badge-nav" onclick="navigateTo('profile','${escapeHTML(currentUser.id)}')">

                `;
                if (navLinks && !document.getElementById('notifBadge')) {
                    // notif badge zaten varsa ekleme
                }
            } else {
                userArea.innerHTML = `<button class="nav-link primary" onclick="navigateTo('login')">Giriş Yap</button>`;
            }
            // Notif badge göster/gizle
            const notifBadge = document.getElementById('notifBadge');
            if (notifBadge && currentUser) notifBadge.style.display = 'inline';

        async function startNotifCheck() {
            if (!currentUser) return;
            clearInterval(notifCheckInterval);
            notifCheckInterval = setInterval(async () => {
                if (!currentUser) { clearInterval(notifCheckInterval); return; }
                const { count } = await sb.from('notifications')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id)
                    .eq('is_read', false);
                const cnt = count || 0;
                const badge = document.getElementById('notifCount');
                const badgeWrapper = document.getElementById('notifBadge');
                if (badge && badgeWrapper) {
                    if (cnt > 0) {
                        badge.textContent = cnt > 99 ? '99+' : cnt;
                        badge.classList.add('show');
                        badgeWrapper.style.display = 'inline';
                    } else {
                        badge.classList.remove('show');
                    }
                }
            }, 10000);
        }

                await sb.from('listings').update({ views: (listing.views || 0) + 1 }).eq('id', id);
            }

            const { data: comments } = await sb.from('comments').select('*').eq('listing_id', id).order('created_at', {

            const input = document.getElementById('commentInput');
            const text = input?.value?.trim();
            if (!text || text.length > 300) { showToast('⚠️ Yorum 1-300 karakter olmalı!'); return; }
            const { error } = await sb.from('comments').insert([{
                listing_id: listingId,
                user_id: currentUser.id,
                username: currentUser.username,
                text: escapeHTML(text),
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ Yorum eklenemedi!'); return; }
            // Bildiri gönder (ilan sahibine)
            const { data: listing } = await sb.from('listings').select('author_id').eq('id', listingId).single();
            if (listing && listing.author_id !== currentUser.id) {
                await sb.from('notifications').insert([{
                    user_id: listing.author_id,
                    text: `${currentUser.username} ilanınıza yorum yaptı: "${text.substring(0,50)}"`,
                    is_read: false,
                    created_at: new Date().toISOString()
                }]);
            }
            showToast('💬 Yorum eklendi!');
            if (input) input.value = '';
            // Yeniden yükle
            const { data: comments } = await sb.from('comments').select('*').eq('listing_id', listingId).order('created_at',
                { ascending: true });
            const cList = document.getElementById('modalCommentsList');
            if (cList && comments) {
                cList.innerHTML = comments.map(c =>
                    `<div class="comment-item"><strong>${escapeHTML(c.username)}:</strong> ${escapeHTML(c.text)} <span style="color:var(--text3);font-size:10px;">· ${timeAgo(c.created_at)}</span></div>`
                ).join('');
            }
        }

        async function openApplyModal(listingId) {
            if (!currentUser) { showToast('⚠️ Başvuru için giriş yapın!');
                navigateTo('login'); return; }
            const { data: listing } = await sb.from('listings').select('title,author_id').eq('id', listingId).single();
            if (!listing) return;
            if (listing.author_id === currentUser.id) { showToast('⚠️ Kendi ilanınıza başvuramazsınız!'); return; }

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    <h3>📩 Başvuru: ${escapeHTML(listing.title)}</h3>
                    <div class="application-form">
                        <input type="text" id="applyDiscord" placeholder="Discord kullanıcı adınız" value="${escapeHTML(currentUser.discord || '')}" maxlength="50">
                        <textarea id="applyMessage" placeholder="Başvuru mesajınızı yazın (örn: deneyimleriniz, oyun süreniz...)" maxlength="500"></textarea>
                        <button class="btn-apply" onclick="submitApplication('${escapeHTML(listingId)}', '${escapeHTML(listing.title)}', '${escapeHTML(listing.author_id)}')">✅ Başvuruyu Gönder</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        }

        async function submitApplication(listingId, listingTitle, authorId) {
            const discord = document.getElementById('applyDiscord')?.value?.trim();
            const message = document.getElementById('applyMessage')?.value?.trim();
            if (!discord || !message) { showToast('⚠️ Discord ve mesaj zorunlu!'); return; }
            if (message.length > 500) { showToast('⚠️ Mesaj 500 karakteri geçemez!'); return; }

            const { error } = await sb.from('applications').insert([{
                listing_id: listingId,
                listing_title: listingTitle,
                applicant_id: currentUser.id,
                username: currentUser.username,
                discord: escapeHTML(discord),
                message: escapeHTML(message),
                author_id: authorId,
                status: 'pending',
                created_at: new Date().toISOString()
            }]);

            if (error) { showToast('❌ Başvuru gönderilemedi! ' + error.message); return; }

            // Bildiri gönder
            await sb.from('notifications').insert([{
                user_id: authorId,
                text: `${currentUser.username} "${listingTitle}" ilanınıza başvurdu!`,
                is_read: false,
                created_at: new Date().toISOString()
            }]);

            showToast('✅ Başvurunuz gönderildi!');
            document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
            renderHome();
        }

        function copyDiscord(discord) {
            navigator.clipboard.writeText(discord).then(() => showToast('✅ Discord kopyalandı!')).catch(() => showToast(
                '📋 ' + discord));
        }

        // ==================== İLAN VER ====================
        function renderCreateListing() {
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (content) {
                content.innerHTML = `
                    <div class="form-container">
                        <h2>📝 İlan Oluştur</h2>
                        <div class="form-group"><label>Başlık (3-80 karakter)</label><input type="text" id="listTitle" placeholder="örn: Polis Departmanı Arıyor" maxlength="80"></div>
                        <div class="form-group"><label>Sunucu</label><select id="listServer"><option>TR #1</option><option>TR #2</option></select></div>
                        <div class="form-group"><label>Tür</label><select id="listType"><option value="lfm">Aranan</option><option value="lfg">Arıyor</option></select></div>
                        <div class="form-group"><label>Discord (max 50 karakter)</label><input type="text" id="listDiscord" value="${escapeHTML(currentUser?.discord || '')}" maxlength="50"></div>
                        <div class="form-group"><label>Açıklama (max 800 karakter)</label><textarea id="listDesc" placeholder="Detaylı açıklama yazın..." maxlength="800"></textarea></div>
                        <button class="btn-submit" onclick="createListing()">✅ Yayınla</button>
                        <button class="btn-submit" style="background:var(--card2);color:var(--text);margin-top:8px;" onclick="navigateTo('home')">← Ana Sayfa</button>
                    </div>
                `;
            }
            if (sidebar) sidebar.innerHTML = '';
        }

        async function createListing() {
            const title = document.getElementById('listTitle')?.value.trim();
            const server = document.getElementById('listServer')?.value;
            const type = document.getElementById('listType')?.value;
            const discord = document.getElementById('listDiscord')?.value.trim();
            const desc = document.getElementById('listDesc')?.value.trim();
            if (!title || !discord || !desc) { showToast('⚠️ Başlık, Discord ve Açıklama zorunlu!'); return; }
            if (title.length < 3) { showToast('⚠️ Başlık en az 3 karakter olmalı!'); return; }
            const { error } = await sb.from('listings').insert([{
                author_id: currentUser.id,
                title: escapeHTML(title),
                server: server,
                type: type,
                discord: escapeHTML(discord),
                description: escapeHTML(desc),
                is_premium: currentUser.is_premium || false,
                deleted: false,
                views: 0,
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ İlan oluşturulamadı!'); return; }
            showToast('✅ İlan yayınlandı!');
            navigateTo('home');
        }

        // ==================== PROFİL ====================
        async function renderProfile(userId) {
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            const uid = userId || currentUser?.id;
            const { data: user } = await sb.from('profiles').select('*').eq('id', uid).single();
            if (!user) { showToast('❌ Kullanıcı bulunamadı!'); return; }
            const rc = ROLE_COLORS[user.role] || ROLE_COLORS['Player'];
            const isOwn = currentUser && currentUser.id === user.id;
            const isOnline = (user.last_login && (new Date() - new Date(user.last_login)) < 300000);

            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header">
                        <span class="icon">👤</span> Kullanıcı Profili
                    </div>
                    <div style="padding:20px;">
                        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
                            <div style="width:64px;height:64px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:${rc.color};border:2px solid ${rc.color};">${escapeHTML(user.username.charAt(0).toUpperCase())}</div>
                            <div>
                                <h2 style="font-family:var(--font-heading);margin:0;color:${rc.color};">${rc.icon} ${escapeHTML(user.username)} ${user.is_verified ? '✓' : ''}</h2>
                                <span style="font-size:12px;color:var(--text2);">${escapeHTML(user.role)} ${user.is_premium ? '⭐ Premium' : ''}</span>
                                <span class="online-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${isOnline ? 'var(--green)' : '#555'};margin-left:8px;"></span> ${isOnline ? 'Çevrimiçi' : 'Çevrimdışı'}
                            </div>
                        </div>
                        <div class="detail-row"><span>Discord</span><span>${escapeHTML(user.discord || '-')}</span></div>
                        <div class="detail-row"><span>Oyun Süresi</span><span>${escapeHTML(user.game_hours || '0')}</span></div>
                        <div class="detail-row"><span>Puan</span><span>${'⭐'.repeat(Math.round(user.rating || 0))} (${user.rating_count || 0} oy)</span></div>
                        <p style="margin-top:12px;color:var(--text2);font-size:13px;">${escapeHTML(user.bio || 'Henüz biyografi eklenmemiş.')}</p>
                        ${isOwn ? `<button class="btn-submit" style="margin-top:12px;" onclick="navigateTo('create-listing')">📝 İlan Ver</button>` : ''}
                    </div>
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
        }

        // ==================== BİLDİRİMLER ====================
        async function renderNotifications() {
            if (!currentUser) { navigateTo('login'); return; }
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            const { data: notifs } = await sb.from('notifications').select('*').eq('user_id', currentUser.id).order(
                'created_at', { ascending: false }).limit(50);

            // Okundu olarak işaretle
            await sb.from('notifications').update({ is_read: true }).eq('user_id', currentUser.id).eq('is_read', false);

            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header">
                        <span class="icon">🔔</span> Bildirimler
                    </div>
                    <div style="padding:0;">
                        ${(notifs || []).length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text3);">Henüz bildirim yok.</div>' : ''}
                        ${(notifs || []).map(n => `
                            <div style="padding:12px 16px;border-bottom:1px solid var(--border2);font-size:13px;">
                                ${escapeHTML(n.text)}
                                <span style="color:var(--text3);font-size:10px;display:block;">${timeAgo(n.created_at)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
            // Badge'i temizle
            const badge = document.getElementById('notifCount');
            if (badge) badge.classList.remove('show');
        }

        // ==================== SOHBET ====================
        async function renderChat() {
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            const { data: messages } = await sb.from('messages')
                .select('sender_id,text,created_at')
                .eq('receiver_id', 'all').order('created_at', { ascending: false }).limit(40);

            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header">
                        <span class="icon">💬</span> Canlı Sohbet
                    </div>
                    <div id="chatMessages" style="height:400px;overflow-y:auto;padding:12px 16px;font-size:13px;">
                        ${(messages || []).reverse().map(m => `
                            <div style="padding:6px 0;border-bottom:1px solid var(--border2);">
                                <strong style="color:var(--blue);">${escapeHTML((m.sender_id || '?').substring(0,8))}:</strong> ${escapeHTML(m.text)}
                                <span style="color:var(--text3);font-size:10px;float:right;">${timeAgo(m.created_at)}</span>
                            </div>
                        `).join('')}
                    </div>
                    ${currentUser ? `
                        <div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);">
                            <input type="text" id="chatInput" placeholder="Mesajınızı yazın..." maxlength="300" style="flex:1;padding:10px;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-family:var(--font);font-size:13px;" onkeydown="if(event.key==='Enter')sendChat()">
                            <button class="btn-table-action apply" onclick="sendChat()">Gönder</button>
                        </div>
                    ` : '<div style="text-align:center;padding:16px;color:var(--text3);">Sohbet için giriş yapın</div>'}
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
            setTimeout(() => {
                const chatDiv = document.getElementById('chatMessages');
                if (chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight;
            }, 100);
        }

        async function sendChat() {
            if (!currentUser) return;
            const input = document.getElementById('chatInput');
            const text = input?.value?.trim();
            if (!text || text.length > 300) return;
            const { error } = await sb.from('messages').insert([{
                sender_id: currentUser.id,
                receiver_id: 'all',
                text: escapeHTML(text),
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ Mesaj gönderilemedi!'); return; }
            if (input) input.value = '';
            await renderChat();
        }

        // ==================== EKİPLER ====================
        async function renderTeams() {
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            const { data: teams } = await sb.from('teams').select('*');
            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header">
                        <span class="icon">👥</span> Ekipler
                    </div>
                    <div style="padding:16px;">
                        ${(teams || []).length === 0 ? '<p style="text-align:center;color:var(--text3);">Henüz ekip kurulmamış.</p>' : ''}
                        ${(teams || []).map(t => `
                            <div class="forum-box" style="margin-bottom:12px;cursor:pointer;padding:16px;" onclick="viewTeam('${escapeHTML(t.id)}')">
                                <h4 style="font-family:var(--font-heading);">${escapeHTML(t.name)}</h4>
                                <p style="font-size:12px;color:var(--text2);">🌐 ${escapeHTML(t.server)} · ${t.current_members}/${t.max_members} üye</p>
                                <p style="font-size:12px;color:var(--text3);">Aradığı: ${escapeHTML(t.looking_for || 'Belirtilmemiş')}</p>
                            </div>
                        `).join('')}
                        ${currentUser ? '<button class="btn-submit" onclick="createTeamPrompt()">+ Yeni Ekip Kur</button>' : ''}
                    </div>
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
        }

        async function viewTeam(id) {
            const { data: team } = await sb.from('teams').select('*').eq('id', id).single();
            if (!team) return;
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    <h3>👥 ${escapeHTML(team.name)}</h3>
                    <div class="detail-row"><span>Sunucu</span><span>🌐 ${escapeHTML(team.server)}</span></div>
                    <div class="detail-row"><span>Tür</span><span>${escapeHTML(team.type)}</span></div>
                    <div class="detail-row"><span>Üye</span><span>${team.current_members}/${team.max_members}</span></div>
                    <div class="description-box">${escapeHTML(team.description || 'Açıklama eklenmemiş.')}</div>
                    <p><b>Aradığı:</b> ${escapeHTML(team.looking_for || 'Belirtilmemiş')}</p>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        }

        async function createTeamPrompt() {
            const name = prompt('Ekip adı:');
            if (!name) return;
            const server = prompt('Sunucu (TR #1 / TR #2):', 'TR #1');
            if (!SERVERS.includes(server)) { showToast('⚠️ Geçersiz sunucu!'); return; }
            const type = prompt('Tür (Mafia/Polis/Ordu/Gang):', 'Mafia');
            const looking = prompt('Aradığı roller:', 'Şoför, Silahçı');
            const { error } = await sb.from('teams').insert([{
                name: escapeHTML(name),
                founder_id: currentUser.id,
                server: server,
                type: escapeHTML(type),
                looking_for: escapeHTML(looking),
                max_members: 50,
                current_members: 1,
                created_at: new Date().toISOString()
            }]);
            if (error) { showToast('❌ Ekip kurulamadı!'); return; }
            showToast('✅ Ekip kuruldu!');
            navigateTo('teams');
        }

        // ==================== LİDERLİK ====================
        async function renderLeaderboard() {
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            const { data: users } = await sb.from('profiles')
                .select('id,username,role,is_verified,rating,invite_count')
                .eq('is_banned', false).order('invite_count', { ascending: false }).limit(20);
            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header">
                        <span class="icon">🏆</span> Liderlik Tablosu
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="forum-table">
                            <thead><tr><th>#</th><th>Kullanıcı</th><th>Rol</th><th>Puan</th><th>Davet</th></tr></thead>
                            <tbody>
                                ${(users || []).map((u,i) => {
                                    const rc = ROLE_COLORS[u.role] || ROLE_COLORS['Player'];
                                    return `<tr>
                                        <td><strong>${i+1}</strong></td>
                                        <td style="color:${rc.color};cursor:pointer;font-weight:600;" onclick="navigateTo('profile','${escapeHTML(u.id)}')">${rc.icon} ${escapeHTML(u.username)}</td>
                                        <td style="font-size:11px;color:var(--text2);">${escapeHTML(u.role)}</td>
                                        <td>⭐${Math.round(u.rating||0)}</td>
                                        <td>📨${u.invite_count||0}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
        }

        // ==================== ADMIN PANEL (Özet) ====================
        async function renderAdminPanel() {
            if (!isAdmin()) { showToast('⚠️ Yetkisiz!');
                navigateTo('home'); return; }
            const content = document.getElementById('dynamicContent');
            const sidebar = document.getElementById('sidebarContent');
            if (!content) return;
            content.innerHTML = `
                <div class="forum-box">
                    <div class="forum-box-header"><span class="icon">👑</span> Admin Panel</div>
                    <div style="padding:16px;">
                        <button class="btn-submit" onclick="showAdminSection('announcement')">📢 Duyuru Ekle</button>
                        <button class="btn-submit" style="background:var(--blue);margin-top:8px;" onclick="showAdminSection('ban')">🚫 Kullanıcı Yasakla</button>
                        <div id="adminSection" style="margin-top:16px;"></div>
                    </div>
                </div>
            `;
            if (sidebar) sidebar.innerHTML = '';
            showAdminSection('announcement');
        }

        async function showAdminSection(section) {
            const container = document.getElementById('adminSection');
            if (!container) return;
            if (section === 'announcement') {
                container.innerHTML = `
                    <h4>📢 Duyuru Ekle</h4>
                    <textarea id="annText" placeholder="Duyuru metni..." style="width:100%;padding:10px;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);min-height:80px;font-family:var(--font);margin-bottom:8px;" maxlength="500"></textarea>
                    <button class="btn-submit" onclick="addAnnouncement()">Yayınla</button>
                `;
            } else if (section === 'ban') {
                const { data: users } = await sb.from('profiles').select('id,username').eq('is_banned', false);
                container.innerHTML = `
                    <h4>🚫 Kullanıcı Yasakla</h4>
                    <select id="banUserId" style="width:100%;padding:10px;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);margin-bottom:8px;">
                        ${(users||[]).filter(u=>u.id!==currentUser?.id).map(u=>`<option value="${escapeHTML(u.id)}">${escapeHTML(u.username)}</option>`).join('')}
                    </select>
                    <input type="text" id="banReason" placeholder="Sebep" style="width:100%;padding:10px;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);margin-bottom:8px;">
                    <button class="btn-submit" style="background:var(--red);" onclick="banUser()">Yasakla</button>
                `;
            }
        }

        async function addAnnouncement() {
            const text = document.getElementById('annText')?.value.trim();
            if (!text) { showToast('⚠️ Duyuru metni zorunlu!'); return; }
            await sb.from('announcements').insert([{ author_id: currentUser.id, text: escapeHTML(text), created_at: new Date()
                    .toISOString() }]);
            showToast('📢 Duyuru yayınlandı!');
        }

        async function banUser() {
            const userId = document.getElementById('banUserId')?.value;
            const reason = document.getElementById('banReason')?.value.trim();
            if (!userId || !reason) { showToast('⚠️ Kullanıcı ve sebep zorunlu!'); return; }
            await sb.from('profiles').update({ is_banned: true }).eq('id', userId);
            await sb.from('bans').insert([{ user_id: userId, reason: escapeHTML(reason), banned_by: currentUser.username,
                is_active: true, created_at: new Date().toISOString() }]);
            showToast('🚫 Kullanıcı yasaklandı!');
        }

        // ==================== BAŞLANGIÇ ====================
        async function initApp() {
            updateNavbar();
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session?.user) {
                    await loadUserProfile(session.user.id);
                }
            } catch (e) { console.error('Başlangıç hatası:', e); }
            updateNavbar();
            navigateTo('home');
        }

        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                loadUserProfile(session.user.id).then(() => { updateNavbar();
                    navigateTo('home'); });
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                clearInterval(notifCheckInterval);
                updateNavbar();
                navigateTo('home');
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
