    <style>
        :root {
            --bg: #030712;
            --card: #0f1729;
            --card2: #1a1f35;
            --border: #1e2640;
            --red: #f43f5e;
            --red2: #fb7185;
            --blue: #3b82f6;

            --yellow: #f59e0b;
            --gold: #fbbf24;

            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --font: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --glass: rgba(15, 23, 41, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 0% 0%, #1e1b4b20 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, #4c051920 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, #0f1729 0%, #030712 70%);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {

        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--red), var(--red2));
            border-radius: 10px;
        }

        .navbar {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(244, 63, 94, 0.15);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -1px;
            transition: transform 0.3s;

        .logo:hover {

        }

            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--red), var(--red2));
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4);
            }
            50% {
                box-shadow: 0 4px 30px rgba(244, 63, 94, 0.7);
            }

        .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 22px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-decoration: none;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: var(--font);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(148, 163, 184, 0.3);
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover {

            background: rgba(244, 63, 94, 0.08);

        .btn-submit {

            border-radius: 30px;

            margin-top: 20px;

            font-family: var(--font);

        .btn-submit:hover {

            transition: 0.3s;
        }
        .btn-modal-contact:hover {

            from {
                transform: translateX(-50%) translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }

</head>

    <div class="footer">© 2026 EkipBul · ekipbul.onrender.com</div>

    <script>
        // ==================== SUPABASE BAĞLANTISI ====================
        const SUPABASE_URL = 'https://dyapvhoefuimnzorevoz.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5YXB2aG9lZnVpbW56b3Jldm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTY4NDcsImV4cCI6MjA5NzI5Mjg0N30.5mmSd9kYBWuj5J6ldiRXQbb1Fa4Wnf_biThQO9zqWZw';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true,
                storage: window.localStorage
            }
        });

        // ==================== XSS KORUMASI ====================
        function escapeHTML(str) {
            if (!str || typeof str !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== URL GÜVENLİK KONTROLÜ ====================
        function isValidURL(url) {
            if (!url) return false;
            return url.startsWith('https://') && url.length < 500;
        }

        // ==================== SABİTLER ====================
        const ADMIN_ROLES = [
            'Curator of the Project',
            'Deputy Curator of the Project',
            'Chief Admin',
            'Senior Admin',
            'Admin',
            'Technical Admin',
            'Moderator'
        ];

        const ROLE_HIERARCHY = [
            'Curator of the Project',
            'Deputy Curator of the Project',
            'Chief Admin',
            'Senior Admin',
            'Admin',
            'Technical Admin',
            'Moderator',
            'Yazıcı',
            'Player'
        ];

        const ROLE_COLORS = {
            'Curator of the Project': { color: '#ff4466', class: 'rb-curator', dot: '#ff4466', icon: '👑' },
            'Deputy Curator of the Project': { color: '#ffa500', class: 'rb-deputy', dot: '#ffa500', icon: '🏅' },
            'Chief Admin': { color: '#f1c40f', class: 'rb-chief', dot: '#f1c40f', icon: '⭐' },
            'Senior Admin': { color: '#3498db', class: 'rb-senior', dot: '#3498db', icon: '💎' },
            'Admin': { color: '#e74c3c', class: 'rb-admin', dot: '#e74c3c', icon: '🔴' },
            'Technical Admin': { color: '#06b6d4', class: 'rb-technical', dot: '#06b6d4', icon: '🔧' },
            'Moderator': { color: '#10b981', class: 'rb-moderator', dot: '#10b981', icon: '🛡️' },
            'Yazıcı': { color: '#a855f7', class: 'rb-writer', dot: '#a855f7', icon: '✍️' },
            'Player': { color: '#aaa', class: 'rb-player', dot: '#aaa', icon: '🎮' }
        };

        const BADGES = {
            'founder': { name: 'Kurucu', icon: '👑', color: '#ffd700' },
            'premium': { name: 'Premium', icon: '⭐', color: '#f1c40f' },
            'verified': { name: 'Onaylı', icon: '✓', color: '#3498db' },
            'veteran': { name: 'Veteran', icon: '🎖️', color: '#e74c3c' },
            'inviter5': { name: '5 Davet', icon: '📨', color: '#10b981' },
            'inviter10': { name: '10 Davet', icon: '📬', color: '#a855f7' },
            'inviter25': { name: '25 Davet', icon: '📦', color: '#ffa500' },
            'toprated': { name: 'En İyi', icon: '💎', color: '#06b6d4' },
            'first_listing': { name: 'İlk İlan', icon: '📝', color: '#f59e0b' },
            'ten_listings': { name: '10 İlan', icon: '📋', color: '#3b82f6' },
            'hundred_views': { name: '100 Görüntülenme', icon: '👁', color: '#10b981' }
        };

        // ==================== DEĞİŞKENLER ====================
        let currentUser = null;
        let favorites = JSON.parse(localStorage.getItem('ekipbul_favorites') || '[]');
        let adminPopupTimeout = null;
        let viewTracker = JSON.parse(sessionStorage.getItem('ekipbul_views') || '{}');

        // ==================== YARDIMCI FONKSİYONLAR ====================
        function isAdmin() {
            return currentUser && ADMIN_ROLES.includes(currentUser.role);
        }

        function getRoleLevel(role) {
            return ROLE_HIERARCHY.indexOf(role);
        }

        function canModifyRole(targetRole) {
            return currentUser && getRoleLevel(currentUser.role) < getRoleLevel(targetRole);
        }

        function getBadgeHTML(badgeKey) {
            const badge = BADGES[badgeKey];
            if (!badge) return '';
            return `<span class="badge-icon" style="background:${badge.color}20;color:${badge.color};border:1px solid ${badge.color};">${badge.icon} ${badge.name}</span>`;
        }

        function checkAchievementBadges(user, listings) {
            const badges = [...(user.badges || [])];
            if ((listings || []).length >= 1 && !badges.includes('first_listing')) badges.push('first_listing');
            if ((listings || []).length >= 10 && !badges.includes('ten_listings')) badges.push('ten_listings');
            if ((listings || []).some(l => (l.views || 0) >= 100) && !badges.includes('hundred_views')) badges.push(
                'hundred_views');
            return badges;
        }

        function timeAgo(dateStr) {
            const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' saat önce';
            return Math.floor(diff / 86400) + ' gün önce';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(function() { toast.style.display = 'none'; }, 3000);
        }

        function showAdminPopup(msg) {
            const popup = document.getElementById('adminPopup');
            const text = document.getElementById('adminPopupText');
            if (!popup || !text) return;
            text.textContent = msg;
            popup.classList.add('active');
            clearTimeout(adminPopupTimeout);
            adminPopupTimeout = setTimeout(function() { popup.classList.remove('active'); }, 10000);
        }

        function closeAdminPopup() {
            const popup = document.getElementById('adminPopup');
            if (popup) popup.classList.remove('active');
            clearTimeout(adminPopupTimeout);
        }

        // ==================== BAN KONTROLÜ ====================
        async function checkBan() {
            if (!currentUser) return true;
            const { data } = await sb.from('profiles').select('is_banned').eq('id', currentUser.id).single();
            if (data?.is_banned) {
                showToast('🚫 Hesabınız yasaklanmış!');
                await sb.auth.signOut();
                currentUser = null;
                updateNavbar();
                navigateTo('home');
                return false;
            }
            return true;
        }

        // ==================== DOSYA YÜKLEME ====================
        async function uploadFile(file, bucket, userId) {
            if (!file) return null;
            if (file.size > 10 * 1024 * 1024) { showToast('⚠️ Dosya 10MB\'ı geçemez!'); return null; }
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) { showToast('⚠️ Sadece resim dosyaları!'); return null; }
            const fileExt = file.name.split('.').pop().toLowerCase();
            const allowedExt = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
            if (!allowedExt.includes(fileExt)) { showToast('⚠️ Geçersiz dosya türü!'); return null; }
            const fileName = `${userId}/${Date.now()}.${fileExt}`;
            const { data, error } = await sb.storage.from(bucket).upload(fileName, file, {
                cacheControl: '3600',
                upsert: true
            });
            if (error) {
                console.error('Dosya yükleme hatası:', error);
                showToast('❌ Dosya yüklenemedi!');
                return null;
            }
            const { data: urlData } = sb.storage.from(bucket).getPublicUrl(fileName);
            return urlData?.publicUrl || null;
        }

        async function uploadAvatar(event) {
            const file = event.target.files?.[0];
            if (!file || !currentUser) return;
            const url = await uploadFile(file, 'avatars', currentUser.id);
            if (url) {
                document.getElementById('editAvatar').value = url;
                const preview = document.getElementById('avatarPreview');
                if (preview) { preview.src = url;
                    preview.style.display = 'block'; }
                showToast('✅ Avatar yüklendi!');
            }
        }

        async function uploadBanner(event) {
            const file = event.target.files?.[0];
            if (!file || !currentUser) return;
            const url = await uploadFile(file, 'avatars', currentUser.id);
            if (url) {
                document.getElementById('editBanner').value = url;
                const preview = document.getElementById('bannerPreview');
                if (preview) { preview.src = url;
                    preview.style.display = 'block'; }
                showToast('✅ Banner yüklendi!');
            }
        }

        // ==================== OTURUM YÖNETİMİ ====================
        async function loadUserProfile(userId) {
            const { data: profiles } = await sb.from('profiles')
                .select(
                    'id,username,role,is_premium,is_verified,is_banned,discord,avatar_url,banner_url,game_hours,bio,badges,rating,rating_count,invite_code,invite_count,last_username_change,last_login'
                    )
                .eq('id', userId);
            const profile = profiles && profiles[0];
            if (!profile) return;
            if (profile.is_banned) {
                await sb.auth.signOut();
                currentUser = null;
                updateNavbar();
                showToast('🚫 Hesabınız yasaklanmış!');
                navigateTo('home');
                return;
            }
            const { data: listings } = await sb.from('listings').select('views').eq('author_id', userId).eq('deleted',
            false);
            const updatedBadges = checkAchievementBadges(profile, listings || []);
            if (JSON.stringify(updatedBadges) !== JSON.stringify(profile.badges || [])) {
                await sb.from('profiles').update({ badges: updatedBadges }).eq('id', userId);
                profile.badges = updatedBadges;
            }
            const { data: user } = await sb.auth.getUser();
            currentUser = {
                id: profile.id,
                email: user?.user?.email || '',
                username: profile.username,
                role: profile.role,
                is_premium: profile.is_premium,
                is_verified: profile.is_verified,
                discord: profile.discord || '',
                avatar_url: profile.avatar_url,
                banner_url: profile.banner_url,
                game_hours: profile.game_hours,
                bio: profile.bio,
                badges: profile.badges || [],
                rating: profile.rating,
                rating_count: profile.rating_count,
                invite_code: profile.invite_code,
                invite_count: profile.invite_count || 0,
                last_username_change: profile.last_username_change
            };
            await sb.from('profiles').update({ last_login: new Date().toISOString() }).eq('id', userId);
        }

        // ==================== NAVBAR ====================
        function updateNavbar() {
            const nav = document.getElementById('navActions');
            if (!nav) return;
            if (currentUser) {
                const rc = ROLE_COLORS[currentUser.role] || ROLE_COLORS['Player'];
                nav.innerHTML = `
                    <button class="btn btn-outline btn-sm" onclick="navigateTo('notifications')">🔔</button>
                    <button class="btn btn-outline btn-sm" onclick="navigateTo('messages')">💬</button>
                    <span class="user-badge" onclick="navigateTo('profile','${escapeHTML(currentUser.id)}')">
                        <span class="role-dot" style="background:${rc.dot}"></span>
                        <span style="color:${rc.color}">${escapeHTML(currentUser.username)}</span>
                        ${currentUser.is_verified ? '<span style="color:var(--blue);">✓</span>' : ''}
                        <span class="role-badge ${rc.class}">${rc.icon} ${escapeHTML(currentUser.role)}</span>
                    </span>
                    ${isAdmin() ? '<button class="btn btn-gold btn-sm" onclick="navigateTo(\'admin\')">👑 Panel</button>' : ''}
                    <button class="btn btn-red btn-sm" onclick="navigateTo('create-listing')">📝 İlan Ver</button>
                    <button class="btn btn-blue btn-sm" onclick="navigateTo('teams')">👥 Ekipler</button>
                    <button class="btn btn-outline btn-sm" onclick="logout()">Çıkış</button>
                `;
            } else {
                nav.innerHTML = `<button class="btn btn-outline btn-sm" onclick="navigateTo('login')">Giriş</button>`;
            }
        }

        // ==================== NAVİGASYON ====================
        async function navigateTo(page, data) {
            const content = document.getElementById('dynamicContent');
            if (!content) return;
            updateNavbar();
            if (currentUser && !(await checkBan())) return;
            switch (page) {
                case 'home':
                    await renderHome(content);
                    break;
                case 'login':
                    renderLogin(content);
                    break;
                case 'create-listing':
                    if (!currentUser) { showToast('⚠️ Giriş yap!');
                        renderLogin(content); return; }

                case 'chat':

                case 'events':
                    await renderEvents(content);
                    break;
                case 'notifications':
                    await renderNotifications(content);
                    break;
                case 'teams':

        function renderHomeListings() {
            const container = document.getElementById('homeListings');
            if (!container) return;
            let data = window._homeListings || [];
            if (window._homeFilter === 'lfm') data = data.filter(l => l.type === 'lfm');
            if (window._homeFilter === 'lfg') data = data.filter(l => l.type === 'lfg');
            if (window._homeFilter === 'premium') data = data.filter(l => l.is_premium);
            if (window._homeFilter === 'pinned') data = data.filter(l => l.is_pinned);
            if (window._homeFilter === 'favorites') data = data.filter(l => favorites.includes(l.id));
            if (window._homeSearch) {
                const s = window._homeSearch.toLowerCase();
                data = data.filter(l => l.title.toLowerCase().includes(s) || l.description.toLowerCase().includes(
                    s) || l.server.toLowerCase().includes(s));
            }
            const perPage = 8;
            const page = window._homePage || 1;
            const totalPages = Math.ceil(data.length / perPage);
            const slice = data.slice((page - 1) * perPage, page * perPage);
            container.innerHTML = slice.map(l => {
                const avLetter = (l.author_id || '?').charAt(0).toUpperCase();
                const isFav = favorites.includes(l.id);
                return `
                    <div class="listing-card ${l.is_premium ? 'premium' : ''} ${l.is_pinned ? 'pinned' : ''}" onclick="viewListing('${escapeHTML(l.id)}')">
                        <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${escapeHTML(l.id)}')">${isFav ? '❤️' : '🤍'}</button>
                        ${l.is_pinned ? '<div style="position:absolute;top:10px;left:20px;font-size:20px;">📌</div>' : ''}
                        ${l.is_premium && !l.is_pinned ? '<div style="position:absolute;top:10px;left:20px;font-size:20px;">⭐</div>' : ''}
                        <div class="listing-header">
                            <div class="listing-avatar">${escapeHTML(avLetter)}</div>
                            <div class="listing-title">${escapeHTML(l.title)}</div>
                        </div>
                        <div class="listing-meta"><span>🌐 ${escapeHTML(l.server)}</span><span>🕐 ${timeAgo(l.created_at)}</span><span>👁 ${l.views || 0}</span></div>
                        <div class="listing-tags">
                            <span class="tag ${l.type === 'lfm' ? 'tag-lfm' : 'tag-lfg'}">${l.type === 'lfm' ? 'Aranan' : 'Arıyor'}</span>
                            <span class="tag tag-server">${escapeHTML(l.server)}</span>
                            ${l.is_premium ? '<span class="tag tag-premium">Premium</span>' : ''}
                            ${l.is_pinned ? '<span class="tag tag-pinned">Sabit</span>' : ''}
                        </div>
                        <div class="listing-action">
                            <button class="btn btn-blue btn-sm" onclick="event.stopPropagation();copyDiscord('${escapeHTML(l.discord)}')">📩 İletişim</button>
                        </div>
                    </div>
                `;
            }).join('');
            const pagDiv = document.getElementById('pagination');
            if (pagDiv && totalPages > 1) {
                pagDiv.innerHTML = Array.from({ length: totalPages }, function(_, i) {
                    const pageNum = i + 1;
                    return `<button class="page-btn ${pageNum === page ? 'active' : ''}" onclick="window._homePage=${pageNum};renderHomeListings();">${pageNum}</button>`;
                }).join('');
            } else if (pagDiv) { pagDiv.innerHTML = ''; }
        }

            if (!text) { showToast('⚠️ Yorum boş olamaz!'); return; }

                listing_id: listingId,
                user_id: currentUser.id,
                username: currentUser.username,
                text: cleanText,
                created_at: new Date().toISOString()
            }]);

            showToast('💬 Yorum eklendi!');
            const textarea = document.getElementById('commentText');
            if (textarea) textarea.value = '';

                ascending: true });

        async function rateUser(uid, rating) {
            if (!currentUser || currentUser.id === uid) return;
            const { data: user } = await sb.from('profiles').select('rating,rating_count,badges').eq('id', uid).single();
            if (!user) return;
            const newRating = ((user.rating || 0) * (user.rating_count || 0) + rating) / ((user.rating_count || 0) + 1);
            const badges = [...(user.badges || [])];
            if (newRating >= 4.5 && !badges.includes('toprated')) badges.push('toprated');
            const { error } = await sb.from('profiles').update({ rating: newRating, rating_count: (user.rating_count || 0) + 1, badges: badges }).eq('id', uid);
            if (error) { showToast('❌ Puanlama hatası!'); return; }
            showToast('⭐ ' + rating + ' yıldız verdiniz!');
            document.querySelectorAll('#starRating .star').forEach(function(s, i) { s.classList.toggle('active', i < rating); });
        }

        async function saveProfile(uid) {
            const avatar_url = document.getElementById('editAvatar')?.value.trim() || '';
            const banner_url = document.getElementById('editBanner')?.value.trim() || '';
            const newUsername = document.getElementById('editUsername')?.value.trim();
            const game_hours = document.getElementById('editHours')?.value.trim() || '0';
            const bio = document.getElementById('editBio')?.value.trim() || '';
            
            if (avatar_url && !isValidURL(avatar_url)) { showToast('⚠️ Avatar URL https ile başlamalı!'); return; }
            if (banner_url && !isValidURL(banner_url)) { showToast('⚠️ Banner URL https ile başlamalı!'); return; }
            
            const updates = { avatar_url, banner_url, game_hours, bio: escapeHTML(bio) };
            if (newUsername && newUsername !== currentUser.username) {
                if (newUsername.length < 3 || newUsername.length > 20) { showToast('⚠️ Kullanıcı adı 3-20 karakter olmalı!'); return; }
                const { data: existing } = await sb.from('profiles').select('id').eq('username', newUsername).neq('id', uid).single();
                if (existing) { showToast('⚠️ Bu kullanıcı adı alınmış!'); return; }
                const { data: user } = await sb.from('profiles').select('last_username_change').eq('id', uid).single();
                if (user?.last_username_change && (new Date() - new Date(user.last_username_change)) < 172800000) {
                    showToast('⚠️ 2 gün dolmadan tekrar değiştiremezsin!');
                    return;
                }
                updates.username = escapeHTML(newUsername);
                updates.last_username_change = new Date().toISOString();
            }
            const { error } = await sb.from('profiles').update(updates).eq('id', uid);
            if (error) { showToast('❌ Profil güncellenemedi! ' + error.message); return; }
            if (currentUser && currentUser.id === uid) Object.assign(currentUser, updates);
            showToast('✅ Profil güncellendi!');
            navigateTo('profile', uid);
        }

                case 'premium':
                    const { data: pu } = await sb.from('profiles').select('id,username').eq('is_premium', false);
                    container.innerHTML = `
                        <div class="admin-card">
                            <h4>⭐ Premium Ver</h4>
                            <select id="premUser" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;">
                                ${(pu || []).map(function(u) { return `<option value="${escapeHTML(u.id)}">${escapeHTML(u.username)}</option>`; }).join('')}
                            </select>
                            <button class="btn btn-gold" style="width:100%;" onclick="givePremium()">⭐ Premium Yap</button>
                        </div>
                    `;
                    break;
                case 'ban':
                    const { data: bu } = await sb.from('profiles').select('id,username').eq('is_banned', false);
                    container.innerHTML = `
                        <div class="admin-card">
                            <h4>🚫 Kullanıcı Yasakla</h4>
                            <select id="banUserId" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;">
                                ${(bu || []).filter(function(u) { return u.id !== currentUser?.id; }).map(function(u) { return `<option value="${escapeHTML(u.id)}">${escapeHTML(u.username)}</option>`; }).join('')}
                            </select>
                            <input type="text" id="banReason" placeholder="Yasaklama sebebi" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;font-family:var(--font);" maxlength="200">
                            <input type="date" id="banUnbanDate" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;font-family:var(--font);">
                            <button class="btn btn-red" style="width:100%;" onclick="banUser()">🚫 Yasakla</button>
                        </div>
                    `;
                    break;
                case 'verify':
                    const { data: vu } = await sb.from('profiles').select('id,username').eq('is_verified', false);
                    container.innerHTML = `
                        <div class="admin-card">
                            <h4>✓ Kullanıcı Onayla</h4>
                            <select id="verifyUser" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;">
                                ${(vu || []).map(function(u) { return `<option value="${escapeHTML(u.id)}">${escapeHTML(u.username)}</option>`; }).join('')}
                            </select>
                            <button class="btn btn-blue" style="width:100%;" onclick="verifyUser()">✓ Onayla</button>
                        </div>
                    `;
                    break;
                case 'logs':
                    const { data: logs } = await sb.from('logs').select('*').order('created_at', { ascending: false }).limit(50);
                    container.innerHTML = `
                        <div class="admin-card">
                            <h4>📋 Son Loglar</h4>
                            <button class="btn btn-blue btn-sm" style="margin-bottom:12px;" onclick="exportLogs()">📥 log.txt İndir</button>
                            <div style="max-height:350px;overflow-y:auto;font-family:monospace;font-size:11px;color:#0f0;">
                                ${(logs || []).map(function(l) { return `<div style="padding:4px 0;border-bottom:1px solid #1a1a1a;">[${new Date(l.created_at).toLocaleString('tr-TR')}] <b>${escapeHTML(l.username)}</b> → ${escapeHTML(l.action)} ${escapeHTML(l.detail || '')}</div>`; }).join('')}
                            </div>
                        </div>
                    `;
                    break;
                case 'adminMessage':
                    const { data: allU } = await sb.from('profiles').select('id,username');
                    container.innerHTML = `
                        <div class="admin-card">
                            <h4>💬 Kullanıcıya Özel Mesaj Gönder</h4>
                            <select id="adminMsgUser" style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);margin-bottom:12px;">
                                ${(allU || []).map(function(u) { return `<option value="${escapeHTML(u.id)}">${escapeHTML(u.username)}</option>`; }).join('')}
                            </select>
                            <textarea id="adminMsgText" placeholder="Mesajınızı yazın..." style="width:100%;padding:12px;border-radius:14px;background:var(--bg);color:#fff;border:1px solid var(--border);min-height:80px;font-family:var(--font);margin-bottom:12px;" maxlength="500"></textarea>
                            <button class="btn btn-red" style="width:100%;" onclick="sendAdminMessage()">💬 Gönder (Popup + Bildirim)</button>
                        </div>
                    `;
                    break;
            }
        }

        async function addAnnouncement() {
            const text = document.getElementById('annText')?.value.trim();
            if (!text) { showToast('⚠️ Duyuru metni zorunlu!'); return; }
            const { error } = await sb.from('announcements').insert([{ author_id: currentUser.id, text: escapeHTML(text), created_at: new Date().toISOString() }]);
            if (error) { showToast('❌ Duyuru eklenemedi! ' + error.message); return; }
            showToast('📢 Duyuru yayınlandı!');
            showAdminSection('announcement');
        }

        async function changeRole() {
            const userId = document.getElementById('roleUser')?.value;
            const newRole = document.getElementById('roleName')?.value;
            if (!userId || !newRole) return;
            const { error } = await sb.from('profiles').update({ role: newRole }).eq('id', userId);
            if (error) { showToast('❌ Rol değiştirilemedi! ' + error.message); return; }
            showToast('✅ Rol güncellendi!');
            showAdminSection('roles');
        }

        async function givePremium() {
            const userId = document.getElementById('premUser')?.value;
            if (!userId) return;
            const { error } = await sb.from('profiles').update({ is_premium: true }).eq('id', userId);
            if (error) { showToast('❌ Premium verilemedi! ' + error.message); return; }
            showToast('⭐ Premium verildi!');
            showAdminSection('premium');
        }

        async function banUser() {
            const userId = document.getElementById('banUserId')?.value;
            const reason = document.getElementById('banReason')?.value.trim();
            const unbanDate = document.getElementById('banUnbanDate')?.value;
            if (!userId || !reason) { showToast('⚠️ Kullanıcı ve sebep zorunlu!'); return; }
            const { data: user } = await sb.from('profiles').select('username').eq('id', userId).single();
            const { error: profileError } = await sb.from('profiles').update({ is_banned: true }).eq('id', userId);
            if (profileError) { showToast('❌ Yasaklama başarısız! ' + profileError.message); return; }
            const { error: banError } = await sb.from('bans').insert([{ user_id: userId, username: user?.username, reason: escapeHTML(reason), banned_by: currentUser.username, unban_date: unbanDate ? new Date(unbanDate).toISOString() : null, is_active: true, created_at: new Date().toISOString() }]);
            if (banError) { showToast('❌ Ban kaydı oluşturulamadı! ' + banError.message); return; }
            showToast('🚫 Kullanıcı yasaklandı!');
            showAdminSection('ban');
        }

        async function verifyUser() {
            const userId = document.getElementById('verifyUser')?.value;
            if (!userId) return;
            const { error } = await sb.from('profiles').update({ is_verified: true }).eq('id', userId);
            if (error) { showToast('❌ Onaylama başarısız! ' + error.message); return; }
            showToast('✓ Kullanıcı onaylandı!');
            showAdminSection('verify');
        }

        async function sendAdminMessage() {
            const userId = document.getElementById('adminMsgUser')?.value;
            const text = document.getElementById('adminMsgText')?.value.trim();
            if (!userId || !text) { showToast('⚠️ Kullanıcı ve mesaj zorunlu!'); return; }
            const cleanText = escapeHTML(text);
            const { error: notifError } = await sb.from('notifications').insert([{ user_id: userId, text: '👑 Admin: ' + cleanText, created_at: new Date().toISOString() }]);
            if (notifError) { showToast('❌ Bildirim gönderilemedi! ' + notifError.message); return; }
            showAdminPopup('👑 Admin Mesajı: ' + cleanText);
            await sb.from('messages').insert([{ sender_id: currentUser.id, receiver_id: userId, text: '👑 Admin: ' + cleanText, created_at: new Date().toISOString() }]);
            showToast('✅ Mesaj gönderildi! (Popup + Bildirim)');
            showAdminSection('adminMessage');
        }

        async function exportLogs() {
            const { data: logs } = await sb.from('logs').select('*').order('created_at', { ascending: false }).limit(500);
            let text = 'EKİPBUL LOG KAYITLARI\n' + '='.repeat(60) + '\n';
            (logs || []).forEach(function(l) { text += `[${new Date(l.created_at).toLocaleString('tr-TR')}] ${l.username} → ${l.action} ${l.detail || ''}\n`; });
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ekipbul_log_' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click();
            showToast('📥 log.txt indirildi!');
        }

        // ==================== BAŞLANGIÇ ====================
        async function initApp() {
            updateNavbar();
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    await loadUserProfile(session.user.id);
                    updateNavbar();
                }
            } catch (e) { console.error('Session hatası:', e); }
            navigateTo('home');
            console.log('🎮 EkipBul hazır!');
        }

        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
                await loadUserProfile(session.user.id);
                updateNavbar();
                navigateTo('home');
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
